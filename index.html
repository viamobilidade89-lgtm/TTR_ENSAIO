<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ALPHA - SISTEMA DE CAMPO</title>
    <style>
        :root { --p: #0ea5e9; --bg: #0f172a; --c: #1e293b; --t: #f8fafc; --s: #22c55e; --e: #ef4444; }
        body { font-family: sans-serif; background: var(--bg); color: var(--t); margin: 0; padding: 10px; }
        
        /* Cabeçalho */
        header { background: var(--c); padding: 15px; border-radius: 8px; margin-bottom: 15px; border-bottom: 3px solid var(--p); }
        .titulo { font-weight: bold; font-size: 20px; color: var(--p); }

        /* Menu de Ícones (Dashboard) */
        #menuPrincipal { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        .botao-icone { 
            background: var(--c); border: 1px solid var(--p); padding: 30px 10px; 
            border-radius: 12px; text-align: center; cursor: pointer; color: var(--p);
            font-weight: bold; font-size: 14px; text-transform: uppercase;
        }

        /* Seções de Tela */
        .tela { display: none; background: var(--c); padding: 15px; border-radius: 12px; margin-top: 10px; border: 1px solid #334155; }
        .tela-ativa { display: block !important; }

        /* Campos de Entrada */
        .bloco { margin-bottom: 15px; }
        label { display: block; font-size: 11px; color: var(--p); font-weight: bold; margin-bottom: 5px; }
        input, select { width: 100%; padding: 12px; background: #020617; border: 1px solid #334155; color: white; border-radius: 8px; box-sizing: border-box; }
        
        /* Tabelas */
        table { width: 100%; border-collapse: collapse; margin-top: 15px; background: #020617; font-size: 12px; }
        th, td { border: 1px solid #334155; padding: 10px; text-align: center; }
        th { color: var(--p); background: #1e293b; }

        /* Botões de Ação */
        .btn { width: 100%; padding: 15px; border: none; border-radius: 8px; font-weight: bold; cursor: pointer; margin-top: 10px; }
        .btn-add { background: var(--p); color: #000; }
        .btn-voltar { background: #334155; color: white; width: auto; margin-bottom: 10px; padding: 8px 15px; }

        @media print {
            .no-print { display: none !important; }
            .tela { display: block !important; background: white; color: black; border: 1px solid black; }
            th, td { border: 1px solid black; color: black; }
        }
    </style>
</head>
<body>

<header class="no-print">
    <div class="titulo">ENSAIOS ALPHA v17.5</div>
    <button onclick="abrirTela('CONFIG')" style="float:right; margin-top:-25px; background:none; border:1px solid var(--p); color:var(--p); border-radius:4px; padding:4px 8px; cursor:pointer;">CONFIG</button>
</header>

<div id="menuPrincipal" class="no-print">
    <div class="botao-icone" onclick="abrirTela('MEGGER')">⚡<br>ISOLAÇÃO</div>
    <div class="botao-icone" onclick="abrirTela('TTR')">📊<br>RELAÇÃO (TTR)</div>
    <div class="botao-icone" onclick="window.print()">🖨️<br>GERAR PDF</div>
    <div class="botao-icone" onclick="location.reload()">🔄<br>LIMPAR</div>
</div>

<div id="sessaoDados" class="tela">
    <div class="bloco">
        <label>TAG EQUIPAMENTO</label>
        <input type="text" id="tagTrafo" placeholder="Ex: TR-01">
    </div>
    <div class="bloco">
        <label>LOCAL / SUBESTAÇÃO</label>
        <select id="selLocal"></select>
    </div>
    <div class="bloco">
        <label>TÉCNICOS NO LOCAL</label>
        <div id="listaCheckTec" style="background:#020617; padding:10px; border-radius:8px;"></div>
    </div>
</div>

<div id="telaMEGGER" class="tela">
    <button class="btn-voltar no-print" onclick="voltarMenu()">← VOLTAR</button>
    <label style="font-size:16px; margin-bottom:15px;">ENSAIO DE ISOLAÇÃO</label>
    
    <div style="display:grid; grid-template-columns: 1fr 1fr; gap:10px;" class="no-print">
        <div class="bloco"><label>PONTO</label><select id="mPonto"><option>AT x BT+T</option><option>BT x AT+T</option><option>AT x BT</option></select></div>
        <div class="bloco"><label>TENSÃO (kV)</label><select id="mKV"><option>0.5</option><option>1.0</option><option>2.5</option><option>5.0</option><option>10</option></select></div>
    </div>

    <div style="display:grid; grid-template-columns: 1fr 1fr 1fr; gap:5px;" class="no-print">
        <div class="bloco"><label>15s (IA)</label><input type="number" id="v15"></div>
        <div class="bloco"><label>1min (IP)</label><input type="number" id="v60"></div>
        <div class="bloco"><label>10min</label><input type="text" id="v10"></div>
    </div>
    <button class="btn btn-add no-print" onclick="addLeituraMegger()">+ REGISTRAR NO LAUDO</button>

    <table>
        <thead>
            <tr><th>Ponto</th><th>kV</th><th>1 min</th><th>10 min</th><th>IP/IA</th></tr>
        </thead>
        <tbody id="tabResutMegger"></tbody>
    </table>
</div>

<div id="telaCONFIG" class="tela">
    <button class="btn-voltar" onclick="voltarMenu()">← VOLTAR</button>
    <div class="bloco">
        <label>CADASTRAR TÉCNICO</label>
        <input type="text" id="novoTec">
        <button class="btn btn-add" onclick="salvarInfo('tecnicos', 'novoTec')">SALVAR TÉCNICO</button>
    </div>
    <div class="bloco">
        <label>CADASTRAR LOCAL</label>
        <input type="text" id="novoLoc">
        <button class="btn btn-add" onclick="salvarInfo('locais', 'novoLoc')">SALVAR LOCAL</button>
    </div>
</div>

<script>
    // Banco de Dados Local
    let banco = JSON.parse(localStorage.getItem('alpha_v17')) || { tecnicos: [], locais: [] };

    // FUNÇÃO PARA TROCAR DE TELA (A que estava falhando antes)
    function abrirTela(idTela) {
        // Esconde o menu
        document.getElementById('menuPrincipal').style.display = 'none';
        
        // Esconde todas as telas
        const telas = document.getElementsByClassName('tela');
        for (let i = 0; i < telas.length; i++) {
            telas[i].classList.remove('tela-ativa');
        }

        // Mostra a tela escolhida
        document.getElementById('tela' + idTela).classList.add('tela-ativa');
        
        // Se não for a tela de config, mostra os dados do equipamento
        if(idTela !== 'CONFIG') {
            document.getElementById('sessaoDados').classList.add('tela-ativa');
        }
        
        carregarListas();
    }

    function voltarMenu() {
        document.getElementById('menuPrincipal').style.display = 'grid';
        const telas = document.getElementsByClassName('tela');
        for (let i = 0; i < telas.length; i++) {
            telas[i].classList.remove('tela-ativa');
        }
    }

    function salvarInfo(tipo, inputId) {
        const valor = document.getElementById(inputId).value;
        if(valor) {
            banco[tipo].push(valor);
            localStorage.setItem('alpha_v17', JSON.stringify(banco));
            document.getElementById(inputId).value = '';
            carregarListas();
            alert('Salvo com sucesso!');
        }
    }

    function carregarListas() {
        // Carrega Locais no Select
        const sel = document.getElementById('selLocal');
        sel.innerHTML = banco.locais.map(l => `<option>${l}</option>`).join('');

        // Carrega Técnicos com Checkbox
        const divTec = document.getElementById('listaCheckTec');
        divTec.innerHTML = banco.tecnicos.map(t => `<div style="margin-bottom:5px;"><input type="checkbox" value="${t}"> ${t}</div>`).join('');
    }

    function addLeituraMegger() {
        const p = document.getElementById('mPonto').value;
        const kv = document.getElementById('mKV').value;
        const r15 = parseFloat(document.getElementById('v15').value);
        const r60 = parseFloat(document.getElementById('v60').value);
        const r10 = document.getElementById('v10').value;

        let ip = (r10 === '∞' || r10 === 'inf') ? 'EXC' : (parseFloat(r10)/r60).toFixed(2);
        let ia = (r60/r15).toFixed(2);

        const html = `<tr><td>${p}</td><td>${kv}</td><td>${r60} GΩ</td><td>${r10} GΩ</td><td>IP: ${ip}<br>IA: ${ia}</td></tr>`;
        document.getElementById('tabResutMegger').innerHTML += html;
    }

    // Inicia o sistema carregando dados salvos
    window.onload = carregarListas;
</script>

</body>
</html>
