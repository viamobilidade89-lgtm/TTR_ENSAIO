<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ENSAIO PRO EVOLUTION v54.0</title>
    <style>
        :root { --p: #0284c7; --bg: #ffffff; --t: #000; --re: #dc2626; --ap: #16a34a; }
        body { font-family: sans-serif; background: var(--bg); color: var(--t); margin: 0; padding: 5px; overflow-x: hidden; }
        
        header { display: flex; justify-content: space-between; align-items: center; padding: 10px; background: #f1f5f9; border-radius: 8px; margin-bottom: 10px; position: relative; }
        .main-title { text-align: center; color: var(--p); font-weight: 900; font-size: 18px; margin: 10px 0; text-transform: uppercase; border-bottom: 3px solid #000; padding-bottom: 8px; }
        .btn-config { position: absolute; right: 10px; top: 10px; background: #fff; border: 1px solid #94a3b8; padding: 10px; border-radius: 8px; cursor: pointer; z-index: 10; font-size: 20px; }

        .no-print { display: block; }
        .tela { display: none; padding: 10px; border: 1px solid #94a3b8; border-radius: 8px; margin-top: 5px; background: #fff; }
        .ativa { display: block !important; }
        
        .table-container { width: 100%; overflow-x: auto; margin-top: 10px; border: 1px solid #ccc; border-radius: 4px; }
        table { width: 100%; border-collapse: collapse; font-size: 10px; min-width: 600px; }
        th, td { border: 1px solid #000; padding: 5px; text-align: center; }
        th { background: #f1f5f9; font-weight: bold; }

        .status-repro { color: var(--re); font-weight: bold; }
        .status-aprov { color: var(--ap); font-weight: bold; }
        .guia-conexao { background: #fff9c4; padding: 10px; border-radius: 6px; font-size: 11px; margin: 10px 0; border: 2px solid #fbc02d; font-weight: bold; display: none; }

        label { display: block; font-size: 9px; font-weight: bold; color: var(--p); margin: 8px 0 2px; text-transform: uppercase; }
        input, select { width: 100%; padding: 10px; border: 1px solid #64748b; border-radius: 6px; font-size: 14px; box-sizing: border-box; }
        .row-med { display: grid; grid-template-columns: 1fr 75px 45px; gap: 5px; margin-bottom: 5px; }
        .btn-inf { background: #475569; color: white; border: none; border-radius: 6px; font-weight: bold; cursor: pointer; font-size: 18px; }
        .btn-add { width: 100%; padding: 15px; background: var(--p); color: white; border: none; border-radius: 10px; font-weight: bold; margin-top: 10px; cursor: pointer; }
        
        .footer-print { margin-top: 20px; border-top: 1px solid #000; padding-top: 10px; font-size: 11px; }

        @media print {
            .no-print, .btn-config, #btnVoltar, .btn-add, .btn-inf { display: none !important; }
            .tela { display: none; border: none !important; padding: 0; }
            .tem-dados { display: block !important; }
            .table-container { overflow: visible; border: none; }
            table { min-width: 100%; font-size: 11px; }
        }
    </style>
</head>
<body>

<button class="btn-config no-print" onclick="mudar('CONFIG')">⚙️</button>

<header class="no-print">
    <button onclick="voltar()" id="btnVoltar" style="display:none; background:#64748b; color:white; border:none; padding:10px 15px; border-radius:6px; font-weight:bold;">← MENU</button>
</header>

<div class="main-title">ENSAIO PRO EVOLUTION</div>

<div id="menuHome" class="no-print ativa">
    <div style="display:grid; gap:12px; padding:10px;">
        <button class="btn-add" onclick="mudar('MEG')" style="height:80px">⚡ ENSAIO MEGGER</button>
        <button class="btn-add" onclick="mudar('TTR')" style="height:80px">📊 ENSAIO TTR</button>
        <button class="btn-add" onclick="mudar('MICRO')" style="height:80px">📟 ENSAIO MICRO</button>
    </div>
</div>

<div id="blocoDados" class="tela">
    <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 10px;">
        <div><label>TAG EQUIPAMENTO</label><input type="text" id="tag" placeholder="Ex: TR-01"></div>
        <div><label>LOCAL / SE</label><select id="listaLocais"></select></div>
    </div>
    <div id="poolTecsHome" class="no-print" style="display:flex; gap:8px; flex-wrap:wrap; margin-top:10px;"></div>
    <div class="footer-print">
        <span style="font-weight:bold; color:#000;">TÉCNICO(S): </span>
        <span id="tecsSelecionados"></span>
    </div>
</div>

<div id="secMEG" class="tela">
    <div class="no-print">
        <label>PONTO DE MEDIÇÃO</label>
        <select id="mPonto"><option>PRIMÁRIO x SECUNDÁRIO</option><option>PRIMÁRIO x CARCAÇA</option><option>SECUNDÁRIO x CARCAÇA</option><option>CAMIS</option></select>
        <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 10px;">
            <div><label>TENSÃO APLICADA</label><select id="mTensao"><option>500V</option><option>1kV</option><option>2,5kV</option><option>5kV</option></select></div>
            <div><label>REF. MÍNIMA</label><div style="display:flex; gap:5px;"><input type="text" id="mRef"><select id="uRef" style="width:75px;"><option value="1">MΩ</option><option value="1000">GΩ</option><option value="1000000">TΩ</option></select></div></div>
        </div>
        <label>LEITURAS (30s | 60s | 120s)</label>
        <div class="row-med"><input type="text" id="r30" placeholder="30s"><select id="u30"><option value="1">MΩ</option><option value="1000">GΩ</option><option value="1000000">TΩ</option></select><button class="btn-inf" onclick="setInf('r30')">∞</button></div>
        <div class="row-med"><input type="text" id="r60" placeholder="60s"><select id="u60"><option value="1">MΩ</option><option value="1000">GΩ</option><option value="1000000">TΩ</option></select><button class="btn-inf" onclick="setInf('r60')">∞</button></div>
        <div class="row-med"><input type="text" id="r120" placeholder="120s"><select id="u120"><option value="1">MΩ</option><option value="1000">GΩ</option><option value="1000000">TΩ</option></select><button class="btn-inf" onclick="setInf('r120')">∞</button></div>
        <button class="btn-add" onclick="addMegger()">⚡ ADICIONAR AO RELATÓRIO</button>
    </div>
    <h3 class="tem-dados">⚡ RESISTÊNCIA DE ISOLAÇÃO (MEGGER)</h3>
    <div class="table-container tem-dados"><table id="tabMeg"><thead><tr><th>Ponto</th><th>V. Aplicada</th><th>Ref.</th><th>30s</th><th>60s</th><th>120s</th><th>Status</th><th class="no-print">X</th></tr></thead><tbody></tbody></table></div>
</div>

<div id="secTTR" class="tela">
    <div class="no-print">
        <label>GRUPO FASORIAL</label>
        <select id="ttrFas" onchange="atualizarPontas()">
            <option value="">Selecione...</option>
            <option value="Ydn1">Ydn1</option><option value="Ydn11">Ydn11</option><option value="Dyn1">Dyn1</option><option value="Dyn11">Dyn11</option>
            <option value="Yy0">Yy0</option><option value="Dd0">Dd0</option><option value="Yd1">Yd1</option><option value="Yd11">Yd11</option>
        </select>
        <div id="guiaConexao" class="guia-conexao"></div>
        <div style="display:grid; grid-template-columns: 1fr 1fr; gap:10px;"><input type="number" id="vPri" placeholder="V. Primário" oninput="calcTeorico()"><input type="number" id="vSec" placeholder="V. Secundário" oninput="calcTeorico()"></div>
        <label>RT TEÓRICO: <span id="vTeoExib" style="color:var(--p); font-size:16px; font-weight:bold;">0.0000</span></label>
        <div style="display:grid; grid-template-columns: 1fr 1fr 1fr; gap:10px;"><input type="text" id="tA" placeholder="A"><input type="text" id="tB" placeholder="B"><input type="text" id="tC" placeholder="C"></div>
        <button class="btn-add" onclick="addTTR()">📊 ADICIONAR AO RELATÓRIO</button>
    </div>
    <h3 class="tem-dados">📊 RELAÇÃO DE TRANSFORMAÇÃO (TTR)</h3>
    <div class="table-container tem-dados"><table id="tabTTR"><thead><tr><th>Grupo</th><th>Teórico</th><th>A</th><th>B</th><th>C</th><th>Desvio %</th><th>Status</th><th class="no-print">X</th></tr></thead><tbody></tbody></table></div>
</div>

<div id="secMICRO" class="tela">
    <div class="no-print">
        <label>PONTO E VALOR (mΩ)</label>
        <input type="text" id="micP" placeholder="Ex: Bucha A-B"><input type="text" id="micV" placeholder="mΩ">
        <button class="btn-add" onclick="addMicro()">📟 ADICIONAR AO RELATÓRIO</button>
    </div>
    <h3 class="tem-dados">📟 RESISTÊNCIA ÔHMICA (MICRO)</h3>
    <div class="table-container tem-dados"><table id="tabMicro"><thead><tr><th>Ponto</th><th>Lido (mΩ)</th><th>@20°C (mΩ)</th><th class="no-print">X</th></tr></thead><tbody></tbody></table></div>
</div>

<div id="acoesGlobais" class="no-print" style="padding: 10px; display: none;">
    <button onclick="window.print()" style="background:#000; color:#fff; width:100%; padding:18px; border-radius:8px; font-weight:bold; cursor:pointer; margin-bottom:10px;">🖨️ GERAR RELATÓRIO PDF</button>
    <button onclick="salvarEnsaio(true)" style="background:var(--re); color:#fff; width:100%; padding:18px; border-radius:8px; font-weight:bold; cursor:pointer;">♻️ SALVAR E NOVO ENSAIO</button>
</div>

<div id="secCONFIG" class="tela">
    <button onclick="voltar()" class="btn-add" style="background:#555;">← VOLTAR</button>
    <h3>📜 HISTÓRICO</h3><div id="listaHistorico"></div><hr>
    <label>TÉCNICOS</label><div style="display:flex; gap:5px;"><input type="text" id="cfgT"><button onclick="salvarBasico('tecnicos','cfgT')">+</button></div>
    <label>LOCAIS</label><div style="display:flex; gap:5px;"><input type="text" id="cfgL"><button onclick="salvarBasico('locais','cfgL')">+</button></div>
</div>

<script>
    let db = JSON.parse(localStorage.getItem('alpha_v54_db')) || { tecnicos: [], locais: [], historico: [] };
    let selecionados = [];

    function setInf(id) { document.getElementById(id).value = "∞"; }
    function parseNum(v) { 
        if(!v || v==="") return 0; 
        if(v==="∞") return Infinity; 
        return parseFloat(v.toString().replace(',','.')); 
    }

    function mudar(t) {
        document.querySelectorAll('.tela, #menuHome').forEach(x => x.classList.remove('ativa'));
        if(t !== 'CONFIG') {
            document.getElementById('sec'+t).classList.add('ativa');
            document.getElementById('blocoDados').classList.add('ativa');
            document.getElementById('btnVoltar').style.display = 'block';
            document.getElementById('acoesGlobais').style.display = 'block';
        } else {
            document.getElementById('secCONFIG').classList.add('ativa');
            document.getElementById('btnVoltar').style.display = 'block';
            document.getElementById('acoesGlobais').style.display = 'none';
        }
        render();
    }

    function voltar() {
        document.querySelectorAll('.tela').forEach(x => x.classList.remove('ativa'));
        document.getElementById('menuHome').classList.add('ativa');
        document.getElementById('btnVoltar').style.display = 'none';
        document.getElementById('acoesGlobais').style.display = 'none';
    }

    function addMegger() {
        const p = document.getElementById('mPonto').value;
        const refVal = parseNum(document.getElementById('mRef').value) * parseNum(document.getElementById('uRef').value);
        const v60Raw = document.getElementById('r60').value;
        const v60Calc = (v60Raw === "∞") ? Infinity : parseNum(v60Raw) * parseNum(document.getElementById('u60').value);
        
        const st = (v60Calc >= refVal) ? "APROVADO" : "REPROVADO";
        const uni = (id) => document.getElementById(id).options[document.getElementById(id).selectedIndex].text;
        
        const row = `<tr><td>${p}</td><td>${document.getElementById('mTensao').value}</td><td>${document.getElementById('mRef').value}${uni('uRef')}</td>
            <td>${document.getElementById('r30').value}${document.getElementById('r30').value==="∞"?"":uni('u30')}</td>
            <td>${v60Raw}${v60Raw==="∞"?"":uni('u60')}</td>
            <td>${document.getElementById('r120').value}${document.getElementById('r120').value==="∞"?"":uni('u120')}</td>
            <td><span class="${st==='APROVADO'?'status-aprov':'status-repro'}">${st}<br><small>${p}</small></span></td>
            <td class="no-print"><button onclick="this.closest('tr').remove()">X</button></td></tr>`;
        document.getElementById('tabMeg').querySelector('tbody').innerHTML += row;
    }

    function atualizarPontas() {
        const f = document.getElementById('ttrFas').value;
        const g = document.getElementById('guiaConexao');
        g.style.display = f ? 'block' : 'none';
        const guias = {
            "Ydn11": "A(H1-H2|X2-X0), B(H2-H3|X3-X0), C(H3-H1|X1-X0)",
            "Ydn1": "A(H1-H2|X1-X0), B(H2-H3|X2-X0), C(H3-H1|X3-X0)",
            "Dyn11": "A(H1-H3|X1-X0), B(H2-H1|X2-X0), C(H3-H2|X3-X0)",
            "Dyn1": "A(H1-H3|X3-X0), B(H2-H1|X1-X0), C(H3-H2|X2-X0)",
            "Yy0": "A(H1-H2|X1-X2), B(H2-H3|X2-X3), C(H3-H1|X3-X1)",
            "Dd0": "A(H1-H2|X1-X2), B(H2-H3|X2-X3), C(H3-H1|X3-X1)",
            "Yd1": "A(H1-H2|X1-X2), B(H2-H3|X2-X3), C(H3-H1|X3-X1)",
            "Yd11": "A(H1-H2|X1-X2), B(H2-H3|X2-X3), C(H3-H1|X3-X1)"
        };
        g.innerText = "CONEXÕES " + f + ": " + (guias[f] || "Ver placa.");
        calcTeorico();
    }

    function calcTeorico() {
        const v1 = parseNum(document.getElementById('vPri').value);
        const v2 = parseNum(document.getElementById('vSec').value);
        const f = document.getElementById('ttrFas').value;
        if(v1 && v2) {
            let res = (f.includes("Ydn") || f.includes("Yd")) ? (v1 * 1.73205) / v2 : (f.includes("Dyn") || f.includes("Dy")) ? v1 / (v2 / 1.73205) : v1 / v2;
            document.getElementById('vTeoExib').innerText = res.toFixed(4);
        }
    }

    function salvarBasico(tipo, id) {
        const el = document.getElementById(id);
        if(el.value) {
            db[tipo].push(el.value);
            localStorage.setItem('alpha_v54_db', JSON.stringify(db));
            el.value = ''; // LIMPA O CAMPO APÓS ADD
            render();
        }
    }

    function render() {
        document.getElementById('listaLocais').innerHTML = db.locais.map(l => `<option>${l}</option>`).join('');
        document.getElementById('poolTecsHome').innerHTML = db.tecnicos.map(t => `<button onclick="addTec('${t}')" style="font-size:10px; padding:5px; border-radius:15px; margin:2px;">+ ${t}</button>`).join('');
        document.getElementById('tecsSelecionados').innerText = selecionados.join(', ');
    }

    function addTec(t) { if(!selecionados.includes(t)) selecionados.push(t); render(); }
    window.onload = render;
</script>
</body>
</html>
