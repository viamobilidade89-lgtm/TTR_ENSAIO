<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ENSAIO PRO EVOLUTION v29</title>
    <style>
        :root { --p: #0284c7; --bg: #ffffff; --t: #000; --re: #dc2626; --ap: #16a34a; }
        body { font-family: sans-serif; background: var(--bg); color: var(--t); margin: 0; padding: 5px; }
        
        .main-title { text-align: center; color: var(--p); font-weight: 900; font-size: 18px; margin: 10px 0; text-transform: uppercase; }
        
        header { display: flex; justify-content: space-between; align-items: center; padding: 5px 10px; background: #f1f5f9; border-radius: 8px; border: 1px solid #cbd5e1; }
        #btnPDFGlobal { width: 100%; background: #000; color: #fff; border: none; border-radius: 8px; padding: 12px; font-weight: bold; margin: 8px 0; font-size: 14px; display: none; cursor: pointer; }
        
        .tela { display: none; padding: 10px; border: 1px solid #94a3b8; border-radius: 8px; margin-top: 5px; background: #fff; }
        .ativa { display: block !important; }
        
        .grid-menu { display: grid; grid-template-columns: 1fr; gap: 12px; padding: 10px; }
        .btn-menu { background: var(--p); color: white; border: none; padding: 25px; border-radius: 12px; font-size: 16px; font-weight: bold; display: flex; flex-direction: column; align-items: center; gap: 10px; }
        .btn-menu span { font-size: 30px; }
        
        label { display: block; font-size: 10px; font-weight: bold; color: var(--p); margin: 8px 0 2px; text-transform: uppercase; }
        input, select { width: 100%; padding: 8px; border: 1px solid #64748b; border-radius: 6px; font-size: 14px; box-sizing: border-box; }
        
        .row-ensaio { display: grid; grid-template-columns: 1fr 60px 40px; gap: 5px; align-items: end; margin-bottom: 5px; }
        .btn-inf { background: #475569; color: white; border: none; border-radius: 6px; height: 35px; font-weight: bold; }
        .btn-add { width: 100%; padding: 12px; background: #0284c7; color: white; border: none; border-radius: 8px; font-weight: bold; margin-top: 10px; }

        table { width: 100%; border-collapse: collapse; margin-top: 10px; font-size: 11px; }
        th, td { border: 1px solid #000; padding: 6px; text-align: center; }
        th { background: #f1f5f9; }
        
        .status-repro { background: var(--re) !important; color: white !important; font-weight: bold; }
        .status-aprov { background: var(--ap) !important; color: white !important; font-weight: bold; }

        @media print {
            .no-print, #poolTecnicos, .btn-inf, .btn-add, .btn-menu, header, #btnPDFGlobal, .config-area { display: none !important; }
            .tela { display: none; border: none !important; padding: 0; margin: 0; }
            .tem-dados { display: block !important; }
            #blocoDados { display: block !important; border-bottom: 2px solid #000; padding-bottom: 10px; margin-bottom: 15px; }
            .main-title { font-size: 22px; color: black; border-bottom: 2px solid #000; padding-bottom: 5px; }
            h3 { font-size: 14px; margin-top: 20px; border-left: 4px solid #000; padding-left: 8px; }
            table { page-break-inside: avoid; }
        }
    </style>
</head>
<body>

<div class="main-title">ENSAIO PRO EVOLUTION</div>

<header class="no-print">
    <button onclick="voltar()" id="btnVoltar" style="display:none; background:#64748b; color:white; border:none; padding:8px 12px; border-radius:5px;">← VOLTAR</button>
    <b>v29.0</b>
    <button onclick="mudar('CONFIG')" style="background:#fff; border:1px solid #94a3b8; padding:8px; border-radius:6px;">⚙️</button>
</header>

<button onclick="window.print()" id="btnPDFGlobal" class="no-print">🖨️ GERAR RELATÓRIO PDF</button>

<div id="menuHome" class="grid-menu no-print ativa">
    <div class="btn-menu" onclick="mudar('MEG')"><span>⚡</span> MEGGER</div>
    <div class="btn-menu" onclick="mudar('TTR')"><span>📊</span> TTR</div>
    <div class="btn-menu" onclick="mudar('MICRO')"><span>📟</span> MICRO</div>
</div>

<div id="blocoDados" class="tela">
    <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 10px;">
        <div><label>TAG EQUIPAMENTO</label><input type="text" id="tag"></div>
        <div><label>LOCAL / SE</label><select id="listaLocais"></select></div>
    </div>
    <div class="no-print">
        <label>EQUIPE (CLIQUE PARA ADICIONAR)</label>
        <div id="poolTecnicos" style="background:#f1f5f9; padding:8px; border-radius:8px; border:1px solid #cbd5e1; margin-bottom: 5px;"></div>
    </div>
    <label>EQUIPE TÉCNICA ESCALADA</label>
    <div id="tecsSelecionados" style="font-weight: bold; margin-top: 5px; font-size: 13px;"></div>
</div>

<div id="secMEG" class="tela">
    <div class="no-print">
        <label>CONEXÃO</label>
        <div class="row-ensaio" style="grid-template-columns: 1fr 80px;">
            <select id="mPonto">
                <option>ENTRADA x SAÍDA</option>
                <option>ENTRADA x CARCAÇA</option>
                <option>SAÍDA x CARCAÇA</option>
                <option>CAMIS</option>
            </select>
            <select id="mTensao"><option>500V</option><option>1kV</option><option>2.5kV</option><option>5kV</option></select>
        </div>
        <label>REFERÊNCIA MÍNIMA</label>
        <div class="row-ensaio" style="grid-template-columns: 1fr 80px;"><input type="text" id="mRef" inputmode="decimal"><select id="uRef"><option>MΩ</option><option>GΩ</option><option>TΩ</option></select></div>
        <label>LEITURAS</label>
        <div class="row-ensaio"><input type="text" id="r30" inputmode="decimal" placeholder="30s"><select id="u30"><option>MΩ</option><option>GΩ</option><option>TΩ</option></select><button class="btn-inf" onclick="setInf('r30')">∞</button></div>
        <div class="row-ensaio"><input type="text" id="r60" inputmode="decimal" placeholder="60s"><select id="u60"><option>MΩ</option><option>GΩ</option><option>TΩ</option></select><button class="btn-inf" onclick="setInf('r60')">∞</button></div>
        <div class="row-ensaio"><input type="text" id="r120" inputmode="decimal" placeholder="120s"><select id="u120"><option>MΩ</option><option>GΩ</option><option>TΩ</option></select><button class="btn-inf" onclick="setInf('r120')">∞</button></div>
        <button class="btn-add" onclick="addMegger()">⚡ ADICIONAR AO LAUDO</button>
    </div>
    <h3>⚡ ENSAIO DE ISOLAMENTO (MEGGER)</h3>
    <table id="tabMeg">
        <thead><tr><th>Ponto</th><th>V</th><th>30s</th><th>60s</th><th>120s</th><th>Status</th><th class="no-print">X</th></tr></thead>
        <tbody></tbody>
    </table>
</div>

<div id="secTTR" class="tela">
    <div class="no-print">
        <label>RELAÇÃO NOMINAL</label><input type="text" id="ttrNom" inputmode="decimal">
        <div style="display:grid; grid-template-columns:1fr 1fr 1fr; gap:5px; margin-top:5px;">
            <input type="text" id="ttrA" inputmode="decimal" placeholder="Fase A">
            <input type="text" id="ttrB" inputmode="decimal" placeholder="Fase B">
            <input type="text" id="ttrC" inputmode="decimal" placeholder="Fase C">
        </div>
        <button class="btn-add" onclick="addTTR()">📊 ADICIONAR AO LAUDO</button>
    </div>
    <h3>📊 RELAÇÃO DE TRANSFORMAÇÃO (TTR)</h3>
    <table id="tabTTR"><thead><tr><th>Nominal</th><th>A</th><th>B</th><th>C</th><th>Erro%</th><th class="no-print">X</th></tr></thead><tbody></tbody></table>
</div>

<div id="secMICRO" class="tela">
    <div class="no-print">
        <div style="display:grid; grid-template-columns: 1fr 80px; gap:10px;">
            <input type="text" id="micP" placeholder="Ponto (ex: H1-H2)">
            <input type="text" id="micT" value="25" inputmode="numeric">
        </div>
        <label>VALOR LIDO (mΩ)</label><input type="text" id="micV" inputmode="decimal">
        <button class="btn-add" onclick="addMicro()">📟 ADICIONAR AO LAUDO</button>
    </div>
    <h3>📟 RESISTÊNCIA ÔHMICA (MICRO)</h3>
    <table id="tabMicro"><thead><tr><th>Ponto</th><th>Lido</th><th>@20°C</th><th class="no-print">X</th></tr></thead><tbody></tbody></table>
</div>

<div id="secCONFIG" class="tela config-area">
    <button onclick="voltar()" class="btn-add" style="background:#555;">← VOLTAR</button>
    <label>CADASTRAR TÉCNICO</label>
    <div class="row-ensaio" style="grid-template-columns: 1fr 70px;"><input type="text" id="cfgT"><button onclick="salvar('tecnicos','cfgT')" style="background:var(--ap); color:white; border:none; border-radius:4px;">SALVAR</button></div>
    <label>CADASTRAR LOCAL</label>
    <div class="row-ensaio" style="grid-template-columns: 1fr 70px;"><input type="text" id="cfgL"><button onclick="salvar('locais','cfgL')" style="background:var(--ap); color:white; border:none; border-radius:4px;">SALVAR</button></div>
</div>

<script>
    let db = JSON.parse(localStorage.getItem('alpha_v29_db')) || { tecnicos: [], locais: [] };
    let selecionados = [];

    function mudar(t) {
        document.getElementById('menuHome').classList.remove('ativa');
        document.querySelectorAll('.tela').forEach(x => x.classList.remove('ativa'));
        document.getElementById('sec'+t).classList.add('ativa');
        document.getElementById('blocoDados').classList.add('ativa');
        document.getElementById('btnVoltar').style.display = 'block';
        document.getElementById('btnPDFGlobal').style.display = 'block';
        render();
    }

    function voltar() { 
        document.querySelectorAll('.tela').forEach(x => x.classList.remove('ativa')); 
        document.getElementById('menuHome').classList.add('ativa'); 
        document.getElementById('btnVoltar').style.display = 'none';
        document.getElementById('btnPDFGlobal').style.display = 'none';
    }
    
    function setInf(id) { document.getElementById(id).value = '∞'; }

    function salvar(tipo, id) {
        const v = document.getElementById(id).value;
        if(v) { db[tipo].push(v); localStorage.setItem('alpha_v29_db', JSON.stringify(db)); document.getElementById(id).value=''; render(); }
    }

    function render() {
        document.getElementById('listaLocais').innerHTML = db.locais.map(l => `<option>${l}</option>`).join('');
        document.getElementById('poolTecnicos').innerHTML = db.tecnicos.map(t => `<span style="background:#fff; padding:6px; border-radius:5px; margin:3px; display:inline-block; border:1px solid #94a3b8; cursor:pointer; font-size:11px;" onclick="addTec('${t}')">${t}</span>`).join('');
        document.getElementById('tecsSelecionados').innerHTML = selecionados.map(s => `<div>- ${s}</div>`).join('');
    }

    function addTec(t) { if(!selecionados.includes(t)) selecionados.push(t); render(); }

    function convM(v, u) {
        if(v === '∞') return 999999999999;
        let n = parseFloat(v.toString().replace(',', '.'));
        if(isNaN(n)) return null; 
        return (u === 'GΩ') ? n * 1000 : (u === 'TΩ') ? n * 1000000 : n;
    }

    function addMegger() {
        const ref = convM(document.getElementById('mRef').value, document.getElementById('uRef').value);
        const v30 = convM(document.getElementById('r30').value, document.getElementById('u30').value);
        const v60 = convM(document.getElementById('r60').value, document.getElementById('u60').value);
        const v120 = convM(document.getElementById('r120').value, document.getElementById('u120').value);
        let repro = (v30 !== null && v30 < ref) || (v60 !== null && v60 < ref) || (v120 !== null && v120 < ref);
        const row = `<tr class="${repro ? 'status-repro' : 'status-aprov'}">
            <td>${document.getElementById('mPonto').value}</td><td>${document.getElementById('mTensao').value}</td>
            <td>${document.getElementById('r30').value}${document.getElementById('r30').value==='∞'?'':document.getElementById('u30').value}</td>
            <td>${document.getElementById('r60').value}${document.getElementById('r60').value==='∞'?'':document.getElementById('u60').value}</td>
            <td>${document.getElementById('r120').value}${document.getElementById('r120').value==='∞'?'':document.getElementById('u120').value}</td>
            <td>${repro ? 'REPROVADO' : 'APROVADO'}</td><td class="no-print"><button onclick="checkData(this)">❌</button></td></tr>`;
        document.getElementById('tabMeg').querySelector('tbody').innerHTML += row;
        document.getElementById('secMEG').classList.add('tem-dados');
    }

    function addTTR() {
        const nom = parseFloat(document.getElementById('ttrNom').value.replace(',','.'));
        const a = parseFloat(document.getElementById('ttrA').value.replace(',','.'));
        const b = parseFloat(document.getElementById('ttrB').value.replace(',','.'));
        const c = parseFloat(document.getElementById('ttrC').value.replace(',','.'));
        const erro = Math.max(Math.abs((a-nom)/nom), Math.abs((b-nom)/nom), Math.abs((c-nom)/nom)) * 100;
        const row = `<tr><td>${nom}</td><td>${a}</td><td>${b}</td><td>${c}</td><td>${erro.toFixed(3)}%</td><td class="no-print"><button onclick="checkData(this)">❌</button></td></tr>`;
        document.getElementById('tabTTR').querySelector('tbody').innerHTML += row;
        document.getElementById('secTTR').classList.add('tem-dados');
    }

    function addMicro() {
        const v = parseFloat(document.getElementById('micV').value.replace(',','.'));
        const t = parseFloat(document.getElementById('micT').value);
        const v20 = (v * (234.5 + 20)) / (234.5 + t);
        const row = `<tr><td>${document.getElementById('micP').value}</td><td>${v}</td><td>${v20.toFixed(4)}</td><td class="no-print"><button onclick="checkData(this)">❌</button></td></tr>`;
        document.getElementById('tabMicro').querySelector('tbody').innerHTML += row;
        document.getElementById('secMICRO').classList.add('tem-dados');
    }

    function checkData(btn) {
        const tab = btn.closest('table');
        btn.closest('tr').remove();
        if(tab.querySelectorAll('tbody tr').length === 0) tab.closest('.tela').classList.remove('tem-dados');
    }

    window.onload = render;
</script>
</body>
</html>
