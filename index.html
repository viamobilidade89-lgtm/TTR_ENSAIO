<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ENSAIOS PRO EVOLUTION</title>
    <style>
        :root { --p: #facc15; --bg: #ffffff; --dark: #0f172a; --accent: #0284c7; --danger: #ef4444; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); margin: 0; padding: 0; color: var(--dark); display: flex; flex-direction: column; min-height: 100vh; }
        
        input, select, textarea { text-transform: uppercase; }

        /* Splash Screen */
        #splash { position: fixed; top:0; left:0; width:100%; height:100%; background: var(--dark); display:flex; flex-direction:column; align-items:center; justify-content:center; z-index:9999; transition: 0.6s; }
        .logo-box { position: relative; display: flex; align-items: center; justify-content: center; margin-bottom: 20px; }
        .logo-circle { width: 120px; height: 120px; border: 4px solid var(--p); border-radius: 50%; position: absolute; animation: pulse 2s infinite; }
        .bolt-logo { width: 60px; height: 80px; background: var(--p); clip-path: polygon(45% 0%, 100% 0%, 55% 45%, 100% 45%, 15% 100%, 45% 55%, 0% 55%); z-index: 2; }
        .empresa-nome { color: white; font-weight: 900; font-size: 24px; letter-spacing: 2px; text-align: center; }
        @keyframes pulse { 0% { transform: scale(1); opacity: 1; } 100% { transform: scale(1.4); opacity: 0; } }

        /* Header */
        header { display: flex; justify-content: center; align-items: center; padding: 25px 20px; background: white; position: relative; }
        .header-title { font-size: 20px; font-weight: 900; color: var(--accent); margin: 0; text-align: center; letter-spacing: 1px; }
        .config-icon { position: absolute; right: 25px; font-size: 18px; cursor: pointer; background: none; border: none; color: #cbd5e1; }

        /* Menu Monolito com Descrições */
        #main-wrapper { flex: 1; display: flex; align-items: center; justify-content: center; }
        .monolito-menu { 
            display: flex; 
            flex-direction: column; 
            width: 90%; 
            max-width: 340px; 
            background: linear-gradient(145deg, #0284c7, #0271ab); 
            border-radius: 35px; 
            overflow: hidden; 
            box-shadow: 0 20px 40px rgba(2, 132, 199, 0.25); 
        }
        .btn-monolito { 
            background: transparent; 
            color: white; 
            border: none; 
            padding: 30px 20px; 
            cursor: pointer; 
            display: flex; 
            align-items: center; 
            gap: 20px; 
            position: relative; 
            text-align: left;
        }
        .btn-monolito:active { background: rgba(255, 255, 255, 0.1); }
        .btn-monolito:not(:last-child)::after { content: ""; position: absolute; bottom: 0; left: 15%; width: 70%; height: 1px; background: rgba(255,255,255,0.1); }

        .btn-text { display: flex; flex-direction: column; }
        .btn-label { font-size: 18px; font-weight: 800; letter-spacing: 1px; }
        .btn-desc { font-size: 11px; font-weight: 400; color: rgba(255,255,255,0.7); text-transform: uppercase; margin-top: 2px; }

        .icon-box { width: 40px; height: 40px; display: flex; align-items: center; justify-content: center; font-size: 24px; }
        
        /* Ícone Pager */
        .pager-mini { width: 28px; height: 20px; background: #f84c4c; border-radius: 4px; position: relative; border: 1.5px solid white; }
        .pager-screen-mini { position: absolute; top: 3px; left: 3px; right: 3px; height: 7px; background: #86efac; border-radius: 1px; }

        /* Telas */
        .tela { display: none; padding: 20px; flex: 1; animation: fadeIn 0.3s forwards; }
        .ativa { display: block !important; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

        .card { background: #f8fafc; padding: 25px; border-radius: 25px; border: 1px solid #e2e8f0; max-width: 500px; margin: auto; }
        footer { text-align: center; padding: 20px; font-size: 10px; color: #cbd5e1; letter-spacing: 2px; }
    </style>
</head>
<body>

<div id="splash">
    <div class="logo-box">
        <div class="logo-circle"></div>
        <div class="bolt-logo"></div>
    </div>
    <div class="empresa-nome">PRO EVOLUTION</div>
</div>

<header class="no-print">
    <h1 class="header-title">ENSAIOS PRO EVOLUTION</h1>
    <button class="config-icon" onclick="mudar('CONFIG')">⚙️</button>
</header>

<div id="main-wrapper" class="no-print">
    <div id="menuHome" class="monolito-menu">
        <button class="btn-monolito" onclick="mudar('MEG')">
            <div class="icon-box">⚡</div>
            <div class="btn-text">
                <span class="btn-label">MEGGER</span>
                <span class="btn-desc">Resistência de isolação</span>
            </div>
        </button>

        <button class="btn-monolito" onclick="mudar('TTR')">
            <div class="icon-box">📟</div>
            <div class="btn-text">
                <span class="btn-label">TTR</span>
                <span class="btn-desc">Relação de transformação</span>
            </div>
        </button>

        <button class="btn-monolito" onclick="mudar('MICRO')">
            <div class="icon-box">
                <div class="pager-mini"><div class="pager-screen-mini"></div></div>
            </div>
            <div class="btn-text">
                <span class="btn-label">MICRO</span>
                <span class="btn-desc">Resistência de contato</span>
            </div>
        </button>
    </div>
</div>

<div id="secMEG" class="tela">
    <div class="card">
        <h3 style="text-align:center; color:var(--accent); margin-top:0">CONTROLE MEGGER</h3>
        <button onclick="voltar()" style="width:100%; background:#64748b; color:white; padding:14px; border-radius:15px; border:none; font-weight:bold; cursor:pointer">VOLTAR</button>
    </div>
</div>

<div id="secCONFIG" class="tela">
    <div class="card">
        <h3 style="color:var(--accent); margin-top:0">CONFIGURAÇÕES</h3>
        <button onclick="voltar()" style="width:100%; background:#64748b; color:white; padding:16px; border-radius:15px; border:none; font-weight:bold; margin-top:25px">FECHAR</button>
    </div>
</div>

<footer>PRODUCED BY UNKNOWN</footer>

<script>
    window.onload = () => { setTimeout(() => { document.getElementById('splash').style.display='none'; }, 3000); };
    function mudar(t) {
        document.getElementById('main-wrapper').style.display = 'none';
        document.querySelectorAll('.tela').forEach(x => x.classList.remove('ativa'));
        if(t === 'HOME') document.getElementById('main-wrapper').style.display = 'flex';
        else document.getElementById('sec'+t).classList.add('ativa');
    }
    function voltar() { mudar('HOME'); }
</script>
</body>
</html>
