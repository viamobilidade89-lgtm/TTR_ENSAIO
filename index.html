<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ENSAIOS PRO EVOLUTION</title>
    <style>
        :root { --p: #facc15; --bg: #ffffff; --dark: #0f172a; --accent: #0284c7; --danger: #ef4444; --success: #16a34a; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); margin: 0; padding: 0; color: var(--dark); display: flex; flex-direction: column; min-height: 100vh; overflow-x: hidden; }
        
        input, select { text-transform: uppercase; width: 100%; padding: 12px; border: 2px solid #cbd5e1; border-radius: 12px; font-size: 15px; box-sizing: border-box; margin-bottom: 10px; }
        label { font-size: 11px; font-weight: 800; color: #64748b; margin-left: 5px; text-transform: uppercase; display: block; margin-bottom: 4px; }

        /* Splash Screen */
        #splash { position: fixed; top:0; left:0; width:100%; height:100%; background: var(--dark); display:flex; flex-direction:column; align-items:center; justify-content:center; z-index:9999; }
        .logo-box { position: relative; display: flex; align-items: center; justify-content: center; margin-bottom: 20px; }
        .logo-circle { width: 140px; height: 140px; border: 5px solid var(--p); border-radius: 50%; position: absolute; animation: pulse 2s infinite; }
        .bolt-logo { width: 70px; height: 90px; background: var(--p); clip-path: polygon(45% 0%, 100% 0%, 55% 45%, 100% 45%, 15% 100%, 45% 55%, 0% 55%); z-index: 2; }
        .empresa-nome { color: white; font-weight: 900; font-size: 28px; letter-spacing: 3px; text-align: center; }
        @keyframes pulse { 0% { transform: scale(1); opacity: 1; } 100% { transform: scale(1.4); opacity: 0; } }

        /* Header */
        header { display: grid; grid-template-columns: 50px 1fr 50px; align-items: center; padding: 25px 15px; background: white; border-bottom: 1px solid #f1f5f9; }
        .header-title { grid-column: 2; font-size: 20px; font-weight: 900; color: var(--accent); margin: 0; text-align: center; letter-spacing: 1px; }
        .config-icon { grid-column: 3; font-size: 24px; cursor: pointer; background: none; border: none; color: #cbd5e1; justify-self: end; }

        /* Interface Principal */
        #main-wrapper { flex: 1; display: flex; align-items: center; justify-content: center; padding: 20px; }
        .monolito-menu { display: flex; flex-direction: column; width: 95%; max-width: 400px; background: linear-gradient(145deg, #0284c7, #0271ab); border-radius: 40px; overflow: hidden; box-shadow: 0 30px 60px rgba(2, 132, 199, 0.45); }
        .btn-monolito { background: transparent; color: white; border: none; padding: 45px 25px; cursor: pointer; display: flex; align-items: center; gap: 25px; position: relative; text-align: left; border-bottom: 1px solid rgba(255,255,255,0.1); }
        .btn-monolito:last-child { border-bottom: none; }
        .icon-box { width: 50px; height: 50px; display: flex; align-items: center; justify-content: center; font-size: 40px; filter: drop-shadow(0 4px 6px rgba(0,0,0,0.3)); }
        .btn-label { font-size: 22px; font-weight: 900; display: block; text-shadow: 0 2px 4px rgba(0,0,0,0.2); }
        .btn-desc { font-size: 12px; color: rgba(255,255,255,0.8); }

        /* Telas */
        .tela { display: none; padding: 20px; animation: fadeIn 0.4s ease-out; }
        .ativa { display: block !important; }
        .card { background: #f8fafc; padding: 25px; border-radius: 30px; border: 1px solid #e2e8f0; max-width: 600px; margin: auto; margin-bottom: 20px; box-shadow: 0 10px 25px rgba(0,0,0,0.05); }
        .btn-acao { width: 100%; padding: 18px; border-radius: 15px; border: none; font-weight: bold; font-size: 16px; cursor: pointer; color: white; margin-top: 10px; }
        
        .multi-select { background: white; border: 2px solid #cbd5e1; border-radius: 12px; padding: 10px; max-height: 150px; overflow-y: auto; margin-bottom: 10px; }
        .multi-item { display: flex; align-items: center; justify-content: flex-start; gap: 12px; padding: 10px; border-bottom: 1px solid #f1f5f9; font-size: 14px; font-weight: 600; text-align: left; }
        .multi-item input { width: 20px; height: 20px; margin: 0; cursor: pointer; }

        .btn-inf { background: #e2e8f0; border: none; border-radius: 8px; padding: 0 15px; cursor: pointer; font-size: 20px; font-weight: bold; margin-bottom: 10px; height: 45px; }

        /* Tabela */
        .table-wrap { overflow-x: auto; background: white; border-radius: 15px; border: 1px solid #e2e8f0; }
        table { width: 100%; border-collapse: collapse; font-size: 10px; min-width: 520px; }
        th { background: #f1f5f9; padding: 10px; border-bottom: 2px solid #e2e8f0; }
        td { padding: 10px; border-bottom: 1px solid #f1f5f9; text-align: center; }
        .btn-del-row { background: var(--danger); color: white; border: none; border-radius: 6px; padding: 6px 10px; font-weight: bold; cursor: pointer; }

        /* Histórico */
        .hist-item { background: white; border: 1px solid #e2e8f0; padding: 18px; border-radius: 20px; margin-bottom: 15px; border-left: 6px solid var(--accent); box-shadow: 0 4px 10px rgba(0,0,0,0.03); }
        .hist-btns { display: flex; gap: 8px; margin-top: 12px; }
        .btn-mini { flex: 1; padding: 12px; border: none; border-radius: 10px; color: white; font-weight: bold; font-size: 11px; cursor: pointer; }

        .chip-delete { display: inline-flex; align-items: center; background: #f1f5f9; padding: 5px 12px; border-radius: 20px; margin: 4px; font-weight: bold; font-size: 13px; }
        .chip-delete b { color: var(--danger); margin-left: 8px; cursor: pointer; padding: 2px 6px; }

        /* TTR específico */
        .pontas-box { background: white; border: 2px solid #0284c7; border-radius: 15px; padding: 15px; margin-bottom: 10px; }
        .pontas-title { font-size: 10px; font-weight: 800; color: var(--accent); text-transform: uppercase; margin-bottom: 10px; letter-spacing: 1px; }
        .ponta-row { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-bottom: 6px; font-size: 12px; font-weight: 700; }
        .ponta-label { background: #f1f5f9; padding: 8px 10px; border-radius: 8px; color: #334155; }
        .teorico-box { background: linear-gradient(135deg, #0f172a, #1e293b); color: white; border-radius: 15px; padding: 15px; margin-bottom: 10px; text-align: center; }
        .teorico-val { font-size: 28px; font-weight: 900; color: var(--p); letter-spacing: 1px; }
        .teorico-formula { font-size: 11px; color: rgba(255,255,255,0.6); margin-top: 4px; }
        .tab-seg { display: flex; gap: 8px; margin-bottom: 15px; }
        .tab-btn { flex: 1; padding: 10px; border: 2px solid #cbd5e1; border-radius: 10px; background: white; font-weight: 700; font-size: 12px; cursor: pointer; color: #64748b; }
        .tab-btn.ativo { background: var(--accent); color: white; border-color: var(--accent); }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        footer { text-align: center; padding: 30px; font-size: 11px; color: #cbd5e1; letter-spacing: 2px; }
    </style>
</head>
<body>

<div id="splash">
    <div class="logo-box">
        <div class="logo-circle"></div>
        <div class="bolt-logo"></div>
    </div>
    <div class="empresa-nome">PRO EVOLUTION</div>
</div>

<header>
    <div></div>
    <h1 class="header-title">ENSAIOS PRO EVOLUTION</h1>
    <button class="config-icon" onclick="mudar('CONFIG')">⚙️</button>
</header>

<div id="main-wrapper">
    <div id="menuHome" class="monolito-menu">
        <button class="btn-monolito" onclick="mudar('MEG')">
            <div class="icon-box">⚡</div>
            <div><span class="btn-label">MEGGER</span><span class="btn-desc">Resistência de isolação</span></div>
        </button>
        <button class="btn-monolito" onclick="mudar('TTR')">
            <div class="icon-box">📟</div>
            <div><span class="btn-label">TTR</span><span class="btn-desc">Relação de transformação</span></div>
        </button>
        <button class="btn-monolito" onclick="mudar('MICRO')">
            <div class="icon-box">🔬</div>
            <div><span class="btn-label">MICRO</span><span class="btn-desc">Em breve</span></div>
        </button>
    </div>
</div>

<!-- ========== TELA MEGGER ========== -->
<div id="secMEG" class="tela">
    <div class="card">
        <button class="btn-acao" style="background:var(--dark); margin-bottom:20px" onclick="novoEnsaioMeg()">+ NOVO ENSAIO</button>
        <h2 style="text-align:center; color:var(--accent); margin:0 0 20px 0">ENSAIO MEGGER</h2>
        <input type="hidden" id="editId">
        
        <label>1. TAG do Equipamento</label>
        <input type="text" id="mTag" placeholder="EX: TR-01">

        <label>2. Técnicos</label>
        <div id="mTecContainer" class="multi-select"></div>

        <label>3. Local</label>
        <select id="mLoc"></select>

        <label>4. Ponto de Medição</label>
        <select id="mPonto">
            <option>PRIMÁRIO X SECUNDÁRIO</option><option>PRIMÁRIO X CARCAÇA</option>
            <option>SECUNDÁRIO X CARCAÇA</option><option>CAMIS</option>
        </select>

        <label>5. Tensão Aplicada</label>
        <select id="mTen">
            <option>250V</option><option>500V</option><option>1KV</option><option>2,5KV</option><option>5KV</option>
        </select>

        <label>6. Resistência de Referência (Mínima)</label>
        <div style="display:flex; gap:5px">
            <input type="number" id="mRef" placeholder="VALOR" inputmode="decimal">
            <select id="mRefUni" style="width:100px"><option>MΩ</option><option>GΩ</option><option>TΩ</option></select>
        </div>

        <label>7/8. Leituras e Tempos</label>
        <div style="display:flex; gap:5px; align-items: center">
            <input type="text" id="m30" placeholder="30s" inputmode="decimal">
            <button class="btn-inf" onclick="setInf('m30')">∞</button>
            <select id="u30" style="width:90px"><option>MΩ</option><option>GΩ</option><option>TΩ</option></select>
        </div>
        <div style="display:flex; gap:5px; align-items: center">
            <input type="text" id="m60" placeholder="60s" inputmode="decimal">
            <button class="btn-inf" onclick="setInf('m60')">∞</button>
            <select id="u60" style="width:90px"><option>MΩ</option><option>GΩ</option><option>TΩ</option></select>
        </div>
        <div style="display:flex; gap:5px; align-items: center">
            <input type="text" id="m120" placeholder="120s" inputmode="decimal">
            <button class="btn-inf" onclick="setInf('m120')">∞</button>
            <select id="u120" style="width:90px"><option>MΩ</option><option>GΩ</option><option>TΩ</option></select>
        </div>

        <button class="btn-acao" style="background:var(--accent)" onclick="registrarMegger()">REGISTRAR NO QUADRO</button>
    </div>

    <div class="card" style="padding:15px">
        <div class="table-wrap">
            <table id="tabMegResult">
                <thead><tr><th>PONTO</th><th>TEN.</th><th>30s</th><th>60s</th><th>120s</th><th>ST.</th><th>×</th></tr></thead>
                <tbody></tbody>
            </table>
        </div>
        <button class="btn-acao" style="background:var(--success); margin-top:20px" onclick="salvarHistoricoMeg()">💾 SALVAR NO HISTÓRICO</button>
        <button class="btn-acao" style="background:#7c3aed; margin-top:8px" onclick="irParaEnsaio('TTR')">📟 CONTINUAR NO TTR →</button>
    </div>
    <button class="btn-acao" style="background:#64748b; max-width:600px; display:block; margin:0 auto 20px" onclick="voltar()">VOLTAR AO MENU</button>
</div>

<!-- ========== TELA TTR ========== -->
<div id="secTTR" class="tela">
    <div class="card">
        <button class="btn-acao" style="background:var(--dark); margin-bottom:20px" onclick="novoEnsaioTTR()">+ NOVO ENSAIO</button>
        <h2 style="text-align:center; color:var(--accent); margin:0 0 20px 0">ENSAIO TTR</h2>
        <input type="hidden" id="tEditId">

        <label>1. TAG do Equipamento</label>
        <input type="text" id="tTag" placeholder="EX: TR-01">

        <label>2. Técnicos</label>
        <div id="tTecContainer" class="multi-select"></div>

        <label>3. Local</label>
        <select id="tLoc"></select>

        <label>4. Fasorial</label>
        <select id="tFasorial" onchange="atualizarTTR()">
            <option value="">-- SELECIONE --</option>
            <option value="Ydn1_Ydn11">Ydn1 / Ydn11 (300° / 30°)</option>
            <option value="Yd1">Yd1 (300° / 330°)</option>
            <option value="Yd11">Yd11 (30°)</option>
            <option value="Dyn1_Dyn11">Dyn1 / Dyn11 (300° / 30°)</option>
            <option value="Dy1">Dy1 (330° / -30°)</option>
            <option value="Dy11">Dy11 (30°)</option>
            <option value="Yyn0">Yyn0 (0°)</option>
            <option value="Ynyn0">Ynyn0 (0°)</option>
            <option value="Yy0_Dd0">Yy0 / Dd0 (0°)</option>
        </select>

        <!-- Seletor X0 / H0 - aparece conforme fasorial -->
        <div id="tNeutralBox" style="display:none; margin-bottom:10px">
            <label>5. Configuração de Neutro</label>
            <div class="tab-seg">
                <button class="tab-btn ativo" id="btnX0" onclick="selecionarNeutro('X0')">C/ X0 APARENTE</button>
                <button class="tab-btn" id="btnH0" onclick="selecionarNeutro('H0')">C/ H0 APARENTE</button>
            </div>
        </div>

        <label>5. Tensão U1 (Entrada - Primário)</label>
        <div style="display:flex; gap:5px">
            <input type="number" id="tU1" placeholder="EX: 13800" inputmode="decimal" oninput="calcTeoricoTTR()">
            <select id="tU1uni" style="width:80px" onchange="calcTeoricoTTR()"><option>V</option><option>kV</option></select>
        </div>

        <label>6. Tensão U2 (Saída - Secundário)</label>
        <div style="display:flex; gap:5px">
            <input type="number" id="tU2" placeholder="EX: 380" inputmode="decimal" oninput="calcTeoricoTTR()">
            <select id="tU2uni" style="width:80px" onchange="calcTeoricoTTR()"><option>V</option><option>kV</option></select>
        </div>

        <!-- Pontas de prova -->
        <div id="tPontasBox" style="display:none; margin-top:10px">
            <label>Pontas de Prova</label>
            <div class="pontas-box" id="tPontasConteudo"></div>

            <label>Valor Teórico Calculado</label>
            <div class="teorico-box">
                <div class="teorico-val" id="tTeoricoVal">--</div>
                <div class="teorico-formula" id="tTeoricoFormula">Insira U1 e U2</div>
            </div>

            <label>7/8. Valores Medidos por Fase</label>
            <div id="tCamposFases"></div>

            <button class="btn-acao" style="background:var(--accent)" onclick="registrarTTR()">REGISTRAR NO QUADRO</button>
        </div>
    </div>

    <div class="card" style="padding:15px">
        <div class="table-wrap">
            <table id="tabTTRResult">
                <thead><tr><th>FASORIAL</th><th>FASE</th><th>TEÓRICO</th><th>MEDIDO</th><th>DESVIO%</th><th>ST.</th><th>×</th></tr></thead>
                <tbody></tbody>
            </table>
        </div>
        <button class="btn-acao" style="background:var(--success); margin-top:20px" onclick="salvarHistoricoTTR()">💾 SALVAR NO HISTÓRICO</button>
        <button class="btn-acao" style="background:var(--accent); margin-top:8px" onclick="irParaEnsaio('MEG')">⚡ CONTINUAR NO MEGGER →</button>
    </div>
    <button class="btn-acao" style="background:#64748b; max-width:600px; display:block; margin:0 auto 20px" onclick="voltar()">VOLTAR AO MENU</button>
</div>

<!-- ========== TELA MICRO (placeholder) ========== -->
<div id="secMICRO" class="tela">
    <div class="card" style="text-align:center; padding:60px 25px">
        <div style="font-size:60px; margin-bottom:20px">🔬</div>
        <h2 style="color:var(--accent)">MICRO-OHMÍMETRO</h2>
        <p style="color:#94a3b8">Em desenvolvimento. Em breve disponível.</p>
        <button class="btn-acao" style="background:#64748b; margin-top:20px" onclick="voltar()">VOLTAR AO MENU</button>
    </div>
</div>

<!-- ========== TELA CONFIG ========== -->
<div id="secCONFIG" class="tela">
    <div class="card">
        <h3>📁 HISTÓRICO DE ENSAIOS</h3>
        <div id="listaHist"></div>
        <hr>
        <h3>👥 CADASTRAR TÉCNICO</h3>
        <div style="display:flex; gap:8px">
            <input type="text" id="cTec" placeholder="NOME" style="margin:0">
            <button onclick="addCfg('tecnicos','cTec')" style="background:var(--accent); color:white; border:none; border-radius:12px; width:50px; font-size:20px">+</button>
        </div>
        <div id="lTec" style="margin-top:10px"></div>
        <h3>📍 CADASTRAR LOCAL</h3>
        <div style="display:flex; gap:8px">
            <input type="text" id="cLoc" placeholder="LOCAL" style="margin:0">
            <button onclick="addCfg('locais','cLoc')" style="background:var(--accent); color:white; border:none; border-radius:12px; width:50px; font-size:20px">+</button>
        </div>
        <div id="lLoc" style="margin-top:10px"></div>
        <button class="btn-acao" style="background:#64748b; margin-top:20px" onclick="voltar()">FECHAR</button>
    </div>
</div>

<footer>PRODUCED BY UNKNOWN</footer>
