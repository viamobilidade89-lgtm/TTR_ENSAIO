<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ENSAIO PRO - RELATÓRIO TÉCNICO</title>
    <style>
        :root { --p: #38bdf8; --bg: #0f172a; --c: #1e293b; --t: #f1f5f9; --s: #10b981; --e: #f43f5e; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); color: var(--t); margin: 0; padding: 10px; }
        
        /* Cabeçalho App */
        header { background: var(--c); padding: 15px; border-radius: 8px; border-bottom: 3px solid var(--p); display: flex; justify-content: space-between; align-items: center; }
        .tela { display: none; background: var(--c); padding: 15px; border-radius: 12px; border: 1px solid #334155; margin-top: 10px; }
        .ativa { display: block !important; }
        
        /* Menu e Botões */
        .grid-menu { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 10px; }
        .btn-menu { background: var(--c); border: 2px solid var(--p); padding: 20px 5px; border-radius: 12px; cursor: pointer; color: var(--p); font-weight: bold; text-align: center; text-transform: uppercase; font-size: 11px; }
        .btn-add { width: 100%; padding: 15px; background: var(--p); color: #000; border: none; border-radius: 8px; font-weight: 900; cursor: pointer; margin-top: 15px; }
        .btn-inf { background: #475569; color: white; border: none; border-radius: 4px; padding: 10px 0; cursor: pointer; font-size: 18px; }
        .btn-voltar { background: #475569; color: white; border: none; padding: 8px 15px; border-radius: 5px; cursor: pointer; margin-bottom: 10px; }
        
        /* Inputs */
        label { display: block; font-size: 10px; color: var(--p); font-weight: bold; margin: 8px 0 4px; text-transform: uppercase; }
        input, select { width: 100%; padding: 10px; background: #020617; border: 1px solid #334155; color: white; border-radius: 6px; box-sizing: border-box; }
        .row-ensaio { display: grid; grid-template-columns: 1fr 80px 45px; gap: 5px; align-items: end; margin-bottom: 5px; }

        /* Tabelas */
        table { width: 100%; border-collapse: collapse; margin-top: 15px; font-size: 11px; background: #020617; }
        th, td { border: 1px solid #475569; padding: 8px; text-align: center; }
        .tag-tec { background: var(--p); color: #000; padding: 5px 10px; border-radius: 4px; font-size: 11px; margin: 2px; display: inline-block; font-weight: bold; }

        /* --- CONFIGURAÇÃO DE IMPRESSÃO (LAUDO) --- */
        @media print {
            .no-print, .btn-del, .btn-add, .btn-voltar, .btn-inf, header, .grid-menu { display: none !important; }
            body { background: white !important; color: black !important; padding: 0; }
            .tela { display: block !important; border: none !important; background: white !important; color: black !important; padding: 0; margin: 0; }
            
            /* Título do Laudo solicitado */
            .print-header { display: block !important; text-align: center; border-bottom: 2px solid black; margin-bottom: 20px; padding-bottom: 10px; }
            .print-header h1 { margin: 0; font-size: 24px; text-transform: uppercase; }
            
            /* Identificação e Equipe vertical */
            .dados-print { margin-bottom: 20px; }
            .dados-print div { margin-bottom: 5px; font-size: 14px; }
            #tecsSelecionados span { display: block !important; background: none !important; color: black !important; padding: 0 !important; margin: 0 !important; font-size: 13px; font-weight: normal; }
            #tecsSelecionados span::before { content: "- "; }
            
            /* Tabelas de Impressão */
            table { background: white !important; color: black !important; border: 1px solid black !important; width: 100% !important; margin-bottom: 30px; }
            th { background: #eee !important; color: black !important; border: 1px solid black !important; }
            td { border: 1px solid black !important; }
            
            /* Esconder seções vazias */
            .tela:empty, table tbody:empty { display: none !important; }
            label { color: black !important; font-size: 12px; margin-top: 15px; }
            input, select { border: none !important; color: black !important; font-weight: bold; font-size: 14px; padding: 0; }
        }
        
        .print-header { display: none; }
    </style>
</head>
<body>

<div class="print-header">
    <h1>ENSAIO PRO</h1>
</div>

<header class="no-print">
    <div><b>ALPHA v20.0</b><br><small>RELATÓRIO DE CAMPO</small></div>
    <button onclick="mudar('CONFIG')" style="background:none; border:1px solid var(--p); color:var(--p); border-radius:5px; padding:5px 10px;">CONFIG</button>
</header>

<div id="menuHome" class="grid-menu no-print ativa">
    <div class="btn-menu" onclick="mudar('MEG')">⚡<br>MEGGER</div>
    <div class="btn-menu" onclick="mudar('TTR')">📊<br>TTR</div>
    <div class="btn-menu" onclick="mudar('MICRO')">📟<br>MICRO</div>
    <div class="btn-menu" onclick="window.print()">🖨️<br>IMPRIMIR LAUDO</div>
</div>

<div id="blocoDados" class="tela">
    <div class="dados-print">
        <div><label>Equipamento (TAG):</label> <input type="text" id="tag" placeholder="Digite a TAG"></div>
        <div><label>Local:</label> <select id="listaLocais" class="no-print"></select> <span class="only-print" id="localText"></span></div>
        <div style="margin-top:15px;"><label>Equipe Técnica:</label>
            <div id="poolTecnicos" class="no-print" style="background:#020617; padding:10px; border-radius:8px; margin-top:5px;"></div>
            <div id="tecsSelecionados"></div>
        </div>
    </div>
</div>

<div id="secMEG" class="tela">
    <button class="btn-voltar no-print" onclick="voltar()">← VOLTAR</button>
    <h3 class="only-print" style="margin-top:20px; border-bottom: 1px solid #ccc;">Ensaio de Isolação (Megger)</h3>
    
    <div class="no-print">
        <div style="display:grid; grid-template-columns: 1fr 1fr; gap:10px;">
            <div><label>PONTO</label>
                <select id="mPonto">
                    <option>ENTRADA x SAÍDA</option>
                    <option>ENTRADA x CARCAÇA</option>
                    <option>SAÍDA x CARCAÇA</option>
                    <option>CAMIS - Entrada e carcaça</option>
                </select>
            </div>
            <div><label>TENSÃO</label><select id="mTensao"><option>500V</option><option>1kV</option><option>2.5kV</option><option>5kV</option></select></div>
        </div>
        <label>REF. MÍNIMA (PARA APROVAÇÃO)</label>
        <div class="row-ensaio">
            <input type="number" id="mRef" placeholder="Valor">
            <select id="uRef"><option>MΩ</option><option>GΩ</option><option>TΩ</option></select>
            <span></span>
        </div>
        <label>30 SEG / 60 SEG / 120 SEG</label>
        <div class="row-ensaio"><input type="text" id="r30"><select id="u30"><option>MΩ</option><option>GΩ</option><option>TΩ</option></select><button class="btn-inf" onclick="setInf('r30', 'u30')">∞</button></div>
        <div class="row-ensaio"><input type="text" id="r60"><select id="u60"><option>MΩ</option><option>GΩ</option><option>TΩ</option></select><button class="btn-inf" onclick="setInf('r60', 'u60')">∞</button></div>
        <div class="row-ensaio"><input type="text" id="r120"><select id="u120"><option>MΩ</option><option>GΩ</option><option>TΩ</option></select><button class="btn-inf" onclick="setInf('r120', 'u120')">∞</button></div>
        <button class="btn-add" onclick="addMegger()">REGISTRAR PONTO</button>
    </div>

    <table id="tabMeg">
        <thead><tr><th>Ponto</th><th>V</th><th>30s</th><th>60s</th><th>120s</th><th>Status</th><th class="no-print">Ação</th></tr></thead>
        <tbody></tbody>
    </table>
</div>

<div id="secTTR" class="tela">
    <button class="btn-voltar no-print" onclick="voltar()">← VOLTAR</button>
    <h3 class="only-print" style="margin-top:20px; border-bottom: 1px solid #ccc;">Relação de Transformação (TTR)</h3>
    <div class="no-print">
        <label>RELAÇÃO NOMINAL</label><input type="number" id="ttrNom" step="0.001">
        <div style="display:grid; grid-template-columns:1fr 1fr 1fr; gap:5px;">
            <div><label>FASE A</label><input type="number" id="ttrA" step="0.001"></div>
            <div><label>FASE B</label><input type="number" id="ttrB" step="0.001"></div>
            <div><label>FASE C</label><input type="number" id="ttrC" step="0.001"></div>
        </div>
        <button class="btn-add" onclick="addTTR()">ADICIONAR TTR</button>
    </div>
    <table id="tabTTR"><thead><tr><th>Nominal</th><th>A</th><th>B</th><th>C</th><th>Erro %</th><th class="no-print">Ação</th></tr></thead><tbody></tbody></table>
</div>

<div id="secMICRO" class="tela">
    <button class="btn-voltar no-print" onclick="voltar()">← VOLTAR</button>
    <h3 class="only-print" style="margin-top:20px; border-bottom: 1px solid #ccc;">Resistência Ôhmica (Micro)</h3>
    <div class="no-print">
        <div style="display:grid; grid-template-columns:1fr 1fr; gap:10px;">
            <div><label>PONTO</label><input type="text" id="micP" placeholder="ex: H1-H2"></div>
            <div><label>TEMP. (°C)</label><input type="number" id="micT" value="25"></div>
        </div>
        <label>LIDO (mΩ)</label><input type="number" id="micV" step="0.0001">
        <button class="btn-add" onclick="addMicro()">ADICIONAR MICRO</button>
    </div>
    <table id="tabMicro"><thead><tr><th>Ponto</th><th>Lido (mΩ)</th><th>@20°C (mΩ)</th><th class="no-print">Ação</th></tr></thead><tbody></tbody></table>
</div>

<div id="secCONFIG" class="tela no-print">
    <button class="btn-voltar" onclick="voltar()">← VOLTAR</button>
    <label>TÉCNICO</label><input type="text" id="cfgT"><button onclick="saveCfg('tecnicos','cfgT')" class="btn-add">Salvar</button>
    <label>LOCAL</label><input type="text" id="cfgL"><button onclick="saveCfg('locais','cfgL')" class="btn-add">Salvar</button>
</div>

<script>
    let db = JSON.parse(localStorage.getItem('alpha_v20')) || { tecnicos: [], locais: [] };
    let selecionados = [];

    function mudar(t) {
        document.getElementById('menuHome').classList.remove('ativa');
        document.querySelectorAll('.tela').forEach(x => x.classList.remove('ativa'));
        document.getElementById('sec'+t).classList.add('ativa');
        document.getElementById('blocoDados').classList.add('ativa');
        render();
    }

    function voltar() { document.querySelectorAll('.tela').forEach(x => x.classList.remove('ativa')); document.getElementById('menuHome').classList.add('ativa'); }
    function setInf(id, unitId) { document.getElementById(id).value = '∞'; document.getElementById(unitId).style.visibility = 'hidden'; }

    function saveCfg(tipo, id) {
        const v = document.getElementById(id).value;
        if(v) { db[tipo].push(v); localStorage.setItem('alpha_v20', JSON.stringify(db)); render(); document.getElementById(id).value=''; }
    }

    function render() {
        document.getElementById('listaLocais').innerHTML = db.locais.map(l => `<option>${l}</option>`).join('');
        document.getElementById('poolTecnicos').innerHTML = db.tecnicos.map(t => `<button class="tag-tec" style="border:none;cursor:pointer" onclick="selTec('${t}')">${t}</button>`).join('');
        document.getElementById('tecsSelecionados').innerHTML = selecionados.map(s => `<span class="tag-tec">${s}</span>`).join('');
    }

    function selTec(t) { if(!selecionados.includes(t)) selecionados.push(t); render(); }

    function addMegger() {
        const p = document.getElementById('mPonto').value;
        const refRaw = parseFloat(document.getElementById('mRef').value);
        const refUnit = document.getElementById('uRef').value;
        const ref = refRaw * (refUnit === 'GΩ' ? 1000 : (refUnit === 'TΩ' ? 1000000 : 1));
        const r60Text = document.getElementById('r60').value;
        const r60Unit = document.getElementById('u60').value;
        let v60Num = r60Text === '∞' ? Infinity : parseFloat(r60Text) * (r60Unit === 'GΩ' ? 1000 : (r60Unit === 'TΩ' ? 1000000 : 1));
        let status = v60Num >= ref ? 'APROV.' : 'REPROV.';
        
        const row = `<tr><td>${p}</td><td>${document.getElementById('mTensao').value}</td><td>${document.getElementById('r30').value}${document.getElementById('r30').value==='∞'?'':document.getElementById('u30').value}</td><td>${document.getElementById('r60').value}${document.getElementById('r60').value==='∞'?'':document.getElementById('u60').value}</td><td>${document.getElementById('r120').value}${document.getElementById('r120').value==='∞'?'':document.getElementById('u120').value}</td><td>${status}</td><td class="no-print"><button class="btn-del" onclick="this.closest('tr').remove()">X</button></td></tr>`;
        document.getElementById('tabMeg').querySelector('tbody').innerHTML += row;
        ['r30','r60','r120'].forEach(id => document.getElementById(id).value = '');
    }

    function addTTR() {
        const nom = parseFloat(document.getElementById('ttrNom').value);
        const a = parseFloat(document.getElementById('ttrA').value);
        const b = parseFloat(document.getElementById('ttrB').value);
        const c = parseFloat(document.getElementById('ttrC').value);
        const erroMax = Math.max(Math.abs((a-nom)/nom), Math.abs((b-nom)/nom), Math.abs((c-nom)/nom)) * 100;
        const row = `<tr><td>${nom}</td><td>${a}</td><td>${b}</td><td>${c}</td><td>${erroMax.toFixed(3)}%</td><td class="no-print"><button class="btn-del" onclick="this.closest('tr').remove()">X</button></td></tr>`;
        document.getElementById('tabTTR').querySelector('tbody').innerHTML += row;
    }

    function addMicro() {
        const v = parseFloat(document.getElementById('micV').value);
        const t = parseFloat(document.getElementById('micT').value);
        const v20 = (v * (234.5 + 20)) / (234.5 + t);
        const row = `<tr><td>${document.getElementById('micP').value}</td><td>${v}</td><td>${v20.toFixed(4)}</td><td class="no-print"><button class="btn-del" onclick="this.closest('tr').remove()">X</button></td></tr>`;
        document.getElementById('tabMicro').querySelector('tbody').innerHTML += row;
    }

    window.onbeforeprint = () => { document.getElementById('localText').innerText = document.getElementById('listaLocais').value; };
    window.onload = render;
</script>
</body>
</html>
