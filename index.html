<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ENSAIO PRO v23</title>
    <style>
        :root { --p: #0284c7; --bg: #ffffff; --t: #000000; --re: #fee2e2; --ap: #dcfce7; }
        body { font-family: -apple-system, sans-serif; background: var(--bg); color: var(--t); margin: 0; padding: 5px; font-size: 12px; }
        
        header { background: #f1f5f9; padding: 8px; border-radius: 4px; display: flex; justify-content: space-between; align-items: center; border: 1px solid #ccc; margin-bottom: 5px; }
        .tela { display: none; padding: 5px; border: 1px solid #ccc; border-radius: 4px; margin-top: 5px; }
        .ativa { display: block !important; }
        
        .grid-menu { display: grid; grid-template-columns: repeat(4, 1fr); gap: 4px; }
        .btn-menu { background: var(--p); color: white; border: none; padding: 8px 2px; border-radius: 4px; font-size: 9px; font-weight: bold; cursor: pointer; text-align: center; }
        
        label { display: block; font-size: 9px; font-weight: bold; color: #444; margin: 4px 0 1px; text-transform: uppercase; }
        input, select { width: 100%; padding: 4px; border: 1px solid #999; border-radius: 3px; font-size: 13px; height: 28px; box-sizing: border-box; }
        
        .row-ensaio { display: grid; grid-template-columns: 1fr 55px 35px; gap: 3px; align-items: end; margin-bottom: 2px; }
        .btn-inf { background: #666; color: white; border: none; border-radius: 3px; height: 28px; cursor: pointer; }
        .btn-add { width: 100%; padding: 8px; background: #059669; color: white; border: none; border-radius: 4px; font-weight: bold; margin-top: 8px; }

        table { width: 100%; border-collapse: collapse; margin-top: 8px; font-size: 10px; }
        th, td { border: 1px solid #000; padding: 3px; text-align: center; }
        
        .status-repro { background: #f87171 !important; color: white; font-weight: bold; }
        .status-aprov { background: #34d399 !important; color: white; font-weight: bold; }

        .tag-tec { background: #eee; padding: 2px 5px; border-radius: 2px; font-size: 10px; border: 1px solid #ccc; display: inline-block; margin: 1px; }

        @media print {
            .no-print { display: none !important; }
            .tela { display: block !important; border: none !important; }
            .print-header { display: block !important; text-align: center; border-bottom: 2px solid #000; margin-bottom: 10px; }
            input { border: none !important; font-weight: bold; }
        }
        .print-header { display: none; }
    </style>
</head>
<body>

<div class="print-header"><h1>ENSAIO PRO</h1></div>

<header class="no-print">
    <b>ALPHA v23.0</b>
    <button onclick="window.print()" style="background:#000; color:#fff; border-radius:4px; padding:4px 8px; font-size:10px;">GERAR PDF</button>
    <button onclick="mudar('CONFIG')" style="background:#ddd; border:1px solid #999; padding:4px 8px; font-size:10px;">⚙️</button>
</header>

<div id="menuHome" class="grid-menu no-print ativa">
    <div class="btn-menu" onclick="mudar('MEG')">MEGGER</div>
    <div class="btn-menu" onclick="mudar('TTR')">TTR</div>
    <div class="btn-menu" onclick="mudar('MICRO')">MICRO</div>
    <div class="btn-menu" onclick="location.reload()" style="background:#666;">LIMPAR</div>
</div>

<div id="blocoDados" class="tela">
    <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 5px;">
        <div><label>TAG</label><input type="text" id="tag"></div>
        <div><label>LOCAL</label><select id="listaLocais"></select></div>
    </div>
    <label>EQUIPE</label>
    <div id="poolTecnicos" class="no-print"></div>
    <div id="tecsSelecionados" style="font-weight: bold; margin-top:2px;"></div>
</div>

<div id="secMEG" class="tela">
    <div class="no-print">
        <div class="row-ensaio" style="grid-template-columns: 1fr 60px;">
            <select id="mPonto">
                <option>ENTRADA x SAÍDA</option>
                <option>ENTRADA x CARCAÇA</option>
                <option>SAÍDA x CARCAÇA</option>
                <option>CAMIS - Entrada e carcaça</option>
            </select>
            <select id="mTensao"><option>500V</option><option>1kV</option><option>2.5kV</option><option>5kV</option></select>
        </div>
        
        <label>REF. MÍNIMA</label>
        <div class="row-ensaio">
            <input type="text" id="mRef" inputmode="decimal" placeholder="0.00">
            <select id="uRef"><option>MΩ</option><option>GΩ</option><option>TΩ</option></select>
        </div>

        <label>LEITURAS (30s / 60s / 120s)</label>
        <div class="row-ensaio"><input type="text" id="r30" inputmode="decimal"><select id="u30"><option>MΩ</option><option>GΩ</option><option>TΩ</option></select><button class="btn-inf" onclick="setInf('r30')">∞</button></div>
        <div class="row-ensaio"><input type="text" id="r60" inputmode="decimal"><select id="u60"><option>MΩ</option><option>GΩ</option><option>TΩ</option></select><button class="btn-inf" onclick="setInf('r60')">∞</button></div>
        <div class="row-ensaio"><input type="text" id="r120" inputmode="decimal"><select id="u120"><option>MΩ</option><option>GΩ</option><option>TΩ</option></select><button class="btn-inf" onclick="setInf('r120')">∞</button></div>
        
        <button class="btn-add" onclick="addMegger()">REGISTRAR ENSAIO</button>
    </div>

    <table id="tabMeg">
        <thead><tr><th>Ponto</th><th>V</th><th>30s</th><th>60s</th><th>120s</th><th>Status</th><th class="no-print">X</th></tr></thead>
        <tbody></tbody>
    </table>
</div>

<div id="secCONFIG" class="tela">
    <button onclick="voltar()" class="btn-add" style="background:#555;">VOLTAR</button>
    <label>TÉCNICO</label>
    <div class="row-ensaio" style="grid-template-columns: 1fr 60px;">
        <input type="text" id="cfgT">
        <button onclick="salvar('tecnicos','cfgT')" style="background:green; color:white; border:none; border-radius:3px;">ADD</button>
    </div>
    <label>LOCAL</label>
    <div class="row-ensaio" style="grid-template-columns: 1fr 60px;">
        <input type="text" id="cfgL">
        <button onclick="salvar('locais','cfgL')" style="background:green; color:white; border:none; border-radius:3px;">ADD</button>
    </div>
</div>

<script>
    let db = JSON.parse(localStorage.getItem('alpha_v23_db')) || { tecnicos: [], locais: [] };
    let selecionados = [];

    function mudar(t) {
        document.getElementById('menuHome').classList.remove('ativa');
        document.querySelectorAll('.tela').forEach(x => x.classList.remove('ativa'));
        document.getElementById('sec'+t).classList.add('ativa');
        document.getElementById('blocoDados').classList.add('ativa');
        render();
    }

    function voltar() { document.querySelectorAll('.tela').forEach(x => x.classList.remove('ativa')); document.getElementById('menuHome').classList.add('ativa'); }
    
    function setInf(id) { document.getElementById(id).value = '∞'; }

    function salvar(tipo, id) {
        const v = document.getElementById(id).value;
        if(v) { db[tipo].push(v); localStorage.setItem('alpha_v23_db', JSON.stringify(db)); document.getElementById(id).value=''; render(); }
    }

    function render() {
        document.getElementById('listaLocais').innerHTML = db.locais.map(l => `<option>${l}</option>`).join('');
        document.getElementById('poolTecnicos').innerHTML = db.tecnicos.map(t => `<span class="tag-tec" onclick="addTec('${t}')">${t}</span>`).join('');
        document.getElementById('tecsSelecionados').innerHTML = selecionados.map(s => `<div>- ${s}</div>`).join('');
    }

    function addTec(t) { if(!selecionados.includes(t)) selecionados.push(t); render(); }

    function getM(v, u) {
        if(v === '∞') return 999999999999;
        let n = Number(v.replace(',', '.'));
        if(isNaN(n)) return 0;
        if(u === 'GΩ') return n * 1000;
        if(u === 'TΩ') return n * 1000000;
        return n;
    }

    function addMegger() {
        // CAPTURA E CONVERSÃO RIGOROSA
        const vRef = getM(document.getElementById('mRef').value, document.getElementById('uRef').value);
        const v60 = getM(document.getElementById('r60').value, document.getElementById('u60').value);
        
        // COMPARAÇÃO NUMÉRICA REAL
        const reprovado = Number(v60) < Number(vRef);
        const classe = reprovado ? 'status-repro' : 'status-aprov';
        const texto = reprovado ? 'REPROVADO' : 'APROVADO';

        const row = `<tr>
            <td>${document.getElementById('mPonto').value}</td>
            <td>${document.getElementById('mTensao').value}</td>
            <td>${document.getElementById('r30').value}${document.getElementById('r30').value==='∞'?'':document.getElementById('u30').value}</td>
            <td>${document.getElementById('r60').value}${document.getElementById('r60').value==='∞'?'':document.getElementById('u60').value}</td>
            <td>${document.getElementById('r120').value}${document.getElementById('r120').value==='∞'?'':document.getElementById('u120').value}</td>
            <td class="${classe}">${texto}</td>
            <td class="no-print"><button onclick="this.closest('tr').remove()" style="border:none; background:none;">❌</button></td>
        </tr>`;
        document.getElementById('tabMeg').querySelector('tbody').innerHTML += row;
        
        // Limpa campos para o próximo ponto
        document.getElementById('r30').value = '';
        document.getElementById('r60').value = '';
        document.getElementById('r120').value = '';
    }

    window.onload = render;
</script>
</body>
</html>
