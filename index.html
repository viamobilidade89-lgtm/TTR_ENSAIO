<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ENSAIOS ALPHA - SISTEMA DE CAMPO</title>
    <style>
        :root {
            --bg: #0f172a; --card: #1e293b; --primary: #38bdf8; --success: #10b981; --error: #f43f5e; --text: #f1f5f9;
        }
        body { font-family: 'Inter', sans-serif; background: var(--bg); color: var(--text); margin: 0; min-height: 100vh; }
        .container { max-width: 900px; margin: 0 auto; padding: 20px; }
        
        header { text-align: center; padding: 20px 0; border-bottom: 1px solid rgba(255,255,255,0.1); margin-bottom: 20px; }
        .titulo-app { font-size: 2.2rem; font-weight: 900; color: var(--primary); letter-spacing: 4px; text-transform: uppercase; margin: 0; }

        .dashboard-menu { display: grid; grid-template-columns: repeat(2, 1fr); gap: 15px; }
        .icon-card { 
            background: var(--card); border: 1px solid rgba(255,255,255,0.05); border-radius: 15px; 
            padding: 30px 10px; text-align: center; cursor: pointer; transition: 0.3s;
        }
        .icon-card:hover { border-color: var(--primary); transform: translateY(-3px); }
        .icon-card i { font-size: 2.5rem; display: block; margin-bottom: 10px; font-style: normal; }
        .icon-card span { font-weight: 800; font-size: 0.8rem; color: var(--primary); letter-spacing: 1px; }

        .glass { background: var(--card); border: 1px solid rgba(255,255,255,0.1); border-radius: 12px; padding: 20px; margin-bottom: 20px; }
        .section { display: none; }
        .active { display: block; animation: fadeIn 0.2s ease; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

        .grid-inputs { display: grid; grid-template-columns: repeat(auto-fit, minmax(150px, 1fr)); gap: 12px; margin-bottom: 15px; }
        label { display: block; font-size: 0.65rem; font-weight: 800; color: var(--primary); margin-bottom: 5px; text-transform: uppercase; }
        input, select, textarea { width: 100%; padding: 10px; background: #0a0f18; border: 1px solid #334155; color: white; border-radius: 6px; font-size: 0.85rem; box-sizing: border-box; }
        
        .inf-group { display: flex; gap: 5px; }
        .btn-inf { background: #334155; border: none; color: white; padding: 0 15px; border-radius: 6px; cursor: pointer; font-size: 1.2rem; }

        table { width: 100%; border-collapse: collapse; margin-top: 10px; background: rgba(0,0,0,0.2); }
        th, td { border: 1px solid #334155; padding: 12px; text-align: center; font-size: 0.8rem; }
        th { background: #0f172a; color: var(--primary); font-weight: 900; }
        
        .status { padding: 3px 6px; border-radius: 4px; font-weight: 900; font-size: 0.65rem; }
        .ok { background: rgba(16, 185, 129, 0.1); color: var(--success); border: 1px solid var(--success); }
        .nok { background: rgba(244, 63, 94, 0.1); color: var(--error); border: 1px solid var(--error); }
        
        .btn-action { width: 100%; padding: 14px; border: none; border-radius: 8px; font-weight: 800; cursor: pointer; margin-top: 10px; text-transform: uppercase; }
        .btn-primary { background: var(--primary); color: #000; }
        .btn-success { background: var(--success); color: #000; }
        .btn-back { background: transparent; color: white; border: 1px solid #334155; margin-bottom: 15px; padding: 8px 20px; cursor: pointer; border-radius: 4px; font-weight: bold; }

        .print-header { display: none; text-align: center; border-bottom: 2px solid #000; padding-bottom: 10px; margin-bottom: 20px; }
        footer { text-align: center; padding: 40px; font-size: 0.7rem; opacity: 0.4; letter-spacing: 3px; font-weight: bold; }

        @media print {
            .no-print, .btn-action, .btn-back, #botoesAcao, .dashboard-menu, .icon-card, button, .btn-inf { display: none !important; }
            .section { display: block !important; }
            .active { display: block !important; }
            body { background: white !important; color: black !important; }
            .container { max-width: 100%; padding: 0; }
            .glass { background: white !important; border: 1px solid #ccc !important; color: black !important; box-shadow: none; margin-bottom: 15px; }
            table { border: 1px solid #000 !important; color: black !important; }
            th { background: #f0f0f0 !important; color: black !important; border: 1px solid #000 !important; }
            td { border: 1px solid #000 !important; color: black !important; }
            .titulo-app { color: black !important; }
            .print-header { display: block !important; }
            input, select, textarea { border: none !important; background: transparent !important; color: black !important; font-weight: bold; appearance: none; padding: 2px; }
            footer { opacity: 1; color: black !important; border-top: 1px solid #000; }
            .status { border: 1px solid #000 !important; color: #000 !important; }
        }
    </style>
</head>
<body>

<div class="container">
    <div class="print-header">
        <h1>RELATÓRIO TÉCNICO DE ENSAIOS EM TRANSFORMADORES</h1>
        <p>EQUIPE ALPHA - ENGENHARIA E MANUTENÇÃO</p>
    </div>

    <header class="no-print">
        <div class="titulo-app">ENSAIOS ALPHA</div>
    </header>

    <div id="secHOME" class="dashboard-menu no-print active">
        <div class="icon-card" onclick="abrirS('TTR')"><i>⚡</i><span>TTR</span></div>
        <div class="icon-card" onclick="abrirS('MIC')"><i>📟</i><span>RESISTÊNCIA</span></div>
        <div class="icon-card" onclick="abrirS('MEG')"><i>💥</i><span>ISOLAÇÃO</span></div>
        <div class="icon-card" onclick="location.reload()"><i>🔄</i><span>NOVO ENSAIO</span></div>
    </div>

    <div id="dadosEquipamento" class="glass section">
        <label style="font-size: 1rem; margin-bottom: 15px; display: block;">📋 IDENTIFICAÇÃO DO EQUIPAMENTO</label>
        <div class="grid-inputs">
            <div><label>TAG</label><input type="text" id="regTag" placeholder="Ex: TR-01"></div>
            <div><label>POTÊNCIA (kVA)</label><input type="text" id="regKva"></div>
            <div><label>IMPEDÂNCIA (Z%)</label><input type="text" id="regZ"></div>
            <div><label>DATA</label><input type="date" id="regData"></div>
            <div><label>LOCAL</label><input type="text" id="regLoc"></div>
            <div><label>EQUIPE TÉCNICA</label><input type="text" id="regTec" placeholder="Nomes"></div>
        </div>
    </div>

    <div id="secTTR" class="section">
        <button class="btn-back no-print" onclick="voltarHome()">← VOLTAR</button>
        <div class="glass">
            <label style="color:var(--primary); font-weight: bold;">⚡ RELAÇÃO DE TRANSFORMAÇÃO (TTR)</label>
            <div class="grid-inputs no-print" style="margin-top:15px">
                <div><label>U1 (Primário)</label><input type="number" id="u1" oninput="calcTTR()"></div>
                <div><label>U2 (Secundário)</label><input type="number" id="u2" oninput="calcTTR()"></div>
                <div><label>Fasorial</label>
                    <select id="fasTTR" onchange="initTTR()">
                        <option value="">-- Selecione --</option>
                        <option value="Dyn1">Dyn1</option><option value="Dyn11">Dyn11</option>
                        <option value="Yyn0">Yyn0</option>
                    </select>
                </div>
            </div>
            <div id="teoLabel" style="font-weight:bold; color:var(--primary); margin:10px 0; text-align: center;"></div>
            <table>
                <thead><tr><th>BUCHAS</th><th>LIDO</th><th>DESVIO %</th><th>STATUS</th></tr></thead>
                <tbody id="corpoTTR"></tbody>
            </table>
        </div>
    </div>

    <div id="secMEG" class="section">
        <button class="btn-back no-print" onclick="voltarHome()">← VOLTAR</button>
        <div class="glass">
            <label style="color:var(--primary); font-weight: bold;">💥 RESISTÊNCIA DE ISOLAÇÃO (MEGGER)</label>
            <div class="grid-inputs no-print" style="margin-top:15px">
                <div><label>PONTO</label><select id="megP"><option>AT x BT</option><option>AT x TERRA</option><option>BT x TERRA</option></select></div>
                <div><label>TENSÃO (kV)</label><select id="megT"><option>0.5 kV</option><option>1.0 kV</option><option>2.5 kV</option><option>5.0 kV</option></select></div>
                <div><label>ESCALA</label><select id="megU"><option value="TΩ">TΩ</option><option value="GΩ">GΩ</option><option value="MΩ">MΩ</option></select></div>
            </div>
            <div class="grid-inputs no-print">
                <div><label>15s (IA)</label><input type="text" id="m15"></div>
                <div><label>60s (IP)</label><input type="text" id="m60"></div>
                <div><label>10 min</label>
                    <div class="inf-group">
                        <input type="text" id="m10" placeholder="Valor">
                        <button class="btn-inf" onclick="document.getElementById('m10').value='∞'">∞</button>
                    </div>
                </div>
            </div>
            <button class="btn-action btn-primary no-print" onclick="addMeg()">REGISTRAR ISOLAÇÃO</button>
            <table>
                <thead><tr><th>PONTO</th><th>TENSÃO</th><th>1 MIN</th><th>10 MIN</th><th>IP / IA</th></tr></thead>
                <tbody id="corpoMeg"></tbody>
            </table>
        </div>
    </div>

    <div id="secOBS" class="glass section">
        <label>📝 OBSERVAÇÕES TÉCNICAS E CONCLUSÃO</label>
        <textarea id="obsGerais" rows="4" placeholder="Descreva o estado das buchas, vedações, temperatura ambiente, etc..."></textarea>
    </div>

    <div id="botoesAcao" class="section no-print">
        <button class="btn-action btn-success" onclick="window.print()">🖨️ FINALIZAR E GERAR PDF</button>
    </div>
</div>

<footer>PRODUCED BY EQUIPE ALPHA</footer>

<script>
    const TTR_RULES = {
        "Dyn1": { f: (u1, u2) => (u1 * 1.73205) / u2, p: ["H1-H3/X1-X0", "H2-H1/X2-X0", "H3-H2/X3-X0"] },
        "Dyn11": { f: (u1, u2) => (u1 * 1.73205) / u2, p: ["H1-H3/X1-X0", "H2-H1/X2-X0", "H3-H2/X3-X0"] },
        "Yyn0": { f: (u1, u2) => u1 / u2, p: ["H1-H2/X1-X2", "H2-H3/X2-X3", "H3-H1/X3-X1"] }
    };

    function abrirS(id) {
        document.querySelectorAll('.section, .dashboard-menu').forEach(s => s.classList.remove('active'));
        document.getElementById('sec'+id).classList.add('active');
        document.getElementById('dadosEquipamento').classList.add('active');
        document.getElementById('secOBS').classList.add('active');
        document.getElementById('botoesAcao').classList.add('active');
    }

    function voltarHome() {
        document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
        document.getElementById('secHOME').classList.add('active');
    }

    function initTTR() {
        const f = document.getElementById('fasTTR').value;
        if(!f) return;
        document.getElementById('corpoTTR').innerHTML = TTR_RULES[f].p.map(p => `<tr><td>${p}</td><td><input type="number" class="in-ttr" oninput="calcTTR()" style="width:90px"></td><td class="d-ttr">-</td><td class="s-ttr">-</td></tr>`).join('');
    }

    function calcTTR() {
        const u1 = parseFloat(document.getElementById('u1').value);
        const u2 = parseFloat(document.getElementById('u2').value);
        const f = document.getElementById('fasTTR').value;
        if(u1 && u2 && f) {
            let teo = TTR_RULES[f].f(u1, u2);
            document.getElementById('teoLabel').innerText = "K Teórico: " + teo.toFixed(5);
            document.querySelectorAll('.in-ttr').forEach(inp => {
                const med = parseFloat(inp.value);
                if(med) {
                    const d = ((med - teo)/teo*100).toFixed(3);
                    const ok = Math.abs(d) <= 0.5;
                    inp.closest('tr').querySelector('.d-ttr').innerText = d + "%";
                    inp.closest('tr').querySelector('.s-ttr').innerHTML = `<span class="status ${ok?'ok':'nok'}">${ok?'OK':'ERRO'}</span>`;
                }
            });
        }
    }

    function addMeg() {
        const p = document.getElementById('megP').value;
        const t = document.getElementById('megT').value;
        const u = document.getElementById('megU').value;
        const v15 = document.getElementById('m15').value;
        const v60 = document.getElementById('m60').value;
        const v10 = document.getElementById('m10').value;
        
        let ip = (parseFloat(v10) / parseFloat(v60)).toFixed(2);
        let ia = (parseFloat(v60) / parseFloat(v15)).toFixed(2);
        
        document.getElementById('corpoMeg').innerHTML += `<tr><td>${p}</td><td>${t}</td><td>${v60} ${u}</td><td>${v10} ${u}</td><td>IP: ${isNaN(ip)?'-':ip} / IA: ${isNaN(ia)?'-':ia}</td></tr>`;
    }

    window.onload = () => { document.getElementById('regData').valueAsDate = new Date(); };
</script>
</body>
</html>
