<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ENSAIOS PRO EVOLUTION</title>
    <style>
        :root { --p: #facc15; --bg: #ffffff; --dark: #0f172a; --accent: #0284c7; --danger: #ef4444; --success: #16a34a; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); margin: 0; padding: 0; color: var(--dark); display: flex; flex-direction: column; min-height: 100vh; overflow-x: hidden; }
        input, select { text-transform: uppercase; width: 100%; padding: 12px; border: 2px solid #cbd5e1; border-radius: 12px; font-size: 15px; box-sizing: border-box; margin-bottom: 10px; }
        label { font-size: 11px; font-weight: 800; color: #64748b; margin-left: 5px; text-transform: uppercase; display: block; margin-bottom: 4px; }
        #splash { position: fixed; top:0; left:0; width:100%; height:100%; background: var(--dark); display:flex; flex-direction:column; align-items:center; justify-content:center; z-index:9999; }
        .logo-box { position: relative; display: flex; align-items: center; justify-content: center; margin-bottom: 20px; }
        .logo-circle { width: 140px; height: 140px; border: 5px solid var(--p); border-radius: 50%; position: absolute; animation: pulse 2s infinite; }
        .bolt-logo { width: 70px; height: 90px; background: var(--p); clip-path: polygon(45% 0%, 100% 0%, 55% 45%, 100% 45%, 15% 100%, 45% 55%, 0% 55%); z-index: 2; }
        .empresa-nome { color: white; font-weight: 900; font-size: 28px; letter-spacing: 3px; text-align: center; }
        @keyframes pulse { 0% { transform: scale(1); opacity: 1; } 100% { transform: scale(1.4); opacity: 0; } }
        header { display: grid; grid-template-columns: 50px 1fr 50px; align-items: center; padding: 25px 15px; background: white; border-bottom: 1px solid #f1f5f9; }
        .header-title { grid-column: 2; font-size: 20px; font-weight: 900; color: var(--accent); margin: 0; text-align: center; letter-spacing: 1px; }
        .config-icon { grid-column: 3; font-size: 24px; cursor: pointer; background: none; border: none; color: #cbd5e1; justify-self: end; }
        #main-wrapper { flex: 1; display: flex; align-items: center; justify-content: center; padding: 20px; }
        .monolito-menu { display: flex; flex-direction: column; width: 95%; max-width: 400px; background: linear-gradient(145deg, #0284c7, #0271ab); border-radius: 40px; overflow: hidden; box-shadow: 0 30px 60px rgba(2, 132, 199, 0.45); }
        .btn-monolito { background: transparent; color: white; border: none; padding: 45px 25px; cursor: pointer; display: flex; align-items: center; gap: 25px; position: relative; text-align: left; border-bottom: 1px solid rgba(255,255,255,0.1); }
        .btn-monolito:last-child { border-bottom: none; }
        .icon-box { width: 50px; height: 50px; display: flex; align-items: center; justify-content: center; font-size: 40px; filter: drop-shadow(0 4px 6px rgba(0,0,0,0.3)); }
        .btn-label { font-size: 22px; font-weight: 900; display: block; text-shadow: 0 2px 4px rgba(0,0,0,0.2); }
        .btn-desc { font-size: 12px; color: rgba(255,255,255,0.8); }
        .tela { display: none; padding: 20px; animation: fadeIn 0.4s ease-out; }
        .ativa { display: block !important; }
        .card { background: #f8fafc; padding: 25px; border-radius: 30px; border: 1px solid #e2e8f0; max-width: 600px; margin: auto; margin-bottom: 20px; box-shadow: 0 10px 25px rgba(0,0,0,0.05); }
        .btn-acao { width: 100%; padding: 18px; border-radius: 15px; border: none; font-weight: bold; font-size: 16px; cursor: pointer; color: white; margin-top: 10px; }
        .multi-select { background: white; border: 2px solid #cbd5e1; border-radius: 12px; padding: 10px; max-height: 150px; overflow-y: auto; margin-bottom: 10px; }
        .multi-item { display: flex; align-items: center; justify-content: flex-start; gap: 12px; padding: 10px; border-bottom: 1px solid #f1f5f9; font-size: 14px; font-weight: 600; text-align: left; }
        .multi-item input { width: 20px; height: 20px; margin: 0; cursor: pointer; }
        .btn-inf { background: #e2e8f0; border: none; border-radius: 8px; padding: 0 15px; cursor: pointer; font-size: 20px; font-weight: bold; margin-bottom: 10px; height: 45px; }
        .table-wrap { overflow-x: auto; background: white; border-radius: 15px; border: 1px solid #e2e8f0; }
        table { width: 100%; border-collapse: collapse; font-size: 10px; min-width: 520px; }
        th { background: #f1f5f9; padding: 10px; border-bottom: 2px solid #e2e8f0; }
        td { padding: 10px; border-bottom: 1px solid #f1f5f9; text-align: center; }
        .btn-del-row { background: var(--danger); color: white; border: none; border-radius: 6px; padding: 6px 10px; font-weight: bold; cursor: pointer; }
        .hist-item { background: white; border: 1px solid #e2e8f0; padding: 18px; border-radius: 20px; margin-bottom: 15px; border-left: 6px solid var(--accent); box-shadow: 0 4px 10px rgba(0,0,0,0.03); }
        .hist-btns { display: flex; gap: 8px; margin-top: 12px; }
        .btn-mini { flex: 1; padding: 12px; border: none; border-radius: 10px; color: white; font-weight: bold; font-size: 11px; cursor: pointer; }
        .chip-delete { display: inline-flex; align-items: center; background: #f1f5f9; padding: 5px 12px; border-radius: 20px; margin: 4px; font-weight: bold; font-size: 13px; }
        .chip-delete b { color: var(--danger); margin-left: 8px; cursor: pointer; padding: 2px 6px; }
        .pontas-box { background: white; border: 2px solid #0284c7; border-radius: 15px; padding: 15px; margin-bottom: 10px; }
        .pontas-title { font-size: 10px; font-weight: 800; color: var(--accent); text-transform: uppercase; margin-bottom: 10px; letter-spacing: 1px; }
        .ponta-row { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-bottom: 6px; font-size: 12px; font-weight: 700; }
        .ponta-label { background: #f1f5f9; padding: 8px 10px; border-radius: 8px; color: #334155; }
        .teorico-box { background: linear-gradient(135deg, #0f172a, #1e293b); color: white; border-radius: 15px; padding: 15px; margin-bottom: 10px; text-align: center; }
        .teorico-val { font-size: 28px; font-weight: 900; color: var(--p); letter-spacing: 1px; }
        .teorico-formula { font-size: 11px; color: rgba(255,255,255,0.6); margin-top: 4px; }
        .tab-seg { display: flex; gap: 8px; margin-bottom: 15px; }
        .tab-btn { flex: 1; padding: 10px; border: 2px solid #cbd5e1; border-radius: 10px; background: white; font-weight: 700; font-size: 12px; cursor: pointer; color: #64748b; }
        .tab-btn.ativo { background: var(--accent); color: white; border-color: var(--accent); }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        footer { text-align: center; padding: 30px; font-size: 11px; color: #cbd5e1; letter-spacing: 2px; }
    </style>
</head>
<body>

<div id="splash">
    <div class="logo-box">
        <div class="logo-circle"></div>
        <div class="bolt-logo"></div>
    </div>
    <div class="empresa-nome">PRO EVOLUTION</div>
</div>

<header>
    <div></div>
    <h1 class="header-title">ENSAIOS PRO EVOLUTION</h1>
    <button class="config-icon" onclick="mudar('CONFIG')">⚙️</button>
</header>

<div id="main-wrapper">
    <div id="menuHome" class="monolito-menu">
        <button class="btn-monolito" onclick="mudar('MEG')">
            <div class="icon-box">⚡</div>
            <div><span class="btn-label">MEGGER</span><span class="btn-desc">Resistência de isolação</span></div>
        </button>
        <button class="btn-monolito" onclick="mudar('TTR')">
            <div class="icon-box">📟</div>
            <div><span class="btn-label">TTR</span><span class="btn-desc">Relação de transformação</span></div>
        </button>
        <button class="btn-monolito" onclick="mudar('MICRO')">
            <div class="icon-box">🔬</div>
            <div><span class="btn-label">MICRO</span><span class="btn-desc">Em breve</span></div>
        </button>
    </div>
</div>

<!-- ========== TELA MEGGER ========== -->
<div id="secMEG" class="tela">
    <div class="card">
        <button class="btn-acao" style="background:var(--dark); margin-bottom:20px" onclick="novoEnsaioMeg()">+ NOVO ENSAIO</button>
        <h2 style="text-align:center; color:var(--accent); margin:0 0 20px 0">ENSAIO MEGGER</h2>
        <input type="hidden" id="editId">
        <label>1. TAG do Equipamento</label>
        <input type="text" id="mTag" placeholder="EX: TR-01">
        <label>2. Técnicos</label>
        <div id="mTecContainer" class="multi-select"></div>
        <label>3. Local</label>
        <select id="mLoc"></select>
        <label>4. Ponto de Medição</label>
        <select id="mPonto">
            <option>PRIMÁRIO X SECUNDÁRIO</option><option>PRIMÁRIO X CARCAÇA</option>
            <option>SECUNDÁRIO X CARCAÇA</option><option>CAMIS</option>
        </select>
        <label>5. Tensão Aplicada</label>
        <select id="mTen">
            <option>250V</option><option>500V</option><option>1KV</option><option>2,5KV</option><option>5KV</option>
        </select>
        <label>6. Resistência de Referência (Mínima)</label>
        <div style="display:flex; gap:5px">
            <input type="number" id="mRef" placeholder="VALOR" inputmode="decimal">
            <select id="mRefUni" style="width:100px"><option>MΩ</option><option>GΩ</option><option>TΩ</option></select>
        </div>
        <label>7/8. Leituras e Tempos</label>
        <div style="display:flex; gap:5px; align-items: center">
            <input type="text" id="m30" placeholder="30s" inputmode="decimal">
            <button class="btn-inf" onclick="setInf('m30')">∞</button>
            <select id="u30" style="width:90px"><option>MΩ</option><option>GΩ</option><option>TΩ</option></select>
        </div>
        <div style="display:flex; gap:5px; align-items: center">
            <input type="text" id="m60" placeholder="60s" inputmode="decimal">
            <button class="btn-inf" onclick="setInf('m60')">∞</button>
            <select id="u60" style="width:90px"><option>MΩ</option><option>GΩ</option><option>TΩ</option></select>
        </div>
        <div style="display:flex; gap:5px; align-items: center">
            <input type="text" id="m120" placeholder="120s" inputmode="decimal">
            <button class="btn-inf" onclick="setInf('m120')">∞</button>
            <select id="u120" style="width:90px"><option>MΩ</option><option>GΩ</option><option>TΩ</option></select>
        </div>
        <button class="btn-acao" style="background:var(--accent)" onclick="registrarMegger()">REGISTRAR NO QUADRO</button>
    </div>
    <div class="card" style="padding:15px">
        <div class="table-wrap">
            <table id="tabMegResult">
                <thead><tr><th>PONTO</th><th>TEN.</th><th>30s</th><th>60s</th><th>120s</th><th>ST.</th><th>×</th></tr></thead>
                <tbody></tbody>
            </table>
        </div>
        <button class="btn-acao" style="background:var(--success); margin-top:20px" onclick="salvarHistoricoMeg()">💾 SALVAR NO HISTÓRICO</button>
        <button class="btn-acao" style="background:#7c3aed; margin-top:8px" onclick="irParaEnsaio('TTR')">📟 CONTINUAR NO TTR →</button>
    </div>
    <button class="btn-acao" style="background:#64748b; max-width:600px; display:block; margin:0 auto 20px" onclick="voltar()">VOLTAR AO MENU</button>
</div
<!-- ========== TELA TTR ========== -->
<div id="secTTR" class="tela">
    <div class="card">
        <button class="btn-acao" style="background:var(--dark); margin-bottom:20px" onclick="novoEnsaioTTR()">+ NOVO ENSAIO</button>
        <h2 style="text-align:center; color:var(--accent); margin:0 0 20px 0">ENSAIO TTR</h2>
        <input type="hidden" id="tEditId">
        <label>1. TAG do Equipamento</label>
        <input type="text" id="tTag" placeholder="EX: TR-01">
        <label>2. Técnicos</label>
        <div id="tTecContainer" class="multi-select"></div>
        <label>3. Local</label>
        <select id="tLoc"></select>
        <label>4. Fasorial</label>
        <select id="tFasorial" onchange="atualizarTTR()">
            <option value="">-- SELECIONE --</option>
            <option value="Ydn1_Ydn11">Ydn1 / Ydn11 (300° / 30°)</option>
            <option value="Yd1">Yd1 (300° / 330°)</option>
            <option value="Yd11">Yd11 (30°)</option>
            <option value="Dyn1_Dyn11">Dyn1 / Dyn11 (300° / 30°)</option>
            <option value="Dy1">Dy1 (330° / -30°)</option>
            <option value="Dy11">Dy11 (30°)</option>
            <option value="Yyn0">Yyn0 (0°)</option>
            <option value="Ynyn0">Ynyn0 (0°)</option>
            <option value="Yy0_Dd0">Yy0 / Dd0 (0°)</option>
        </select>
        <div id="tNeutralBox" style="display:none; margin-bottom:10px">
            <label>5. Configuração de Neutro</label>
            <div class="tab-seg">
                <button class="tab-btn ativo" id="btnX0" onclick="selecionarNeutro('X0')">C/ X0 APARENTE</button>
                <button class="tab-btn" id="btnH0" onclick="selecionarNeutro('H0')">C/ H0 APARENTE</button>
            </div>
        </div>
        <label>5. Tensão U1 (Entrada - Primário)</label>
        <div style="display:flex; gap:5px">
            <input type="number" id="tU1" placeholder="EX: 13800" inputmode="decimal" oninput="calcTeoricoTTR()">
            <select id="tU1uni" style="width:80px" onchange="calcTeoricoTTR()"><option>V</option><option>kV</option></select>
        </div>
        <label>6. Tensão U2 (Saída - Secundário)</label>
        <div style="display:flex; gap:5px">
            <input type="number" id="tU2" placeholder="EX: 380" inputmode="decimal" oninput="calcTeoricoTTR()">
            <select id="tU2uni" style="width:80px" onchange="calcTeoricoTTR()"><option>V</option><option>kV</option></select>
        </div>
        <div id="tPontasBox" style="display:none; margin-top:10px">
            <label>Pontas de Prova</label>
            <div class="pontas-box" id="tPontasConteudo"></div>
            <label>Valor Teórico Calculado</label>
            <div class="teorico-box">
                <div class="teorico-val" id="tTeoricoVal">--</div>
                <div class="teorico-formula" id="tTeoricoFormula">Insira U1 e U2</div>
            </div>
            <label>7/8. Valores Medidos por Fase</label>
            <div id="tCamposFases"></div>
            <button class="btn-acao" style="background:var(--accent)" onclick="registrarTTR()">REGISTRAR NO QUADRO</button>
        </div>
    </div>
    <div class="card" style="padding:15px">
        <div class="table-wrap">
            <table id="tabTTRResult">
                <thead><tr><th>FASORIAL</th><th>FASE</th><th>TEÓRICO</th><th>MEDIDO</th><th>DESVIO%</th><th>ST.</th><th>×</th></tr></thead>
                <tbody></tbody>
            </table>
        </div>
        <button class="btn-acao" style="background:var(--success); margin-top:20px" onclick="salvarHistoricoTTR()">💾 SALVAR NO HISTÓRICO</button>
        <button class="btn-acao" style="background:var(--accent); margin-top:8px" onclick="irParaEnsaio('MEG')">⚡ CONTINUAR NO MEGGER →</button>
    </div>
    <button class="btn-acao" style="background:#64748b; max-width:600px; display:block; margin:0 auto 20px" onclick="voltar()">VOLTAR AO MENU</button>
</div>

<!-- ========== TELA MICRO ========== -->
<div id="secMICRO" class="tela">
    <div class="card" style="text-align:center; padding:60px 25px">
        <div style="font-size:60px; margin-bottom:20px">🔬</div>
        <h2 style="color:var(--accent)">MICRO-OHMÍMETRO</h2>
        <p style="color:#94a3b8">Em desenvolvimento. Em breve disponível.</p>
        <button class="btn-acao" style="background:#64748b; margin-top:20px" onclick="voltar()">VOLTAR AO MENU</button>
    </div>
</div>

<!-- ========== TELA CONFIG ========== -->
<div id="secCONFIG" class="tela">
    <div class="card">
        <h3>📁 HISTÓRICO DE ENSAIOS</h3>
        <div id="listaHist"></div>
        <hr>
        <h3>👥 CADASTRAR TÉCNICO</h3>
        <div style="display:flex; gap:8px">
            <input type="text" id="cTec" placeholder="NOME" style="margin:0">
            <button onclick="addCfg('tecnicos','cTec')" style="background:var(--accent); color:white; border:none; border-radius:12px; width:50px; font-size:20px">+</button>
        </div>
        <div id="lTec" style="margin-top:10px"></div>
        <h3>📍 CADASTRAR LOCAL</h3>
        <div style="display:flex; gap:8px">
            <input type="text" id="cLoc" placeholder="LOCAL" style="margin:0">
            <button onclick="addCfg('locais','cLoc')" style="background:var(--accent); color:white; border:none; border-radius:12px; width:50px; font-size:20px">+</button>
        </div>
        <div id="lLoc" style="margin-top:10px"></div>
        <button class="btn-acao" style="background:#64748b; margin-top:20px" onclick="voltar()">FECHAR</button>
    </div>
</div>

<footer>PRODUCED BY UNKNOWN</footer>
<script>
const FASORIAIS = {
    "Ydn1_Ydn11": { label:"Ydn1 / Ydn11", neutros:["X0","H0"], pontas:{ X0:[{fase:"H1-h3 / X1-X0",H:"H1-h3",X:"X1-X0"},{fase:"H1-h2 / X2-X0",H:"H1-h2",X:"X2-X0"},{fase:"H3-h1 / X3-X0",H:"H3-h1",X:"X3-X0"}], H0:[{fase:"H1-H0 / X1-x3",H:"H1-H0",X:"X1-x3"},{fase:"H2-H0 / X2-x1",H:"H2-H0",X:"X2-x1"},{fase:"H3-H0 / X3-x2",H:"H3-H0",X:"X3-x2"}]}, formula:{ X0:{expr:"U1*√3/U2",fn:(u1,u2)=>(u1*Math.sqrt(3))/u2}, H0:{expr:"U1/(√3·U2)",fn:(u1,u2)=>u1/(Math.sqrt(3)*u2)}}},
    "Yd1": { label:"Yd1", neutros:["H0"], pontas:{ H0:[{fase:"H2-H1~h3 / X2-x3",H:"H2-H1~h3",X:"X2-x3"},{fase:"H3-h2~h1 / X3-x1",H:"H3-h2~h1",X:"X3-x1"},{fase:"H1-H3~h2 / X1-x2",H:"H1-H3~h2",X:"X1-x2"}]}, formula:{ H0:{expr:"0,866·U1/U2",fn:(u1,u2)=>(0.866*u1)/u2}}},

    "Dyn1_Dyn11": { label:"Dyn1 / Dyn11", neutros:["X0","H0"], pontas:{ X0:[{fase:"H1-h3 / X1-X0",H:"H1-h3",X:"X1-X0"},{fase:"H1-h2 / X2-X0",H:"H1-h2",X:"X2-X0"},{fase:"H3-h2 / X3-X0",H:"H3-h2",X:"X3-X0"}], H0:[{fase:"H1-H0 / X1-x3",H:"H1-H0",X:"X1-x3"},{fase:"H2-H0 / X2-x1",H:"H2-H0",X:"X2-x1"},{fase:"H3-H0 / X3-x2",H:"H3-H0",X:"X3-x2"}]}, formula:{ X0:{expr:"U1·√3/U2",fn:(u1,u2)=>(u1*Math.sqrt(3))/u2}, H0:{expr:"U1/(√3·U2)",fn:(u1,u2)=>u1/(Math.sqrt(3)*u2)}}},
    "Dy1": { label:"Dy1", neutros:["X0"], pontas:{ X0:[{fase:"H1-h3 / X2-x1~x3",H:"H1-h3",X:"X2-x1~x3"},{fase:"H3-H2 / X3-x2~x1",H:"H3-H2",X:"X3-x2~x1"},{fase:"H1-h3 / X1-x3~x2",H:"H1-h3",X:"X1-x3~x2"}]}, formula:{ X0:{expr:"U1/(0,866·U2)",fn:(u1,u2)=>u1/(0.866*u2)}}},
    "Dy11": { label:"Dy11", neutros:["X0"], pontas:{ X0:[{fase:"H1-h3 / X2-x1~x3",H:"H1-h3",X:"X2-x1~x3"},{fase:"H3-H2 / X3-x2~x1",H:"H3-H2",X:"X3-x2~x1"},{fase:"H1-h3 / X1-x3~x2",H:"H1-h3",X:"X1-x3~x2"}]}, formula:{ X0:{expr:"U1/(0,866·U2)",fn:(u1,u2)=>u1/(0.866*u2)}}},
    "Yyn0": { label:"Yyn0", neutros:["H0"], pontas:{ H0:[{fase:"H1-h2~h3 / X1-X0 | H1-H0 / X1-x3",H:"H1-H0",X:"X1-x3"},{fase:"H2-h3~h1 / X2-X0 | H2-H0 / X2-x1",H:"H2-H0",X:"X2-x1"},{fase:"H3-h1~h2 / X3-X0 | H3-H0 / X3-x2",H:"H3-H0",X:"X3-x2"}]}, formula:{ H0:{expr:"U1/(√3·U2·0,866)",fn:(u1,u2)=>u1/(Math.sqrt(3)*u2*0.866)}}},
    "Ynyn0": { label:"Ynyn0", neutros:["X0","H0"], pontas:{ X0:[{fase:"H1-h0 / X1-x0",H:"H1-h0",X:"X1-x0"},{fase:"H2-h0 / X2-x0",H:"H2-h0",X:"X2-x0"},{fase:"H3-h0 / X3-x0",H:"H3-h0",X:"X3-x0"}], H0:[{fase:"H1-h0 / X1-x0",H:"H1-h0",X:"X1-x0"},{fase:"H2-h0 / X2-x0",H:"H2-h0",X:"X2-x0"},{fase:"H3-h0 / X3-x0",H:"H3-h0",X:"X3-x0"}]}, formula:{ X0:{expr:"U1/U2",fn:(u1,u2)=>u1/u2}, H0:{expr:"U1/U2",fn:(u1,u2)=>u1/u2}}},

};

const DB_KEY = 'PRO_EVO_V21_FINAL';

let ensaiosAtuaisTTR = [];
let neutroSelecionado = 'X0';

function inicializar() {
    try { const s = localStorage.getItem(DB_KEY); if(s) db = JSON.parse(s); } catch(e) {}
    renderTudo();
    setTimeout(() => document.getElementById('splash').style.display='none', 2000);
}
function salvar() { localStorage.setItem(DB_KEY, JSON.stringify(db)); }
function mudar(t) {
    document.getElementById('main-wrapper').style.display = 'none';
    document.querySelectorAll('.tela').forEach(x => x.classList.remove('ativa'));
    if(t === 'HOME') document.getElementById('main-wrapper').style.display = 'flex';
    else document.getElementById('sec'+t).classList.add('ativa');
}
function voltar() { mudar('HOME'); }
function setInf(id) { document.getElementById(id).value = "∞"; }
function addCfg(tipo, id) {
    const v = document.getElementById(id).value.trim().toUpperCase();
    if(v) { db[tipo].push(v); db[tipo].sort(); salvar(); renderTudo(); document.getElementById(id).value=''; }
}
function converter(v, u) {
    if(v==="∞") return Infinity;
    let n = parseFloat(String(v).replace(',','.'));
    let p = {"MΩ":1,"GΩ":1000,"TΩ":1000000}[u]||1;
    return isNaN(n)?0:n*p;
}

// ===== MEGGER =====
function registrarMegger() {
    const v30=document.getElementById('m30').value, v60=document.getElementById('m60').value, v120=document.getElementById('m120').value;
    const refRaw=document.getElementById('mRef').value, refUni=document.getElementById('mRefUni').value;
    if(!v30||!v60||!v120||!refRaw) return alert("PREENCHA TODOS OS CAMPOS");
    const numRef=converter(refRaw,refUni), num30=converter(v30,document.getElementById('u30').value);
    const num60=converter(v60,document.getElementById('u60').value), num120=converter(v120,document.getElementById('u120').value);
    const aprovado=(num30>=numRef&&num60>=numRef&&num120>=numRef);
    ensaiosAtuaisMeg.push({ id:Date.now(), ponto:document.getElementById('mPonto').value, tensao:document.getElementById('mTen').value,
        v30:v30+(v30==="∞"?"":document.getElementById('u30').value),
        v60:v60+(v60==="∞"?"":document.getElementById('u60').value),
        v120:v120+(v120==="∞"?"":document.getElementById('u120').value),
        status:aprovado?"OK":"REPR", cor:aprovado?"var(--success)":"var(--danger)"});
    renderTabelaMeg();
}
function renderTabelaMeg() {
    document.querySelector('#tabMegResult tbody').innerHTML = ensaiosAtuaisMeg.map(e=>`<tr>
        <td style="font-weight:bold">${e.ponto}</td><td>${e.tensao}</td><td>${e.v30}</td><td>${e.v60}</td><td>${e.v120}</td>
        <td style="color:white;background:${e.cor};font-weight:bold;border-radius:4px">${e.status}</td>
        <td><button class="btn-del-row" onclick="ensaiosAtuaisMeg=ensaiosAtuaisMeg.filter(x=>x.id!=${e.id});renderTabelaMeg()">×</button></td>
    </tr>`).join('');
}
function salvarHistoricoMeg() {
    const checks=document.querySelectorAll('#secMEG .tec-check:checked');
    const tcs=Array.from(checks).map(c=>c.value).join(', ');
    if(!tcs) return alert("SELECIONE O(S) TÉCNICO(S)");
    if(ensaiosAtuaisMeg.length===0) return alert("ADICIONE MEDIÇÕES NA TABELA");
    const tag=(document.getElementById('mTag').value.toUpperCase().trim()||"SEM TAG");
    const local=document.getElementById('mLoc').value, data=new Date().toLocaleDateString('pt-BR');
    let ficha=db.historico.find(x=>x.tag===tag);
    if(!ficha){ficha={id:Date.now(),tag,local,tecnico:tcs,data,ensaios:{}};db.historico.unshift(ficha);}
    if(!ficha.ensaios) ficha.ensaios={};

function selecionarNeutro(neutro) {
    neutroSelecionado=neutro;
    document.getElementById('btnX0').classList.toggle('ativo',neutro==='X0');
    document.getElementById('btnH0').classList.toggle('ativo',neutro==='H0');
    renderPontasTTR(); calcTeoricoTTR();
}
function atualizarTTR() {
    const fas=document.getElementById('tFasorial').value;
    if(!fas){document.getElementById('tNeutralBox').style.display='none';document.getElementById('tPontasBox').style.display='none';return;}
    const f=FASORIAIS[fas], temDois=f.neutros.length>1;
    document.getElementById('tNeutralBox').style.display=temDois?'block':'none';
    if(!temDois) neutroSelecionado=f.neutros[0];
    if(temDois){
        document.getElementById('btnX0').style.display=f.neutros.includes('X0')?'':'none';
        document.getElementById('btnH0').style.display=f.neutros.includes('H0')?'':'none';
        if(!f.neutros.includes(neutroSelecionado)) neutroSelecionado=f.neutros[0];
        selecionarNeutro(neutroSelecionado);
    }
    document.getElementById('tPontasBox').style.display='block';
    renderPontasTTR(); calcTeoricoTTR();
}
function renderPontasTTR() {
    const fas=document.getElementById('tFasorial').value; if(!fas) return;
    const f=FASORIAIS[fas], pontas=f.pontas[neutroSelecionado]; if(!pontas) return;
    document.getElementById('tPontasConteudo').innerHTML=`
        <div class="pontas-title">Pontas de Prova — ${neutroSelecionado==='X0'?'C/ X0 APARENTE':'C/ H0 APARENTE'}</div>
        <div class="ponta-row" style="font-size:10px;color:#94a3b8;font-weight:700;padding:0 0 4px 0"><span>LADO AT (H)</span><span>LADO BT (X)</span></div>
        ${pontas.map(p=>`<div class="ponta-row"><div class="ponta-label">🔴 ${p.H}</div><div class="ponta-label">🔵 ${p.X}</div></div>`).join('')}`;
    document.getElementById('tCamposFases').innerHTML=`
        <div style="background:white;border:2px solid #e2e8f0;border-radius:12px;padding:12px;margin-bottom:8px">
            <div style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px">

                    <input type="number" id="tMedido${i}" placeholder="Medido" inputmode="decimal" style="margin:0;font-size:13px;padding:10px;text-align:center">
                </div>`).join('')}
            </div>
        </div>`;
}
function getU(idVal,idUni) {
    const v=parseFloat(document.getElementById(idVal).value), u=document.getElementById(idUni).value;
    if(isNaN(v)||v<=0) return null;
    return u==='kV'?v*1000:v;
}
function calcTeoricoTTR() {
    const fas=document.getElementById('tFasorial').value; if(!fas) return;
    const f=FASORIAIS[fas], formula=f.formula[neutroSelecionado]; if(!formula) return;
    const u1=getU('tU1','tU1uni'), u2=getU('tU2','tU2uni');
    if(u1&&u2){document.getElementById('tTeoricoVal').textContent=formula.fn(u1,u2).toFixed(4);document.getElementById('tTeoricoFormula').textContent=`Fórmula: ${formula.expr}`;}
    else{document.getElementById('tTeoricoVal').textContent='--';document.getElementById('tTeoricoFormula').textContent='Insira U1 e U2';}
}
function registrarTTR() {
    const fas=document.getElementById('tFasorial').value;
    const u1=getU('tU1','tU1uni'), u2=getU('tU2','tU2uni');
    if(!fas) return alert("SELECIONE A FASORIAL");
    if(!u1||!u2) return alert("INSIRA U1 E U2");
    const f=FASORIAIS[fas], pontas=f.pontas[neutroSelecionado], formula=f.formula[neutroSelecionado], teorico=formula.fn(u1,u2);
    let algum=false;
    pontas.forEach((p,i)=>{
        const el=document.getElementById('tMedido'+i); if(!el||el.value==='') return; algum=true;
        const medido=parseFloat(el.value.replace(',','.')), erro=Math.abs((medido-teorico)/teorico)*100, aprovado=erro<=0.5;
        ensaiosAtuaisTTR.push({id:Date.now()+i,fasorial:f.label,neutro:neutroSelecionado,fase:p.fase,
            teorico:teorico.toFixed(4),medido:medido.toFixed(4),erro:erro.toFixed(3),
            status:aprovado?"OK":"REPR",cor:aprovado?"var(--success)":"var(--danger)"});
        el.value='';
    });
    if(!algum) return alert("INSIRA PELO MENOS UM VALOR MEDIDO");
    renderTabelaTTR();
}
function renderTabelaTTR() {
    document.querySelector('#tabTTRResult tbody').innerHTML=ensaiosAtuaisTTR.map(e=>`<tr>

        <td style="font-size:9px">${e.fase}</td><td>${e.teorico}</td><td>${e.medido}</td><td>${e.erro}%</td>

function compartilhar(id) {
    const h=db.historico.find(x=>x.id==id); if(!h) return;
    const ensaios=h.ensaios||{};
    let t=`PRO EVOLUTION — LAUDO DE ENSAIOS\nTAG: ${h.tag}\nDATA: ${h.data}\nLOCAL: ${h.local}\nTÉCNICOS: ${h.tecnico}\n\n`;
    if(ensaios.MEG&&ensaios.MEG.length>0){t+=`===== MEGGER =====\n`;ensaios.MEG.forEach(d=>{t+=`PONTO: ${d.ponto} (${d.tensao})\n30s: ${d.v30}  60s: ${d.v60}  120s: ${d.v120}\nSTATUS: ${d.status}\n---\n`;});}
    if(ensaios.TTR&&ensaios.TTR.length>0){t+=`\n===== TTR =====\n`;ensaios.TTR.forEach(d=>{t+=`FASORIAL: ${d.fasorial} (${d.neutro})\nFASE: ${d.fase}\nTEÓRICO: ${d.teorico}  MEDIDO: ${d.medido}  DESVIO: ${d.erro}%\nSTATUS: ${d.status}\n---\n`;});}
    if(navigator.share){navigator.share({title:`Laudo_${h.tag}`,text:t}).catch(()=>copiarTexto(t));}

}
function copiarTexto(t) {
    if(navigator.clipboard&&navigator.clipboard.writeText){navigator.clipboard.writeText(t).then(()=>alert('✅ Texto copiado!\n\nCole no WhatsApp, e-mail, etc.')).catch(()=>copiarFallback(t));}
    else{copiarFallback(t);}
}
function copiarFallback(t) {
    const ta=document.createElement('textarea'); ta.value=t; ta.style.position='fixed'; ta.style.opacity='0';
    document.body.appendChild(ta); ta.focus(); ta.select();
    try{document.execCommand('copy');alert('✅ Texto copiado!');}catch(e){alert('Texto do laudo:\n\n'+t);}
    document.body.removeChild(ta);
}

    w.document.close();
}
  // ===== RENDER GERAL =====
function renderTudo() {
    const tecHTML=db.tecnicos.map(t=>`<div class="multi-item"><input type="checkbox" class="tec-check" value="${t}"> <span>${t}</span></div>`).join('')||'<p style="font-size:11px;padding:10px">CADASTRE TÉCNICOS NAS CONFIGURAÇÕES.</p>';
    document.getElementById('mTecContainer').innerHTML=tecHTML;
    document.getElementById('tTecContainer').innerHTML=tecHTML;
    const locOpts=db.locais.map(l=>`<option>${l}</option>`).join('')||'<option>CADASTRE UM LOCAL</option>';
    document.getElementById('mLoc').innerHTML=locOpts;
    document.getElementById('tLoc').innerHTML=locOpts;
    document.getElementById('lTec').innerHTML=db.tecnicos.map((t,i)=>`<span class="chip-delete">${t}<b onclick="db.tecnicos.splice(${i},1);salvar();renderTudo()">×</b></span>`).join('');
    document.getElementById('lLoc').innerHTML=db.locais.map((l,i)=>`<span class="chip-delete">${l}<b onclick="db.locais.splice(${i},1);salvar();renderTudo()">×</b></span>`).join('');
    document.getElementById('listaHist').innerHTML=db.historico.map(h=>{
        const ensaios=h.ensaios||{};
        const badges=Object.keys(ensaios).filter(k=>ensaios[k]&&ensaios[k].length>0);
        const badgeHTML=badges.map(b=>`<span style="background:${b==='TTR'?'#7c3aed':b==='MEG'?'#0284c7':'#16a34a'};color:white;font-size:9px;padding:3px 8px;border-radius:20px;font-weight:700;margin-right:4px">${b}</span>`).join('');
        const botoesEnsaios=badges.map(b=>`<button class="btn-mini" style="background:${b==='TTR'?'#7c3aed':b==='MEG'?'#0284c7':'#16a34a'}" onclick="carregarHistorico(${h.id},'${b}')">✏️ ${b}</button>`).join('');
        return `<div class="hist-item">
            <div style="display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:4px">
                <b style="font-size:16px">${h.tag}</b><div>${badgeHTML}</div><span style="font-size:12px;color:#94a3b8">${h.data}</span>
            </div>
            <div style="font-size:10px;color:#64748b;margin-top:4px">📍 ${h.local||''}</div>
            <div style="font-size:10px;color:var(--accent);font-weight:bold;margin-top:3px">👥 ${h.tecnico}</div>
            <div class="hist-btns" style="flex-wrap:wrap">
                ${botoesEnsaios}
                <button class="btn-mini" style="background:#0f172a" onclick="gerarPDF(${h.id})">🖨️ PDF</button>
                <button class="btn-mini" style="background:var(--success)" onclick="compartilhar(${h.id})">📤 COMPARTILHAR</button>
                <button class="btn-mini" style="background:var(--danger)" onclick="db.historico=db.historico.filter(x=>x.id!=${h.id});salvar();renderTudo()">🗑️ EXCLUIR</button>
            </div>
        </div>`;
    }).join('')||"<p style='text-align:center;color:#cbd5e1'>HISTÓRICO VAZIO</p>";
}

function irParaEnsaio(destino) {
    let tag='', local='', tecs=[];
    if(destino==='TTR'){tag=document.getElementById('mTag').value;local=document.getElementById('mLoc').value;tecs=Array.from(document.querySelectorAll('#secMEG .tec-check:checked')).map(c=>c.value);}
    else{tag=document.getElementById('tTag').value;local=document.getElementById('tLoc').value;tecs=Array.from(document.querySelectorAll('#secTTR .tec-check:checked')).map(c=>c.value);}
    mudar(destino);
    if(destino==='TTR'){document.getElementById('tTag').value=tag;Array.from(document.getElementById('tLoc').options).forEach(o=>{if(o.value===local)o.selected=true;});document.querySelectorAll('#secTTR .tec-check').forEach(c=>{c.checked=tecs.includes(c.value);});}
    else{document.getElementById('mTag').value=tag;Array.from(document.getElementById('mLoc').options).forEach(o=>{if(o.value===local)o.selected=true;});document.querySelectorAll('#secMEG .tec-check').forEach(c=>{c.checked=tecs.includes(c.value);});}
}

window.onload=inicializar;
</script>
