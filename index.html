<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ENSAIOS ALPHA - SISTEMA DE CAMPO</title>
    <style>
        :root {
            --bg: #0f172a; --card: #1e293b; --primary: #38bdf8; --success: #10b981; --error: #f43f5e; --text: #f1f5f9;
        }
        body { font-family: 'Inter', sans-serif; background: var(--bg); color: var(--text); margin: 0; min-height: 100vh; }
        .container { max-width: 900px; margin: 0 auto; padding: 20px; }
        
        header { display: flex; justify-content: space-between; align-items: center; padding: 20px 0; border-bottom: 1px solid rgba(255,255,255,0.1); margin-bottom: 20px; }
        .titulo-app { font-size: 1.8rem; font-weight: 900; color: var(--primary); letter-spacing: 2px; text-transform: uppercase; margin: 0; }
        .btn-config-top { background: none; border: none; font-size: 1.5rem; cursor: pointer; color: var(--text); }

        .dashboard-menu { display: grid; grid-template-columns: repeat(2, 1fr); gap: 15px; }
        .icon-card { 
            background: var(--card); border: 1px solid rgba(255,255,255,0.05); border-radius: 15px; 
            padding: 30px 10px; text-align: center; cursor: pointer; transition: 0.3s;
        }
        .icon-card:hover { border-color: var(--primary); transform: translateY(-3px); }
        .icon-card i { font-size: 2.5rem; display: block; margin-bottom: 10px; font-style: normal; }
        .icon-card span { font-weight: 800; font-size: 0.8rem; color: var(--primary); letter-spacing: 1px; }

        .glass { background: var(--card); border: 1px solid rgba(255,255,255,0.1); border-radius: 12px; padding: 20px; margin-bottom: 20px; }
        .section { display: none; }
        .active { display: block; animation: fadeIn 0.2s ease; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

        .grid-inputs { display: grid; grid-template-columns: repeat(auto-fit, minmax(150px, 1fr)); gap: 12px; margin-bottom: 15px; }
        label { display: block; font-size: 0.65rem; font-weight: 800; color: var(--primary); margin-bottom: 5px; text-transform: uppercase; }
        input, select, textarea { width: 100%; padding: 10px; background: #0a0f18; border: 1px solid #334155; color: white; border-radius: 6px; font-size: 0.85rem; box-sizing: border-box; }
        
        .inf-group { display: flex; gap: 5px; }
        .btn-inf { background: #334155; border: none; color: white; padding: 0 10px; border-radius: 6px; cursor: pointer; }

        table { width: 100%; border-collapse: collapse; margin-top: 10px; }
        th, td { border: 1px solid #334155; padding: 12px; text-align: center; font-size: 0.8rem; }
        th { background: #0f172a; color: var(--primary); }
        
        .status { padding: 3px 6px; border-radius: 4px; font-weight: 900; font-size: 0.65rem; }
        .ok { border: 1px solid var(--success); color: var(--success); }
        
        .btn-action { width: 100%; padding: 14px; border: none; border-radius: 8px; font-weight: 800; cursor: pointer; margin-top: 10px; text-transform: uppercase; }
        .btn-primary { background: var(--primary); color: #000; }
        .btn-success { background: var(--success); color: #000; }
        .btn-back { background: transparent; color: white; border: 1px solid #334155; margin-bottom: 15px; padding: 8px 20px; cursor: pointer; border-radius: 4px; font-weight: bold; }

        .config-list { margin-top: 10px; list-style: none; padding: 0; }
        .config-list li { display: flex; justify-content: space-between; padding: 8px; border-bottom: 1px solid #334155; font-size: 0.8rem; }
        .btn-del { color: var(--error); cursor: pointer; font-weight: bold; }

        @media print {
            .no-print, .btn-action, .btn-back, .btn-config-top, .dashboard-menu, .icon-card, button, .btn-inf { display: none !important; }
            .section { display: block !important; }
            body { background: white !important; color: black !important; }
            .glass { border: 1px solid #000 !important; color: black !important; }
            input, select, textarea { border: none !important; color: black !important; font-weight: bold; }
            footer { opacity: 1; color: black !important; border-top: 1px solid #000; }
        }
    </style>
</head>
<body>

<div class="container">
    <header class="no-print">
        <div class="titulo-app">ENSAIOS ALPHA</div>
        <button class="btn-config-top" onclick="abrirS('CONFIG')">⚙️</button>
    </header>

    <div id="secHOME" class="dashboard-menu no-print active">
        <div class="icon-card" onclick="abrirS('TTR')"><i>⚡</i><span>TTR</span></div>
        <div class="icon-card" onclick="abrirS('MIC')"><i>📟</i><span>RESISTÊNCIA</span></div>
        <div class="icon-card" onclick="abrirS('MEG')"><i>💥</i><span>ISOLAÇÃO</span></div>
        <div class="icon-card" onclick="abrirS('HIST')"><i>📜</i><span>HISTÓRICO</span></div>
    </div>

    <div id="dadosEquipamento" class="glass section">
        <div class="grid-inputs">
            <div><label>TAG</label><input type="text" id="regTag"></div>
            <div><label>TÉCNICO</label><select id="selTecnico"></select></div>
            <div><label>LOCAL/UNIDADE</label><select id="selLocal"></select></div>
            <div><label>DATA</label><input type="date" id="regData"></div>
        </div>
    </div>

    <div id="secTTR" class="section">
        <button class="btn-back no-print" onclick="voltarHome()">← VOLTAR</button>
        <div class="glass">
            <label>⚡ RELAÇÃO DE TRANSFORMAÇÃO</label>
            <div class="grid-inputs no-print" style="margin-top:10px">
                <div><label>U1</label><input type="number" id="u1"></div>
                <div><label>U2</label><input type="number" id="u2"></div>
            </div>
            <table><thead><tr><th>BUCHAS</th><th>LIDO</th><th>STATUS</th></tr></thead><tbody id="corpoTTR"></tbody></table>
        </div>
    </div>

    <div id="secMEG" class="section">
        <button class="btn-back no-print" onclick="voltarHome()">← VOLTAR</button>
        <div class="glass">
            <label>💥 ISOLAÇÃO (M/G/T)</label>
            <div class="grid-inputs no-print" style="margin-top:10px">
                <div><label>TENSÃO</label><select id="megT"><option>0.5kV</option><option>1.0kV</option><option>2.5kV</option><option>5.0kV</option></select></div>
                <div><label>VALOR</label><input type="text" id="megV"></div>
                <div><label>ESCALA</label><select id="megU"><option>TΩ</option><option>GΩ</option><option>MΩ</option></select></div>
            </div>
            <button class="btn-action btn-primary no-print" onclick="addMeg()">ADICIONAR</button>
            <table><thead><tr><th>PONTO</th><th>TENSÃO</th><th>VALOR</th></tr></thead><tbody id="corpoMeg"></tbody></table>
        </div>
    </div>

    <div id="secHIST" class="section">
        <button class="btn-back no-print" onclick="voltarHome()">← VOLTAR</button>
        <div class="glass">
            <label>📜 ÚLTIMOS ENSAIOS SALVOS</label>
            <table><thead><tr><th>DATA</th><th>TAG</th><th>TECNICO</th></tr></thead><tbody id="corpoHist"></tbody></table>
        </div>
    </div>

    <div id="secCONFIG" class="section">
        <button class="btn-back no-print" onclick="voltarHome()">← VOLTAR</button>
        <div class="glass">
            <label>👥 CADASTRAR TÉCNICOS</label>
            <div class="inf-group">
                <input type="text" id="newTec" placeholder="Nome do Técnico">
                <button class="btn-inf" onclick="addCfg('tecnicos', 'newTec')">+</button>
            </div>
            <ul id="listaTec" class="config-list"></ul>
        </div>
        <div class="glass">
            <label>📍 CADASTRAR LOCAIS</label>
            <div class="inf-group">
                <input type="text" id="newLoc" placeholder="Nome da Unidade">
                <button class="btn-inf" onclick="addCfg('locais', 'newLoc')">+</button>
            </div>
            <ul id="listaLoc" class="config-list"></ul>
        </div>
    </div>

    <div id="botoesAcao" class="section no-print">
        <button class="btn-action btn-success" onclick="salvarEImprimir()">💾 SALVAR E IMPRIMIR</button>
    </div>
</div>

<footer>PRODUCED BY EQUIPE ALPHA</footer>

<script>
    // Inicialização do "Banco de Dados" Local
    let db = JSON.parse(localStorage.getItem('alpha_db')) || { tecnicos: [], locais: [], historico: [] };

    function abrirS(id) {
        document.querySelectorAll('.section, .dashboard-menu').forEach(s => s.classList.remove('active'));
        document.getElementById('sec'+id).classList.add('active');
        if(id !== 'CONFIG' && id !== 'HIST') document.getElementById('dadosEquipamento').classList.add('active');
        if(id === 'CONFIG') renderCfg();
        if(id === 'HIST') renderHist();
        document.getElementById('botoesAcao').classList.add('active');
    }

    function voltarHome() {
        document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
        document.getElementById('secHOME').classList.add('active');
    }

    function addCfg(tipo, inputId) {
        const val = document.getElementById(inputId).value;
        if(val) {
            db[tipo].push(val);
            saveDB();
            renderCfg();
            document.getElementById(inputId).value = '';
        }
    }

    function delCfg(tipo, index) {
        db[tipo].splice(index, 1);
        saveDB();
        renderCfg();
    }

    function saveDB() {
        localStorage.setItem('alpha_db', JSON.stringify(db));
        updateSelectors();
    }

    function updateSelectors() {
        document.getElementById('selTecnico').innerHTML = db.tecnicos.map(t => `<option>${t}</option>`).join('');
        document.getElementById('selLocal').innerHTML = db.locais.map(l => `<option>${l}</option>`).join('');
    }

    function renderCfg() {
        document.getElementById('listaTec').innerHTML = db.tecnicos.map((t, i) => `<li>${t} <span class="btn-del" onclick="delCfg('tecnicos', ${i})">X</span></li>`).join('');
        document.getElementById('listaLoc').innerHTML = db.locais.map((l, i) => `<li>${l} <span class="btn-del" onclick="delCfg('locais', ${i})">X</span></li>`).join('');
    }

    function renderHist() {
        document.getElementById('corpoHist').innerHTML = db.historico.map(h => `<tr><td>${h.data}</td><td>${h.tag}</td><td>${h.tec}</td></tr>`).join('');
    }

    function addMeg() {
        const v = document.getElementById('megV').value;
        const t = document.getElementById('megT').value;
        const u = document.getElementById('megU').value;
        document.getElementById('corpoMeg').innerHTML += `<tr><td>${document.getElementById('megP').value}</td><td>${t}</td><td>${v} ${u}</td></tr>`;
    }

    function salvarEImprimir() {
        const entry = {
            data: document.getElementById('regData').value,
            tag: document.getElementById('regTag').value,
            tec: document.getElementById('selTecnico').value
        };
        if(entry.tag) {
            db.historico.unshift(entry);
            if(db.historico.length > 20) db.historico.pop();
            saveDB();
        }
        window.print();
    }

    window.onload = () => {
        updateSelectors();
        document.getElementById('regData').valueAsDate = new Date();
    };
</script>
</body>
</html>
