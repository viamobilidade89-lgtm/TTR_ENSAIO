<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ENSAIOS PRO EVOLUTION</title>
    <style>
        :root { --p: #facc15; --bg: #ffffff; --dark: #0f172a; --accent: #0284c7; --danger: #ef4444; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); margin: 0; padding: 0; color: var(--dark); display: flex; flex-direction: column; min-height: 100vh; }
        
        input, select, textarea { text-transform: uppercase; }

        /* Splash Screen com Logo da Empresa */
        #splash { position: fixed; top:0; left:0; width:100%; height:100%; background: var(--dark); display:flex; flex-direction:column; align-items:center; justify-content:center; z-index:9999; transition: 0.6s; }
        .logo-box { position: relative; display: flex; align-items: center; justify-content: center; margin-bottom: 20px; }
        .logo-circle { width: 120px; height: 120px; border: 4px solid var(--p); border-radius: 50%; position: absolute; animation: pulse 2s infinite; }
        .bolt-logo { width: 60px; height: 80px; background: var(--p); clip-path: polygon(45% 0%, 100% 0%, 55% 45%, 100% 45%, 15% 100%, 45% 55%, 0% 55%); z-index: 2; }
        .empresa-nome { color: white; font-weight: 900; font-size: 20px; letter-spacing: 2px; text-align: center; }
        .empresa-sub { color: var(--p); font-size: 10px; letter-spacing: 4px; font-weight: 300; }

        @keyframes pulse { 0% { transform: scale(1); opacity: 1; } 100% { transform: scale(1.4); opacity: 0; } }

        /* Header Harmonioso */
        header { display: flex; justify-content: space-between; align-items: center; padding: 20px; background: white; border-bottom: 1px solid #f1f5f9; }
        .header-title { font-size: 18px; font-weight: 900; color: var(--accent); margin: 0; letter-spacing: -0.5px; }
        .header-title span { color: var(--dark); font-weight: 400; }
        .config-icon { font-size: 22px; cursor: pointer; background: none; border: none; color: #64748b; }

        /* Menu de Bloco Único Centralizado */
        #main-wrapper { flex: 1; display: flex; align-items: center; justify-content: center; }
        .monolito-menu { 
            display: flex; 
            flex-direction: column; 
            width: 85%; 
            max-width: 320px; 
            background: var(--accent); 
            border-radius: 25px; 
            overflow: hidden;
            box-shadow: 0 15px 35px rgba(2, 132, 199, 0.3);
        }
        .btn-monolito {
            background: transparent;
            color: white;
            border: none;
            padding: 45px 20px;
            font-size: 18px;
            font-weight: 800;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 15px;
            transition: background 0.2s;
            position: relative;
        }
        /* Linha sutil de separação interna */
        .btn-monolito:not(:last-child)::after {
            content: "";
            position: absolute;
            bottom: 0;
            left: 10%;
            width: 80%;
            height: 1px;
            background: rgba(255,255,255,0.1);
        }
        .btn-monolito:active { background: rgba(0,0,0,0.1); }

        /* Telas */
        .tela { display: none; padding: 20px; flex: 1; animation: fadeIn 0.3s forwards; }
        .ativa { display: block !important; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(5px); } to { opacity: 1; transform: translateY(0); } }

        /* Footer */
        footer { text-align: center; padding: 20px; font-size: 10px; color: #cbd5e1; letter-spacing: 1px; }

        /* Ajustes de Card e Histórico */
        .card { background: #f8fafc; padding: 20px; border-radius: 20px; border: 1px solid #e2e8f0; }
        .btn-acao { width: 100%; padding: 15px; border-radius: 12px; border: none; font-weight: bold; cursor: pointer; margin-top: 10px; }
    </style>
</head>
<body>

<div id="splash">
    <div class="logo-box">
        <div class="logo-circle"></div>
        <div class="bolt-logo"></div>
    </div>
    <div class="empresa-nome">PRO EVOLUTION</div>
    <div class="empresa-sub">ENGENHARIA</div>
</div>

<header class="no-print">
    <h1 class="header-title">ENSAIOS <span>Pro EVOLUTION</span></h1>
    <button class="config-icon" onclick="mudar('CONFIG')">⚙️</button>
</header>

<div id="main-wrapper" class="no-print">
    <div id="menuHome" class="monolito-menu">
        <button class="btn-monolito" onclick="mudar('MEG')"><span>⚡</span> MEGGER</button>
        <button class="btn-monolito" onclick="mudar('TTR')"><span>📟</span> TTR</button>
        <button class="btn-monolito" onclick="mudar('MICRO')"><span>💼</span> MICRO</button>
    </div>
</div>

<div id="secMEG" class="tela">
    <div class="card">
        <h3 style="text-align:center; color:var(--accent); margin-top:0">CONTROLE MEGGER</h3>
        <select id="mPonto"><option>PRI X SEC</option><option>PRI X CARC</option></select>
        <input type="number" id="mVal" placeholder="VALOR">
        <button class="btn-acao" style="background:var(--accent); color:white" onclick="alert('ADICIONADO')">ADICIONAR</button>
        <button class="btn-acao" style="background:#64748b; color:white" onclick="voltar()">VOLTAR</button>
    </div>
</div>

<div id="secCONFIG" class="tela">
    <div class="card">
        <h3 style="color:var(--accent); margin-top:0">CONFIGURAÇÕES</h3>
        <div id="listaHist"></div>
        <button class="btn-acao" style="background:#64748b; color:white" onclick="voltar()">FECHAR</button>
    </div>
</div>

<footer>PRODUCED BY UNKNOWN</footer>

<script>
    window.onload = () => { 
        setTimeout(() => { 
            document.getElementById('splash').style.opacity = '0';
            setTimeout(() => document.getElementById('splash').style.display = 'none', 600);
        }, 3000); 
    };

    function mudar(t) {
        document.getElementById('main-wrapper').style.display = 'none';
        document.querySelectorAll('.tela').forEach(x => x.classList.remove('ativa'));
        if(t === 'HOME') document.getElementById('main-wrapper').style.display = 'flex';
        else document.getElementById('sec'+t).classList.add('ativa');
    }

    function voltar() { mudar('HOME'); }
</script>
</body>
</html>
