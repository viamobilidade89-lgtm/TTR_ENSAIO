<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ENSAIO PRO EVOLUTION</title>
    <style>
        :root { --p: #facc15; --bg: #ffffff; --dark: #0f172a; --accent: #0284c7; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); margin: 0; padding: 0; color: var(--dark); overflow-x: hidden; }
        
        /* Splash Animation Atualizada */
        #splash { position: fixed; top:0; left:0; width:100%; height:100%; background: var(--dark); display:flex; flex-direction:column; align-items:center; justify-content:center; z-index:9999; }
        .bolt { width: 60px; height: 60px; background: var(--p); clip-path: polygon(45% 0%, 100% 0%, 55% 45%, 100% 45%, 15% 100%, 45% 55%, 0% 55%); animation: surge 1s infinite alternate; }
        .loader { width: 30px; height: 30px; border: 3px solid #334155; border-top: 3px solid var(--p); border-radius: 50%; animation: spin 1s linear infinite; margin-top: 20px; }
        @keyframes surge { from { filter: drop-shadow(0 0 5px var(--p)); transform: scale(1); } to { filter: drop-shadow(0 0 20px var(--p)); transform: scale(1.1); } }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

        /* Header Alinhado */
        header { display: flex; justify-content: center; align-items: center; padding: 30px 20px; position: relative; width: 100%; box-sizing: border-box; }
        .main-title { font-size: 26px; font-weight: 900; color: var(--accent); letter-spacing: 1px; margin: 0; }
        .config-btn { position: absolute; right: 20px; font-size: 28px; cursor: pointer; background: none; border: none; }

        /* Menu Centralizado (Bloco Único) */
        #main-wrapper { display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 60vh; }
        .menu-grid { display: flex; flex-direction: column; width: 85%; max-width: 350px; }
        .btn-menu { 
            background: var(--accent); color: white; border: 1px solid #0369a1; 
            padding: 40px 20px; font-size: 22px; font-weight: bold; cursor: pointer;
            width: 100%; transition: 0.2s; box-sizing: border-box;
        }
        .btn-menu:first-child { border-radius: 20px 20px 0 0; }
        .btn-menu:last-child { border-radius: 0 0 20px 20px; }
        .btn-menu:active { opacity: 0.8; }

        /* Telas */
        .tela { display: none; padding: 20px; animation: fadeIn 0.3s forwards; }
        .ativa { display: block !important; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        /* Estilo dos Cards */
        .card { background: #f8fafc; padding: 20px; border-radius: 15px; border: 1px solid #e2e8f0; max-width: 500px; margin: auto; }
        label { display: block; font-size: 11px; font-weight: 800; color: var(--accent); margin: 15px 0 5px; text-transform: uppercase; }
        input, select { width: 100%; padding: 12px; border: 2px solid #cbd5e1; border-radius: 10px; font-size: 16px; box-sizing: border-box; }

        /* Footer Fixo */
        footer { position: fixed; bottom: 0; left: 0; width: 100%; text-align: center; padding: 15px; font-size: 13px; color: #94a3b8; background: white; }

        /* Histórico */
        .hist-item { background: white; border: 1px solid #cbd5e1; padding: 12px; border-radius: 10px; margin-bottom: 10px; display: flex; justify-content: space-between; align-items: center; }
        .btn-share { background: #16a34a; color: white; border: none; padding: 10px; border-radius: 8px; font-weight: bold; }
    </style>
</head>
<body>

<div id="splash">
    <div class="bolt"></div>
    <div class="loader"></div>
    <h2 style="color:white; margin-top:20px; font-weight:300; letter-spacing:3px; font-size: 14px;">PRO EVOLUTION</h2>
</div>

<header class="no-print">
    <h1 class="main-title">ENSAIO PRO EVOLUTION</h1>
    <button class="config-btn" onclick="mudar('CONFIG')">⚙️</button>
</header>

<div id="main-wrapper" class="no-print">
    <div id="menuHome" class="menu-grid ativa">
        <button class="btn-menu" onclick="mudar('MEG')">⚡ MEGGER</button>
        <button class="btn-menu" onclick="mudar('TTR')">📟 TTR</button>
        <button class="btn-menu" onclick="mudar('MICRO')">📏 MICRO</button>
    </div>
</div>

<div id="secMEG" class="tela">
    <div class="card">
        <h2 style="color:var(--accent); margin-top:0">⚡ MEGGER</h2>
        <label>PONTO DE TESTE</label>
        <select id="mPonto"><option>PRI x SEC</option><option>PRI x CARC</option></select>
        <button class="btn-menu" style="margin-top:20px; padding:15px; border-radius:12px" onclick="alert('Salvo!')">SALVAR</button>
        <button class="btn-menu" style="margin-top:10px; background:#64748b; padding:15px; border-radius:12px" onclick="voltar()">VOLTAR</button>
    </div>
</div>

<div id="secCONFIG" class="tela">
    <div class="card">
        <h3 style="color:var(--accent); margin-top:0;">📁 HISTÓRICO</h3>
        <div id="listaHistorico"></div>

        <h3 style="color:var(--accent)">👥 TÉCNICOS</h3>
        <div style="display:flex; gap:5px;">
            <input type="text" id="cfgT"><button onclick="salvarCfg('tecnicos','cfgT')" style="background:var(--accent); border:none; color:white; width:50px; border-radius:8px;">+</button>
        </div>
        <div id="cfgListaTecs" style="margin-top:10px"></div>

        <h3 style="color:var(--accent); margin-top:20px;">📍 LOCAIS</h3>
        <div style="display:flex; gap:5px;">
            <input type="text" id="cfgL"><button onclick="salvarCfg('locais','cfgL')" style="background:var(--accent); border:none; color:white; width:50px; border-radius:8px;">+</button>
        </div>
        <div id="cfgListaLocais" style="margin-top:10px"></div>

        <button class="btn-menu" style="margin-top:30px; background:#64748b; padding:15px; border-radius:12px" onclick="voltar()">FINALIZAR E SAIR</button>
    </div>
</div>

<footer>Produced by unknown</footer>

<script>
    let db = JSON.parse(localStorage.getItem('pro_evo_db_v3')) || { tecnicos: [], locais: [], historico: [] };

    window.onload = () => { 
        setTimeout(() => { document.getElementById('splash').style.display = 'none'; }, 3000); 
        render(); 
    };

    function mudar(t) {
        // Esconde o menu principal completamente
        document.getElementById('main-wrapper').style.display = 'none';
        document.querySelectorAll('.tela').forEach(x => x.classList.remove('ativa'));
        
        if(t === 'HOME') {
            document.getElementById('main-wrapper').style.display = 'flex';
        } else {
            document.getElementById('sec'+t).classList.add('ativa');
        }
    }

    function voltar() { mudar('HOME'); }

    function salvarCfg(tipo, id) {
        const val = document.getElementById(id).value;
        if(val) { 
            db[tipo].push(val); 
            localStorage.setItem('pro_evo_db_v3', JSON.stringify(db)); 
            render(); 
            document.getElementById(id).value=''; 
        }
    }

    function render() {
        document.getElementById('cfgListaTecs').innerHTML = db.tecnicos.map((t,i) => `
            <div style="display:inline-block; background:#e2e8f0; padding:5px 10px; border-radius:15px; margin:2px; font-size:12px;">
                ${t} <b onclick="db.tecnicos.splice(${i},1); localStorage.setItem('pro_evo_db_v3', JSON.stringify(db)); render();" style="color:red;cursor:pointer">×</b>
            </div>`).join('');
            
        document.getElementById('cfgListaLocais').innerHTML = db.locais.map((l,i) => `
            <div style="display:inline-block; background:#e2e8f0; padding:5px 10px; border-radius:15px; margin:2px; font-size:12px;">
                ${l} <b onclick="db.locais.splice(${i},1); localStorage.setItem('pro_evo_db_v3', JSON.stringify(db)); render();" style="color:red;cursor:pointer">×</b>
            </div>`).join('');

        document.getElementById('listaHistorico').innerHTML = db.historico.length ? "" : "<small>Nenhum registro.</small>";
    }
</script>
</body>
</html>
