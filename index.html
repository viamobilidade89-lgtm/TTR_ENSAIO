<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PRO EVOLUTION - SISTEMA UNIFICADO</title>
    <style>
        :root { --p: #facc15; --bg: #ffffff; --dark: #0f172a; --accent: #0284c7; --danger: #ef4444; --success: #16a34a; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); margin: 0; padding: 0; color: var(--dark); display: flex; flex-direction: column; min-height: 100vh; overflow-x: hidden; }
        
        input, select { text-transform: uppercase; width: 100%; padding: 12px; border: 2px solid #cbd5e1; border-radius: 12px; font-size: 15px; box-sizing: border-box; margin-bottom: 10px; }
        label { font-size: 11px; font-weight: 800; color: #64748b; margin-left: 5px; text-transform: uppercase; display: block; margin-bottom: 4px; }

        /* Splash */
        #splash { position: fixed; top:0; left:0; width:100%; height:100%; background: var(--dark); display:flex; flex-direction:column; align-items:center; justify-content:center; z-index:9999; }
        .logo-circle { width: 140px; height: 140px; border: 5px solid var(--p); border-radius: 50%; position: absolute; animation: pulse 2s infinite; }
        .bolt-logo { width: 70px; height: 90px; background: var(--p); clip-path: polygon(45% 0%, 100% 0%, 55% 45%, 100% 45%, 15% 100%, 45% 55%, 0% 55%); z-index: 2; }
        @keyframes pulse { 0% { transform: scale(1); opacity: 1; } 100% { transform: scale(1.4); opacity: 0; } }

        header { display: grid; grid-template-columns: 50px 1fr 50px; align-items: center; padding: 25px 15px; background: white; border-bottom: 1px solid #f1f5f9; }
        .header-title { grid-column: 2; font-size: 20px; font-weight: 900; color: var(--accent); text-align: center; }

        #main-wrapper { flex: 1; display: flex; align-items: center; justify-content: center; padding: 20px; }
        .monolito-menu { display: flex; flex-direction: column; width: 95%; max-width: 400px; background: linear-gradient(145deg, #0284c7, #0271ab); border-radius: 40px; overflow: hidden; box-shadow: 0 30px 60px rgba(2,132,199,0.4); }
        .btn-monolito { background: transparent; color: white; border: none; padding: 45px 25px; cursor: pointer; display: flex; align-items: center; gap: 25px; text-align: left; border-bottom: 1px solid rgba(255,255,255,0.1); }
        
        .tela { display: none; padding: 20px; animation: fadeIn 0.4s ease-out; }
        .ativa { display: block !important; }
        .card { background: #f8fafc; padding: 25px; border-radius: 30px; border: 1px solid #e2e8f0; max-width: 600px; margin: 0 auto 20px auto; }
        
        /* Alinhamento à Esquerda */
        .multi-select { background: white; border: 2px solid #cbd5e1; border-radius: 12px; padding: 10px; max-height: 150px; overflow-y: auto; }
        .multi-item { display: flex; align-items: center; justify-content: flex-start; gap: 10px; padding: 8px; border-bottom: 1px solid #f1f5f9; font-weight: 600; text-align: left; }

        .table-wrap { overflow-x: auto; background: white; border-radius: 15px; border: 1px solid #e2e8f0; margin-top: 10px; }
        table { width: 100%; border-collapse: collapse; font-size: 10px; min-width: 500px; }
        th { background: #f1f5f9; padding: 10px; border-bottom: 2px solid #e2e8f0; }
        td { padding: 10px; border-bottom: 1px solid #f1f5f9; text-align: center; font-weight: bold; }

        .btn-acao { width: 100%; padding: 18px; border-radius: 15px; border: none; font-weight: bold; cursor: pointer; color: white; margin-top: 10px; }
        .info-box { background: #e0f2fe; color: #0369a1; padding: 15px; border-radius: 15px; margin-bottom: 15px; font-size: 12px; border-left: 5px solid var(--accent); font-weight: bold; }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>

<div id="splash">
    <div class="logo-circle"></div><div class="bolt-logo"></div>
    <h2 style="color:white; margin-top:180px; letter-spacing:3px">PRO EVOLUTION</h2>
</div>

<header>
    <div></div><h1 class="header-title">SISTEMA DE ENSAIOS</h1>
    <button onclick="mudar('CONFIG')" style="background:none; border:none; font-size:24px">⚙️</button>
</header>

<div id="main-wrapper">
    <div class="monolito-menu">
        <button class="btn-monolito" onclick="mudar('ENS')">
            <div style="font-size:40px">📋</div>
            <div><span style="font-size:22px; font-weight:900">REALIZAR ENSAIOS</span><br><span style="font-size:12px">MEGGER & TTR UNIFICADOS</span></div>
        </button>
    </div>
</div>

<div id="secENS" class="tela">
    <div class="card">
        <label>TAG EQUIPAMENTO</label>
        <input type="text" id="globalTag" placeholder="EX: TR-01">
        <label>TÉCNICOS (ALINHADOS À ESQUERDA)</label>
        <div id="tecContainer" class="multi-select"></div>
    </div>

    <div class="card" style="border-top: 5px solid var(--accent)">
        <h3 style="color:var(--accent)">⚡ PARTE 1: MEGGER</h3>
        <label>PONTO</label>
        <select id="mPonto">
            <option>PRIMÁRIO X SECUNDÁRIO</option><option>PRIMÁRIO X CARCAÇA</option>
            <option>SECUNDÁRIO X CARCAÇA</option><option>CAMIS</option>
        </select>
        <label>TENSÃO</label>
        <select id="mTen"><option>250V</option><option>500V</option><option>1KV</option><option>2,5KV</option><option>5KV</option></select>
        <label>REF. MÍNIMA (MΩ)</label>
        <input type="number" id="mRef" inputmode="decimal">
        
        <div style="display:grid; grid-template-columns: 1fr 1fr; gap:5px">
            <div><label>30s</label><input type="text" id="m30" inputmode="decimal"></div>
            <div><label>60s</label><input type="text" id="m60" inputmode="decimal"></div>
        </div>
        <label>120s</label>
        <div style="display:flex; gap:5px">
            <input type="text" id="m120" inputmode="decimal">
            <button onclick="document.getElementById('m120').value='∞'" style="width:60px; border-radius:10px; border:1px solid #ccc">∞</button>
        </div>
        <button class="btn-acao" style="background:var(--accent)" onclick="addMeg()">REGISTRAR MEGGER</button>
        
        <div class="table-wrap">
            <table id="tabMeg"><thead><tr><th>PONTO</th><th>REF</th><th>120s</th><th>ST.</th></tr></thead><tbody></tbody></table>
        </div>
    </div>

    <div class="card" style="border-top: 5px solid var(--p)">
        <h3 style="color:#856404">📟 PARTE 2: TTR</h3>
        <div style="display:grid; grid-template-columns: 1fr 1fr; gap:10px">
            <div><label>U1 (ENTRADA)</label><input type="number" id="tU1" inputmode="decimal" oninput="calcTTR()"></div>
            <div><label>U2 (SAÍDA)</label><input type="number" id="tU2" inputmode="decimal" oninput="calcTTR()"></div>
        </div>
        <label>FASORIAL</label>
        <select id="tFas" onchange="atualizarTTR()"></select>
        <label>NEUTRO</label>
        <select id="tNeu" onchange="atualizarTTR()">
            <option value="X0">C/ X0 APARENTE</option><option value="H0">C/ H0 APARENTE</option>
        </select>
        <div id="tDica" class="info-box">Selecione as pontas...</div>
        <label>VALOR TEÓRICO</label>
        <input type="text" id="tTeo" readonly style="background:#f1f5f9; font-weight:bold">
        <label>PONTAS DE PROVA (REFERÊNCIA)</label>
        <select id="tPontaSel"></select>
        <label>LEITURA TTR</label>
        <input type="number" id="tLido" inputmode="decimal" step="0.0001">
        <button class="btn-acao" style="background:var(--p); color:var(--dark)" onclick="addTtr()">REGISTRAR TTR</button>

        <div class="table-wrap">
            <table id="tabTtr"><thead><tr><th>PONTAS</th><th>TEO</th><th>LIDO</th><th>DESVIO%</th><th>ST.</th></tr></thead><tbody></tbody></table>
        </div>
    </div>

    <button class="btn-acao" style="background:var(--success); padding:25px; font-size:18px" onclick="finalizarRelatorio()">💾 FINALIZAR RELATÓRIO UNIFICADO</button>
    <button class="btn-acao" style="background:#64748b" onclick="voltar()">CANCELAR</button>
</div>

<div id="secCONFIG" class="tela">
    <div class="card">
        <h3>CADASTROS</h3>
        <input type="text" id="cTec" placeholder="NOME TÉCNICO">
        <button class="btn-acao" style="background:var(--accent)" onclick="addCfg('tecnicos','cTec')">SALVAR TÉCNICO</button>
        <div id="lTec" style="margin-top:10px"></div>
        <hr>
        <h3>HISTÓRICO DE LAUDOS</h3>
        <div id="listaHist"></div>
    </div>
    <button class="btn-acao" style="background:#64748b" onclick="voltar()">VOLTAR</button>
</div>

<script>
    const DB_KEY = 'PRO_EVO_V3_FINAL';
    let db = JSON.parse(localStorage.getItem(DB_KEY)) || { tecnicos: [], historico: [] };
    let megTemp = [], ttrTemp = [];

    const fasoriais = {
        "Ydn": { d: "Ydn1 / Ydn11", f: (u1,u2,n) => n=='X0' ? (u1*1.732/u2) : (u1/(1.732*u2)), p: { "X0": ["H1-H3 | X1-X0", "H1-H2 | X2-X0", "H3-H1 | X3-X0"], "H0": ["H1-H0 | X1-X3", "H2-H0 | X2-X1", "H3-H0 | X3-X2"]} },
        "Yd": { d: "Yd1 / Yd11", f: (u1,u2) => (0.866*u1/u2), p: { "X0": ["H2-H1~H3 | X2-X3", "H3-H2~H1 | X3-X1", "H1-H3~H2 | X1-X2"], "H0": ["H2-H1~H3 | X2-X3", "H3-H2~H1 | X3-X1", "H1-H3~H2 | X1-X2"]} },
        "Dy": { d: "Dy1 / Dy11", f: (u1,u2) => (u1/(0.866*u2)), p: { "X0": ["H1-H3 | X2-X1~X3", "H3-H2 | X3-X2~X1", "H1-H3 | X1-X3~X2"], "H0": ["H1-H3 | X2-X1~X3", "H3-H2 | X3-X2~X1", "H1-H3 | X1-X3~X2"]} },
        "Yyn0": { d: "Yyn0", f: (u1,u2) => (u1/(1.732*u2*0.866)), p: { "X0": ["H1-H2~H3 | X1-X0", "H2-H3~H1 | X2-X0", "H3-H1~H2 | X3-X0"], "H0": ["H1-H0 | X1-X3", "H2-H0 | X2-X1", "H3-H0 | X3-X2"]} },
        "Yy0": { d: "Yy0 / Dd0 / Ynyn0", f: (u1,u2) => (u1/u2), p: { "X0": ["H1-H2 | X1-X2", "H2-H3 | X2-X3", "H3-H1 | X3-X1"], "H0": ["H1-H0 | X1-X0", "H2-H0 | X2-X0", "H3-H0 | X3-X0"]} }
    };

    function mudar(t) {
        document.getElementById('main-wrapper').style.display = 'none';
        document.querySelectorAll('.tela').forEach(x => x.classList.remove('ativa'));
        if(t === 'HOME') document.getElementById('main-wrapper').style.display = 'flex';
        else document.getElementById('sec'+t).classList.add('ativa');
    }
    function voltar() { mudar('HOME'); }

    function addMeg() {
        const ref = parseFloat(document.getElementById('mRef').value);
        const v30 = convInf(document.getElementById('m30').value);
        const v60 = convInf(document.getElementById('m60').value);
        const v120 = convInf(document.getElementById('m120').value);
        
        // CORREÇÃO: Se qualquer valor for menor que a referência, REPROVA
        const ok = (v30 >= ref && v60 >= ref && v120 >= ref);
        megTemp.push({ ponto: document.getElementById('mPonto').value, ref, v120: document.getElementById('m120').value, st: ok?'OK':'REPR', cor: ok? 'var(--success)':'var(--danger)' });
        renderMeg();
    }
    function convInf(v) { return v === "∞" ? 999999999 : parseFloat(v); }

    function atualizarTTR() {
        const fKey = document.getElementById('tFas').value;
        const neu = document.getElementById('tNeu').value;
        const pSel = document.getElementById('tPontaSel');
        pSel.innerHTML = '';
        fasoriais[fKey].p[neu].forEach(p => pSel.innerHTML += `<option>${p}</option>`);
        calcTTR();
    }

    function calcTTR() {
        const u1 = parseFloat(document.getElementById('tU1').value), u2 = parseFloat(document.getElementById('tU2').value);
        if(!u1 || !u2) return;
        const res = fasoriais[document.getElementById('tFas').value].f(u1, u2, document.getElementById('tNeu').value);
        document.getElementById('tTeo').value = res.toFixed(5);
    }

    function addTtr() {
        const teo = parseFloat(document.getElementById('tTeo').value);
        const lido = parseFloat(document.getElementById('tLido').value);
        const desvio = Math.abs(((lido - teo) / teo) * 100);
        const ok = desvio <= 0.5;
        ttrTemp.push({ pontas: document.getElementById('tPontaSel').value, teo: teo.toFixed(4), lido: lido.toFixed(4), desvio: desvio.toFixed(3), st: ok?'OK':'REPR', cor: ok?'var(--success)':'var(--danger)' });
        renderTtr();
    }

    function renderMeg() {
        document.querySelector('#tabMeg tbody').innerHTML = megTemp.map(m => `<tr><td>${m.ponto}</td><td>${m.ref}</td><td>${m.v120}</td><td style="color:white; background:${m.cor}">${m.st}</td></tr>`).join('');
    }
    function renderTtr() {
        document.querySelector('#tabTtr tbody').innerHTML = ttrTemp.map(t => `<tr><td>${t.pontas}</td><td>${t.teo}</td><td>${t.lido}</td><td>${t.desvio}%</td><td style="color:white; background:${t.cor}">${t.st}</td></tr>`).join('');
    }

    function finalizarRelatorio() {
        const tag = document.getElementById('globalTag').value;
        if(!tag) return alert("INSIRA A TAG!");
        db.historico.unshift({ id: Date.now(), tag, data: new Date().toLocaleDateString(), meg: [...megTemp], ttr: [...ttrTemp] });
        localStorage.setItem(DB_KEY, JSON.stringify(db));
        alert("RELATÓRIO UNIFICADO SALVO COM SUCESSO!");
        location.reload();
    }

    function addCfg(tipo, id) {
        const v = document.getElementById(id).value.trim().toUpperCase();
        if(v) { db[tipo].push(v); db[tipo].sort(); localStorage.setItem(DB_KEY, JSON.stringify(db)); renderTudo(); document.getElementById(id).value=''; }
    }

    function renderTudo() {
        document.getElementById('tecContainer').innerHTML = db.tecnicos.map(t => `<div class="multi-item"><input type="checkbox" class="tec-check" value="${t}"> ${t}</div>`).join('');
        document.getElementById('lTec').innerHTML = db.tecnicos.map((t,i) => `<span style="background:#ddd; padding:5px; margin:2px; display:inline-block; border-radius:5px">${t} <b onclick="db.tecnicos.splice(${i},1);renderTudo()">×</b></span>`).join('');
        const combo = document.getElementById('tFas');
        combo.innerHTML = '';
        for(let k in fasoriais) combo.innerHTML += `<option value="${k}">${fasoriais[k].d}</option>`;
        document.getElementById('listaHist').innerHTML = db.historico.map(h => `<div class="card"><b>TAG: ${h.tag}</b> - ${h.data}<br><small>Megger: ${h.meg.length} | TTR: ${h.ttr.length}</small></div>`).join('');
    }

    window.onload = () => { renderTudo(); atualizarTTR(); setTimeout(()=>document.getElementById('splash').style.display='none', 1500); };
</script>
</body>
</html>
