<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ENSAIOS PRO EVOLUTION</title>
    <style>
        :root { --p: #facc15; --bg: #ffffff; --dark: #0f172a; --accent: #0284c7; --danger: #ef4444; --success: #16a34a; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); margin: 0; padding: 0; color: var(--dark); display: flex; flex-direction: column; min-height: 100vh; overflow-x: hidden; }
        
        input, select { text-transform: uppercase; width: 100%; padding: 12px; border: 2px solid #cbd5e1; border-radius: 12px; font-size: 15px; box-sizing: border-box; margin-bottom: 10px; }
        label { font-size: 11px; font-weight: 800; color: #64748b; margin-left: 5px; text-transform: uppercase; display: block; margin-bottom: 4px; }

        /* Splash Screen */
        #splash { position: fixed; top:0; left:0; width:100%; height:100%; background: var(--dark); display:flex; flex-direction:column; align-items:center; justify-content:center; z-index:9999; }
        .logo-box { position: relative; display: flex; align-items: center; justify-content: center; margin-bottom: 20px; }
        .logo-circle { width: 140px; height: 140px; border: 5px solid var(--p); border-radius: 50%; position: absolute; animation: pulse 2s infinite; }
        .bolt-logo { width: 70px; height: 90px; background: var(--p); clip-path: polygon(45% 0%, 100% 0%, 55% 45%, 100% 45%, 15% 100%, 45% 55%, 0% 55%); z-index: 2; }
        .empresa-nome { color: white; font-weight: 900; font-size: 28px; letter-spacing: 3px; text-align: center; }
        @keyframes pulse { 0% { transform: scale(1); opacity: 1; } 100% { transform: scale(1.4); opacity: 0; } }

        /* Menu Principal com Sombra */
        header { display: grid; grid-template-columns: 50px 1fr 50px; align-items: center; padding: 25px 15px; background: white; border-bottom: 1px solid #f1f5f9; }
        .header-title { grid-column: 2; font-size: 20px; font-weight: 900; color: var(--accent); margin: 0; text-align: center; letter-spacing: 1px; }
        .config-icon { grid-column: 3; font-size: 24px; cursor: pointer; background: none; border: none; color: #cbd5e1; justify-self: end; }

        #main-wrapper { flex: 1; display: flex; align-items: center; justify-content: center; padding: 20px; }
        .monolito-menu { display: flex; flex-direction: column; width: 95%; max-width: 400px; background: linear-gradient(145deg, #0284c7, #0271ab); border-radius: 40px; overflow: hidden; box-shadow: 0 30px 60px rgba(2, 132, 199, 0.45); }
        .btn-monolito { background: transparent; color: white; border: none; padding: 45px 25px; cursor: pointer; display: flex; align-items: center; gap: 25px; position: relative; text-align: left; }
        .icon-box { width: 50px; height: 50px; display: flex; align-items: center; justify-content: center; font-size: 40px; filter: drop-shadow(0 4px 6px rgba(0,0,0,0.3)); }
        .btn-label { font-size: 22px; font-weight: 900; display: block; text-shadow: 0 2px 4px rgba(0,0,0,0.2); }
        .btn-desc { font-size: 12px; color: rgba(255,255,255,0.8); }

        /* Telas */
        .tela { display: none; padding: 20px; animation: fadeIn 0.4s ease-out; }
        .ativa { display: block !important; }
        .card { background: #f8fafc; padding: 25px; border-radius: 30px; border: 1px solid #e2e8f0; max-width: 600px; margin: auto; margin-bottom: 20px; box-shadow: 0 10px 25px rgba(0,0,0,0.05); }
        .btn-acao { width: 100%; padding: 18px; border-radius: 15px; border: none; font-weight: bold; font-size: 16px; cursor: pointer; color: white; margin-top: 10px; }
        
        .btn-inf { background: #e2e8f0; border: none; border-radius: 8px; padding: 0 15px; cursor: pointer; font-size: 20px; font-weight: bold; margin-bottom: 10px; height: 45px; }
        .multi-select { background: white; border: 2px solid #cbd5e1; border-radius: 12px; padding: 10px; max-height: 120px; overflow-y: auto; margin-bottom: 10px; }
        .multi-item { display: flex; align-items: center; gap: 10px; padding: 8px 0; border-bottom: 1px solid #f1f5f9; font-size: 14px; font-weight: 600; }
        
        /* Tabela */
        .table-wrap { overflow-x: auto; background: white; border-radius: 15px; border: 1px solid #e2e8f0; }
        table { width: 100%; border-collapse: collapse; font-size: 10px; min-width: 520px; }
        th { background: #f1f5f9; padding: 10px; border-bottom: 2px solid #e2e8f0; }
        td { padding: 10px; border-bottom: 1px solid #f1f5f9; text-align: center; }
        .btn-del-row { background: var(--danger); color: white; border: none; border-radius: 6px; padding: 4px 8px; }

        .hist-item { background: white; border: 1px solid #e2e8f0; padding: 18px; border-radius: 20px; margin-bottom: 15px; border-left: 6px solid var(--accent); }
        .hist-btns { display: flex; gap: 8px; margin-top: 12px; }
        .btn-mini { flex: 1; padding: 12px; border: none; border-radius: 10px; color: white; font-weight: bold; font-size: 11px; }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        footer { text-align: center; padding: 30px; font-size: 11px; color: #cbd5e1; letter-spacing: 2px; }
    </style>
</head>
<body>

<div id="splash">
    <div class="logo-box">
        <div class="logo-circle"></div>
        <div class="bolt-logo"></div>
    </div>
    <div class="empresa-nome">PRO EVOLUTION</div>
</div>

<header>
    <div></div>
    <h1 class="header-title">ENSAIOS PRO EVOLUTION</h1>
    <button class="config-icon" onclick="mudar('CONFIG')">⚙️</button>
</header>

<div id="main-wrapper">
    <div id="menuHome" class="monolito-menu">
        <button class="btn-monolito" onclick="mudar('MEG')">
            <div class="icon-box">⚡</div>
            <div><span class="btn-label">MEGGER</span><span class="btn-desc">Resistência de isolação</span></div>
        </button>
        <button class="btn-monolito" onclick="mudar('TTR')">
            <div class="icon-box">📟</div>
            <div><span class="btn-label">TTR</span><span class="btn-desc">Relação de transformação</span></div>
        </button>
    </div>
</div>

<div id="secMEG" class="tela">
    <div class="card">
        <button class="btn-acao" style="background:var(--dark); margin-bottom:20px" onclick="novoEnsaio()">+ NOVO ENSAIO</button>
        <h2 style="text-align:center; color:var(--accent); margin:0 0 20px 0">ENSAIO MEGGER</h2>
        <input type="hidden" id="editId">
        <label>1. TAG do Equipamento</label>
        <input type="text" id="mTag" placeholder="EX: TR-01" oninput="this.value = this.value.toUpperCase()">
        <label>2. Técnicos (Múltipla Seleção)</label>
        <div id="mTecContainer" class="multi-select"></div>
        <label>3. Local</label>
        <select id="mLoc"></select>
        <label>4. Ponto de Medição</label>
        <select id="mPonto">
            <option>PRIMÁRIO X SECUNDÁRIO</option><option>PRIMÁRIO X CARCAÇA</option>
            <option>SECUNDÁRIO X CARCAÇA</option><option>CAMIS</option>
        </select>
        <label>5. Tensão Aplicada</label>
        <select id="mTen">
            <option>250V</option><option>500V</option><option>1KV</option><option>2,5KV</option><option>5KV</option>
        </select>
        <label>6. Resistência Mínima</label>
        <div style="display:flex; gap:5px">
            <input type="number" id="mRef" placeholder="VALOR" inputmode="decimal">
            <select id="mRefUni" style="width:100px"><option>MΩ</option><option>GΩ</option><option>TΩ</option></select>
        </div>
        <label>7/8. Leituras</label>
        <div style="display:flex; gap:5px; align-items: center">
            <input type="text" id="m30" placeholder="30s" inputmode="decimal">
            <button class="btn-inf" onclick="setInf('m30')">∞</button>
            <select id="u30" style="width:80px"><option>MΩ</option><option>GΩ</option><option>TΩ</option></select>
        </div>
        <div style="display:flex; gap:5px; align-items: center">
            <input type="text" id="m60" placeholder="60s" inputmode="decimal">
            <button class="btn-inf" onclick="setInf('m60')">∞</button>
            <select id="u60" style="width:80px"><option>MΩ</option><option>GΩ</option><option>TΩ</option></select>
        </div>
        <div style="display:flex; gap:5px; align-items: center">
            <input type="text" id="m120" placeholder="120s" inputmode="decimal">
            <button class="btn-inf" onclick="setInf('m120')">∞</button>
            <select id="u120" style="width:80px"><option>MΩ</option><option>GΩ</option><option>TΩ</option></select>
        </div>
        <button class="btn-acao" style="background:var(--accent)" onclick="registrarMegger()">REGISTRAR NO QUADRO</button>
    </div>
    <div class="card" style="padding:15px">
        <div class="table-wrap">
            <table id="tabMegResult">
                <thead><tr><th>PONTO</th><th>TEN.</th><th>30s</th><th>60s</th><th>120s</th><th>ST.</th><th>×</th></tr></thead>
                <tbody></tbody>
            </table>
        </div>
        <button class="btn-acao" style="background:var(--success); margin-top:20px" onclick="salvarHistorico()">💾 SALVAR NO HISTÓRICO</button>
    </div>
    <button class="btn-acao" style="background:#64748b" onclick="voltar()">VOLTAR</button>
</div>

<div id="secCONFIG" class="tela">
    <div class="card">
        <h3>📁 HISTÓRICO</h3>
        <div id="listaHist"></div>
        <hr>
        <h3>👥 TÉCNICOS</h3>
        <div style="display:flex; gap:8px">
            <input type="text" id="cTec" placeholder="NOME" style="margin:0">
            <button onclick="addCfg('tecnicos','cTec')" style="background:var(--accent); color:white; border:none; border-radius:12px; width:50px">+</button>
        </div>
        <div id="lTec"></div>
        <h3>📍 LOCAIS</h3>
        <div style="display:flex; gap:8px">
            <input type="text" id="cLoc" placeholder="LOCAL" style="margin:0">
            <button onclick="addCfg('locais','cLoc')" style="background:var(--accent); color:white; border:none; border-radius:12px; width:50px">+</button>
        </div>
        <div id="lLoc"></div>
        <button class="btn-acao" style="background:#64748b; margin-top:20px" onclick="voltar()">FECHAR</button>
    </div>
</div>

<footer>PRODUCED BY UNKNOWN</footer>

<script>
    const DB_KEY = 'PRO_EVO_MASTER_V20';
    let db = { tecnicos: [], locais: [], historico: [] };
    let ensaiosAtuais = [];

    // Função de carregamento super segura
    function inicializar() {
        try {
            const saved = localStorage.getItem(DB_KEY);
            if(saved) db = JSON.parse(saved);
        } catch(e) { 
            console.log("Reiniciando banco de dados...");
        }
        renderTudo();
        // Mata o splash após 2 segundos
        setTimeout(() => {
            const s = document.getElementById('splash');
            if(s) s.style.display = 'none';
        }, 2000);
    }

    function salvar() { localStorage.setItem(DB_KEY, JSON.stringify(db)); }

    function mudar(t) {
        document.getElementById('main-wrapper').style.display = 'none';
        document.querySelectorAll('.tela').forEach(x => x.classList.remove('ativa'));
        if(t === 'HOME') document.getElementById('main-wrapper').style.display = 'flex';
        else document.getElementById('sec'+t).classList.add('ativa');
    }

    function voltar() { mudar('HOME'); }
    function setInf(id) { document.getElementById(id).value = "∞"; }

    function addCfg(tipo, id) {
        const v = document.getElementById(id).value.trim().toUpperCase();
        if(v) { db[tipo].push(v); db[tipo].sort(); salvar(); renderTudo(); document.getElementById(id).value=''; }
    }

    function converter(v, u) {
        if(v === "∞") return 999999999;
        let n = parseFloat(String(v).replace(',','.'));
        let p = {"MΩ":1, "GΩ":1000, "TΩ":1000000}[u] || 1;
        return n * p;
    }

    function registrarMegger() {
        const v30 = document.getElementById('m30').value;
        const v60 = document.getElementById('m60').value;
        const v120 = document.getElementById('m120').value;
        const ref = parseFloat(document.getElementById('mRef').value);
        if(!v30 || !v60 || !v120 || isNaN(ref)) return alert("DADOS INCOMPLETOS");

        const n30 = converter(v30, document.getElementById('u30').value);
        const st = n30 >= converter(ref, document.getElementById('mRefUni').value) ? "OK" : "REPR";

        ensaiosAtuais.push({
            id: Date.now(),
            ponto: document.getElementById('mPonto').value,
            tensao: document.getElementById('mTen').value,
            v30: v30 + (v30==="∞"?"":document.getElementById('u30').value),
            v60: v60 + (v60==="∞"?"":document.getElementById('u60').value),
            v120: v120 + (v120==="∞"?"":document.getElementById('u120').value),
            status: st,
            cor: st === "OK" ? "var(--success)" : "var(--danger)"
        });
        renderTabela();
    }

    function renderTabela() {
        document.querySelector('#tabMegResult tbody').innerHTML = ensaiosAtuais.map(e => `
            <tr>
                <td>${e.ponto}</td><td>${e.tensao}</td><td>${e.v30}</td><td>${e.v60}</td><td>${e.v120}</td>
                <td style="color:white; background:${e.cor}">${e.status}</td>
                <td><button class="btn-del-row" onclick="ensaiosAtuais=ensaiosAtuais.filter(x=>x.id!=${e.id});renderTabela()">×</button></td>
            </tr>`).join('');
    }

    function salvarHistorico() {
        const tcs = Array.from(document.querySelectorAll('.tec-check:checked')).map(c=>c.value).join(', ');
        if(!tcs || ensaiosAtuais.length === 0) return alert("FALTA TÉCNICO OU MEDIÇÃO");
        db.historico.unshift({
            id: Date.now(),
            tag: document.getElementById('mTag').value || "S/T",
            tecnico: tcs,
            local: document.getElementById('mLoc').value,
            data: new Date().toLocaleDateString('pt-BR'),
            dados: [...ensaiosAtuais]
        });
        salvar(); alert("SALVO!"); novoEnsaio(); renderTudo(); voltar();
    }

    function novoEnsaio() {
        ensaiosAtuais = []; renderTabela();
        document.querySelectorAll('#secMEG input').forEach(i => i.value='');
    }

    async function compartilhar(id) {
        const h = db.historico.find(x => x.id == id);
        let t = `PRO EVOLUTION - LAUDO\nTAG: ${h.tag}\nDATA: ${h.data}\nTÉCNICOS: ${h.tecnico}\n\n`;
        h.dados.forEach(d => t += `${d.ponto} (${d.tensao}):\n30s:${d.v30} | 60s:${d.v60} | 120s:${d.v120}\nST:${d.status}\n---\n`);
        if(navigator.share) await navigator.share({text: t});
    }

    function renderTudo() {
        document.getElementById('mTecContainer').innerHTML = db.tecnicos.map(t => `<div class="multi-item"><input type="checkbox" class="tec-check" value="${t}"> ${t}</div>`).join('');
        document.getElementById('mLoc').innerHTML = db.locais.map(l => `<option>${l}</option>`).join('');
        document.getElementById('lTec').innerHTML = db.tecnicos.map((t,i) => `<button onclick="db.tecnicos.splice(${i},1);salvar();renderTudo()">${t} ×</button>`).join('');
        document.getElementById('lLoc').innerHTML = db.locais.map((l,i) => `<button onclick="db.locais.splice(${i},1);salvar();renderTudo()">${l} ×</button>`).join('');
        document.getElementById('listaHist').innerHTML = db.historico.map(h => `
            <div class="hist-item">
                <b>${h.tag}</b> - ${h.data}<br><small>${h.tecnico}</small>
                <div class="hist-btns">
                    <button class="btn-mini" style="background:var(--success)" onclick="compartilhar(${h.id})">PDF</button>
                    <button class="btn-mini" style="background:var(--danger)" onclick="db.historico=db.historico.filter(x=>x.id!=${h.id});salvar();renderTudo()">×</button>
                </div>
            </div>`).join('');
    }

    window.onload = inicializar;
</script>
</body>
</html>
