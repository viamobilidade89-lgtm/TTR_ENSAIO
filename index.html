<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ENSAIOS PRO EVOLUTION</title>
    <style>
        :root { --p: #facc15; --bg: #ffffff; --dark: #0f172a; --accent: #0284c7; --danger: #ef4444; --success: #16a34a; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); margin: 0; padding: 0; color: var(--dark); display: flex; flex-direction: column; min-height: 100vh; overflow-x: hidden; }
        
        input, select, textarea { text-transform: uppercase; }

        /* Splash Screen */
        #splash { position: fixed; top:0; left:0; width:100%; height:100%; background: var(--dark); display:flex; flex-direction:column; align-items:center; justify-content:center; z-index:9999; transition: 0.6s; }
        .logo-box { position: relative; display: flex; align-items: center; justify-content: center; margin-bottom: 20px; }
        .logo-circle { width: 140px; height: 140px; border: 5px solid var(--p); border-radius: 50%; position: absolute; animation: pulse 2s infinite; }
        .bolt-logo { width: 70px; height: 90px; background: var(--p); clip-path: polygon(45% 0%, 100% 0%, 55% 45%, 100% 45%, 15% 100%, 45% 55%, 0% 55%); z-index: 2; }
        .empresa-nome { color: white; font-weight: 900; font-size: 28px; letter-spacing: 3px; text-align: center; }
        @keyframes pulse { 0% { transform: scale(1); opacity: 1; } 100% { transform: scale(1.4); opacity: 0; } }

        /* Header Harmonioso - Título centralizado e Menu isolado */
        header { 
            display: grid; 
            grid-template-columns: 50px 1fr 50px; 
            align-items: center; 
            padding: 25px 15px; 
            background: white; 
            border-bottom: 1px solid #f1f5f9; 
        }
        .header-title { 
            grid-column: 2; 
            font-size: 22px; 
            font-weight: 900; 
            color: var(--accent); 
            margin: 0; 
            text-align: center; 
            letter-spacing: 1px;
            white-space: nowrap;
        }
        .config-icon { 
            grid-column: 3; 
            font-size: 24px; 
            cursor: pointer; 
            background: none; 
            border: none; 
            color: #cbd5e1; 
            justify-self: end;
        }

        /* Menu Monolito Centralizado e Impactante */
        #main-wrapper { flex: 1; display: flex; align-items: center; justify-content: center; padding: 20px; }
        .monolito-menu { 
            display: flex; 
            flex-direction: column; 
            width: 95%; 
            max-width: 400px; 
            background: linear-gradient(145deg, #0284c7, #0271ab); 
            border-radius: 40px; 
            overflow: hidden; 
            box-shadow: 0 25px 50px rgba(2, 132, 199, 0.35); 
        }
        .btn-monolito { 
            background: transparent; 
            color: white; 
            border: none; 
            padding: 45px 25px; 
            cursor: pointer; 
            display: flex; 
            align-items: center; 
            gap: 25px; 
            position: relative; 
        }
        .btn-monolito:active { background: rgba(255, 255, 255, 0.1); }
        .btn-monolito:not(:last-child)::after { content: ""; position: absolute; bottom: 0; left: 10%; width: 80%; height: 1px; background: rgba(255,255,255,0.1); }

        .icon-box { width: 50px; height: 50px; display: flex; align-items: center; justify-content: center; font-size: 40px; }
        .btn-text { display: flex; flex-direction: column; text-align: left; }
        .btn-label { font-size: 22px; font-weight: 900; letter-spacing: 1px; }
        .btn-desc { font-size: 12px; font-weight: 400; color: rgba(255,255,255,0.8); margin-top: 4px; }

        /* Ícone Pager Customizado */
        .pager-ui { width: 38px; height: 28px; background: #f84c4c; border-radius: 6px; position: relative; border: 2px solid white; }
        .pager-screen { position: absolute; top: 4px; left: 4px; right: 4px; height: 10px; background: #86efac; border-radius: 2px; }

        /* Cards e Botões */
        .card { background: #f8fafc; padding: 25px; border-radius: 30px; border: 1px solid #e2e8f0; max-width: 500px; margin: auto; }
        .btn-acao { width: 100%; padding: 18px; border-radius: 15px; border: none; font-weight: bold; font-size: 16px; cursor: pointer; color: white; }
        
        /* Histórico */
        .hist-item { background: white; border: 1px solid #e2e8f0; padding: 18px; border-radius: 20px; margin-bottom: 15px; border-left: 6px solid var(--accent); }
        .hist-btns { display: flex; gap: 8px; margin-top: 12px; }
        .btn-mini { flex: 1; padding: 12px; border: none; border-radius: 10px; color: white; font-weight: bold; font-size: 11px; cursor: pointer; }

        /* Telas */
        .tela { display: none; padding: 20px; flex: 1; animation: fadeIn 0.4s ease-out; }
        .ativa { display: block !important; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        footer { text-align: center; padding: 30px; font-size: 11px; color: #cbd5e1; letter-spacing: 2px; }
    </style>
</head>
<body>

<div id="splash">
    <div class="logo-box">
        <div class="logo-circle"></div>
        <div class="bolt-logo"></div>
    </div>
    <div class="empresa-nome">PRO EVOLUTION</div>
</div>

<header>
    <div></div> <h1 class="header-title">ENSAIOS PRO EVOLUTION</h1>
    <button class="config-icon" onclick="mudar('CONFIG')">⚙️</button>
</header>

<div id="main-wrapper">
    <div id="menuHome" class="monolito-menu">
        <button class="btn-monolito" onclick="mudar('MEG')">
            <div class="icon-box">⚡</div>
            <div class="btn-text">
                <span class="btn-label">MEGGER</span>
                <span class="btn-desc">Resistência de isolação</span>
            </div>
        </button>

        <button class="btn-monolito" onclick="mudar('TTR')">
            <div class="icon-box">📟</div>
            <div class="btn-text">
                <span class="btn-label">TTR</span>
                <span class="btn-desc">Relação de transformação</span>
            </div>
        </button>

        <button class="btn-monolito" onclick="mudar('MICRO')">
            <div class="icon-box"><div class="pager-ui"><div class="pager-screen"></div></div></div>
            <div class="btn-text">
                <span class="btn-label">MICRO</span>
                <span class="btn-desc">Resistência de contato</span>
            </div>
        </button>
    </div>
</div>

<div id="secMEG" class="tela">
    <div class="card">
        <button class="btn-acao" style="background:var(--dark); margin-bottom:15px" onclick="novoEnsaio()">+ NOVO ENSAIO</button>
        <h3 style="text-align:center; color:var(--accent); margin-top:0">MEGGER</h3>
        <input type="hidden" id="editId">
        <select id="mPonto"><option>PRI X SEC</option><option>PRI X CARC</option><option>SEC X CARC</option></select>
        <div style="display:flex; gap:8px"><input type="number" id="mVal" placeholder="VALOR"><select id="mUnit" style="width:80px"><option>GΩ</option><option>MΩ</option></select></div>
        <button class="btn-acao" style="background:var(--accent); margin-top:10px" onclick="addMedicao()">ADICIONAR</button>
    </div>
    <div class="card" style="margin-top:20px; padding:10px">
        <table id="tabMeg" style="width:100%; border-collapse: collapse; text-align:center">
            <thead><tr style="border-bottom:2px solid #eee"><th style="padding:10px">PONTO</th><th>VALOR</th></tr></thead>
            <tbody></tbody>
        </table>
    </div>
    <button class="btn-acao" style="background:var(--success); margin-top:20px" onclick="arquivar()">💾 SALVAR NO HISTÓRICO</button>
    <button class="btn-acao" style="background:#64748b; margin-top:10px" onclick="voltar()">VOLTAR</button>
</div>

<div id="secCONFIG" class="tela">
    <div class="card">
        <h3 style="color:var(--accent); border-bottom: 2px solid #eee; padding-bottom: 10px; margin:0">📁 HISTÓRICO</h3>
        <div id="listaHist" style="margin-top:15px"></div>

        <h3 style="color:var(--accent); margin-top:30px;">👥 TÉCNICOS</h3>
        <div style="display:flex; gap:8px;">
            <input type="text" id="cfgT" placeholder="NOME" style="margin:0">
            <button onclick="salvarCfg('tecnicos','cfgT')" style="background:var(--accent); border:none; color:white; width:55px; border-radius:12px; font-size:20px">+</button>
        </div>
        <div id="listT" style="margin:15px 0"></div>

        <h3 style="color:var(--accent); margin-top:20px;">📍 LOCAIS</h3>
        <div style="display:flex; gap:8px;">
            <input type="text" id="cfgL" placeholder="LOCAL" style="margin:0">
            <button onclick="salvarCfg('locais','cfgL')" style="background:var(--accent); border:none; color:white; width:55px; border-radius:12px; font-size:20px">+</button>
        </div>
        <div id="listL" style="margin:15px 0"></div>

        <button class="btn-acao" style="background:#64748b; margin-top:25px" onclick="voltar()">FECHAR</button>
    </div>
</div>

<footer>PRODUCED BY UNKNOWN</footer>

<script>
    let db = JSON.parse(localStorage.getItem('pro_evo_v11')) || { tecnicos: [], locais: [], historico: [] };
    let tempMedicoes = [];

    window.onload = () => { 
        setTimeout(() => { document.getElementById('splash').style.display='none'; }, 3000); 
        render(); 
    };

    function mudar(t) {
        document.getElementById('main-wrapper').style.display = 'none';
        document.querySelectorAll('.tela').forEach(x => x.classList.remove('ativa'));
        if(t === 'HOME') document.getElementById('main-wrapper').style.display = 'flex';
        else document.getElementById('sec'+t).classList.add('ativa');
    }

    function voltar() { mudar('HOME'); }

    function novoEnsaio() {
        if(confirm("LIMPAR TELA PARA NOVO ENSAIO?")) {
            tempMedicoes = []; document.getElementById('editId').value = ''; renderTabela();
        }
    }

    function addMedicao() {
        const p = document.getElementById('mPonto').value, v = document.getElementById('mVal').value, u = document.getElementById('mUnit').value;
        if(!v) return;
        tempMedicoes.push({p, v: v+u});
        renderTabela(); document.getElementById('mVal').value = '';
    }

    function renderTabela() {
        document.querySelector('#tabMeg tbody').innerHTML = tempMedicoes.map(m => 
            `<tr style="border-bottom:1px solid #eee"><td style="padding:12px">${m.p}</td><td><b>${m.v}</b></td></tr>`).join('');
    }

    function arquivar() {
        if(tempMedicoes.length === 0) return alert("VAZIO");
        const id = document.getElementById('editId').value || Date.now();
        const registro = { id, data: new Date().toLocaleDateString('pt-BR'), tipo: 'MEGGER', dados: [...tempMedicoes] };
        const idx = db.historico.findIndex(h => h.id == id);
        if(idx > -1) db.historico[idx] = registro; else db.historico.unshift(registro);
        localStorage.setItem('pro_evo_v11', JSON.stringify(db));
        alert("SALVO!"); tempMedicoes = []; renderTabela(); render(); voltar();
    }

    async function compartilharPDF(id) {
        const h = db.historico.find(x => x.id == id);
        let txt = `LAUDO PRO EVOLUTION\nDATA: ${h.data}\nENSAIO: ${h.tipo}\n\n`;
        h.dados.forEach(d => txt += `${d.p}: ${d.v}\n`);
        if(navigator.share) await navigator.share({ title: 'Laudo', text: txt });
    }

    function carregarEnsaio(id) {
        const h = db.historico.find(x => x.id == id);
        tempMedicoes = [...h.dados]; document.getElementById('editId').value = h.id;
        renderTabela(); mudar('MEG');
    }

    function deletar(id) {
        if(confirm("TEM CERTEZA QUE DESEJA EXCLUIR?")) {
            db.historico = db.historico.filter(x => x.id != id);
            localStorage.setItem('pro_evo_v11', JSON.stringify(db)); render();
        }
    }

    function salvarCfg(tipo, id) {
        const v = document.getElementById(id).value.toUpperCase();
        if(v) { db[tipo].push(v); localStorage.setItem('pro_evo_v11', JSON.stringify(db)); render(); document.getElementById(id).value=''; }
    }

    function render() {
        document.getElementById('listT').innerHTML = db.tecnicos.map((t,i) => 
            `<span style="background:#e2e8f0; padding:8px; border-radius:10px; margin:4px; display:inline-block">${t} <b onclick="db.tecnicos.splice(${i},1);localStorage.setItem('pro_evo_v11',JSON.stringify(db));render();" style="color:red">×</b></span>`).join('');
        document.getElementById('listL').innerHTML = db.locais.map((l,i) => 
            `<span style="background:#e2e8f0; padding:8px; border-radius:10px; margin:4px; display:inline-block">${l} <b onclick="db.locais.splice(${i},1);localStorage.setItem('pro_evo_v11',JSON.stringify(db));render();" style="color:red">×</b></span>`).join('');
        document.getElementById('listaHist').innerHTML = db.historico.map(h => `
            <div class="hist-item">
                <b>${h.data} - ${h.tipo}</b>
                <div class="hist-btns">
                    <button class="btn-mini" style="background:var(--accent)" onclick="carregarEnsaio(${h.id})">CONTINUAR</button>
                    <button class="btn-mini" style="background:var(--success)" onclick="compartilharPDF(${h.id})">PDF</button>
                    <button class="btn-mini" style="background:var(--danger)" onclick="deletar(${h.id})">EXCLUIR</button>
                </div>
            </div>`).join('') || "VAZIO";
    }
</script>
</body>
</html>
