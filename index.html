<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ENSAIO PRO EVOLUTION v30.7</title>
    <style>
        :root { --p: #0284c7; --bg: #ffffff; --t: #000; --re: #dc2626; --ap: #16a34a; }
        body { font-family: sans-serif; background: var(--bg); color: var(--t); margin: 0; padding: 5px; }
        .main-title { text-align: center; color: var(--p); font-weight: 900; font-size: 18px; margin: 10px 0; text-transform: uppercase; }
        header { display: flex; justify-content: space-between; align-items: center; padding: 5px 10px; background: #f1f5f9; border-radius: 8px; border: 1px solid #cbd5e1; margin-bottom: 5px; }
        .tela { display: none; padding: 10px; border: 1px solid #94a3b8; border-radius: 8px; margin-top: 5px; background: #fff; }
        .ativa { display: block !important; }
        .grid-menu { display: grid; grid-template-columns: 1fr; gap: 12px; padding: 10px; }
        .btn-menu { background: var(--p); color: white; border: none; padding: 25px; border-radius: 12px; font-size: 16px; font-weight: bold; display: flex; flex-direction: column; align-items: center; gap: 10px; cursor: pointer; }
        .btn-menu span { font-size: 30px; }
        label { display: block; font-size: 10px; font-weight: bold; color: var(--p); margin: 8px 0 2px; text-transform: uppercase; }
        input, select { width: 100%; padding: 8px; border: 1px solid #64748b; border-radius: 6px; font-size: 14px; box-sizing: border-box; }
        .row-ensaio { display: grid; grid-template-columns: 1fr 60px 40px; gap: 5px; align-items: end; margin-bottom: 5px; }
        .btn-inf { background: #475569; color: white; border: none; border-radius: 6px; height: 35px; font-weight: bold; width: 40px; }
        .btn-add { width: 100%; padding: 12px; background: #0284c7; color: white; border: none; border-radius: 8px; font-weight: bold; margin-top: 10px; cursor: pointer; }
        .btn-new { width: 100%; padding: 15px; background: #f59e0b; color: white; border: none; border-radius: 8px; font-weight: bold; margin-top: 20px; cursor: pointer; }
        table { width: 100%; border-collapse: collapse; margin-top: 10px; font-size: 10px; }
        th, td { border: 1px solid #000; padding: 5px; text-align: center; }
        th { background: #f1f5f9; }
        .status-repro { background: var(--re) !important; color: white !important; font-weight: bold; }
        .status-aprov { background: var(--ap) !important; color: white !important; font-weight: bold; }
        .item-chip { background: #f1f5f9; padding: 5px 10px; border-radius: 15px; font-size: 11px; display: flex; align-items: center; gap: 8px; border: 1px solid #cbd5e1; }
        .del-chip { color: var(--re); font-weight: bold; cursor: pointer; }
        @media print {
            .no-print, .btn-inf, .btn-add, .btn-menu, .btn-new, header, .config-area { display: none !important; }
            .tela { display: none; border: none !important; padding: 0; margin: 0; }
            .tem-dados { display: block !important; }
            #blocoDados { display: block !important; border-bottom: 2px solid #000; margin-bottom: 15px; }
        }
    </style>
</head>
<body>

<div class="main-title">ENSAIO PRO EVOLUTION</div>

<header class="no-print">
    <button onclick="voltar()" id="btnVoltar" style="display:none; background:#64748b; color:white; border:none; padding:8px 12px; border-radius:5px;">← VOLTAR</button>
    <b>v30.7 FINAL</b>
    <button onclick="mudar('CONFIG')" style="background:#fff; border:1px solid #94a3b8; padding:8px; border-radius:6px;">⚙️</button>
</header>

<div id="menuHome" class="grid-menu no-print ativa">
    <div class="btn-menu" onclick="mudar('MEG')"><span>⚡</span> MEGGER</div>
    <div class="btn-menu" onclick="mudar('TTR')"><span>📟</span> TTR</div>
    <div class="btn-menu" onclick="mudar('MICRO')"><span>📏</span> MICRO</div>
    <button class="btn-new" onclick="novoEnsaio()">+ NOVO ENSAIO (LIMPAR)</button>
</div>

<div id="blocoDados" class="tela">
    <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 10px;">
        <div><label>TAG EQUIPAMENTO</label><input type="text" id="tag" oninput="autoSave()"></div>
        <div><label>LOCAL / SE</label><select id="listaLocais" onchange="autoSave()"></select></div>
    </div>
    <label>EQUIPE TÉCNICA SELECIONADA</label>
    <div id="tecsSelecionados" style="display:flex; flex-wrap:wrap; gap:5px; margin-top:5px;"></div>
</div>

<div id="secMEG" class="tela">
    <div class="no-print">
        <label>CONEXÃO / TENSÃO</label>
        <div class="row-ensaio" style="grid-template-columns: 1fr 80px;">
            <select id="mPonto"><option>ENTRADA x SAÍDA</option><option>ENTRADA x CARCAÇA</option><option>SAÍDA x CARCAÇA</option><option>CAMIS</option></select>
            <select id="mTensao"><option>500V</option><option>1kV</option><option>2.5kV</option><option>5kV</option></select>
        </div>
        <label>REF. MÍNIMA</label>
        <div class="row-ensaio" style="grid-template-columns: 1fr 80px;"><input type="text" id="mRef" inputmode="decimal"><select id="uRef"><option>MΩ</option><option>GΩ</option><option>TΩ</option></select></div>
        <label>LEITURAS (30s | 60s | 120s)</label>
        <div class="row-ensaio"><input type="text" id="r30" inputmode="decimal" placeholder="30s"><select id="u30"><option>MΩ</option><option>GΩ</option><option>TΩ</option></select><button class="btn-inf" onclick="setInf('r30')">∞</button></div>
        <div class="row-ensaio"><input type="text" id="r60" inputmode="decimal" placeholder="60s"><select id="u60"><option>MΩ</option><option>GΩ</option><option>TΩ</option></select><button class="btn-inf" onclick="setInf('r60')">∞</button></div>
        <div class="row-ensaio"><input type="text" id="r120" inputmode="decimal" placeholder="120s"><select id="u120"><option>MΩ</option><option>GΩ</option><option>TΩ</option></select><button class="btn-inf" onclick="setInf('r120')">∞</button></div>
        <button class="btn-add" onclick="addMegger()">⚡ ADICIONAR AO LAUDO</button>
    </div>
    <h3 class="tem-dados">⚡ ENSAIO DE ISOLAMENTO (MEGGER)</h3>
    <table id="tabMeg"><thead><tr><th>Ponto</th><th>V</th><th>30s</th><th>60s</th><th>120s</th><th>Status</th><th class="no-print">X</th></tr></thead><tbody></tbody></table>
</div>

<div id="secTTR" class="tela">
    <div class="no-print">
        <div style="display:grid; grid-template-columns: 1fr 1fr; gap:10px;">
            <div><label>U1 (ENTRADA)</label><input type="number" id="u1" oninput="calcTTRTeorico()"></div>
            <div><label>U2 (SAÍDA)</label><input type="number" id="u2" oninput="calcTTRTeorico()"></div>
        </div>
        <label>GRUPO / NEUTRO</label>
        <div style="display:grid; grid-template-columns: 1fr 1fr; gap:5px;">
            <select id="ttrFas" onchange="calcTTRTeorico()">
                <option value="Ydn1_11">Ydn1 / Ydn11</option><option value="Yd1">Yd1</option><option value="Yd11">Yd11</option>
                <option value="Dyn1_11">Dyn1/11</option><option value="Dy1">Dy1</option><option value="Dy11">Dy11</option>
                <option value="Yyn0">Yyn0</option><option value="Yy0_Dd0">Yy0/Dd0</option>
            </select>
            <select id="ttrNeutro" onchange="calcTTRTeorico()"><option value="X0">C/ X0 Aparente</option><option value="H0">C/ H0 Aparente</option></select>
        </div>
        <div style="background:#f1f5f9; padding:8px; border-radius:8px; margin-top:10px; text-align:center;">
            <label style="margin:0;">TEÓRICO: <span id="ttrTeoExib" style="font-size:16px; color:var(--p);">0.0000</span></label>
        </div>
        <div style="display:grid; grid-template-columns:1fr 1fr 1fr; gap:5px; margin-top:10px;"><input type="text" id="ttrA" placeholder="A"><input type="text" id="ttrB" placeholder="B"><input type="text" id="ttrC" placeholder="C"></div>
        <button class="btn-add" onclick="addTTR()">📊 ADICIONAR AO LAUDO TTR</button>
    </div>
    <h3 class="tem-dados">📊 RELAÇÃO DE TRANSFORMAÇÃO (TTR)</h3>
    <table id="tabTTR"><thead><tr><th>Grupo</th><th>Teórico</th><th>A</th><th>B</th><th>C</th><th>Desvio%</th><th class="no-print">X</th></tr></thead><tbody></tbody></table>
</div>

<div id="secMICRO" class="tela">
    <div class="no-print">
        <label>PONTO E TEMP (°C)</label>
        <div style="display:grid; grid-template-columns: 1fr 80px; gap:5px;"><input type="text" id="micP" placeholder="H1-H2"><input type="number" id="micTemp" value="25"></div>
        <label>VALOR LIDO (mΩ)</label><input type="text" id="micV" inputmode="decimal">
        <button class="btn-add" onclick="addMicro()">📏 ADICIONAR AO LAUDO MICRO</button>
    </div>
    <h3 class="tem-dados">📏 RESISTÊNCIA ÔHMICA (MICRO)</h3>
    <table id="tabMicro"><thead><tr><th>Ponto</th><th>Lido</th><th>@20°C</th><th>Status</th><th class="no-print">X</th></tr></thead><tbody></tbody></table>
</div>

<div id="secCONFIG" class="tela config-area">
    <button onclick="voltar()" class="btn-add" style="background:#555;">← VOLTAR</button>
    
    <label>TÉCNICOS CADASTRADOS (Clique no X para excluir)</label>
    <div id="cfgListaTecnicos" style="display:flex; flex-wrap:wrap; gap:8px; margin-bottom:15px;"></div>
    <div style="display:flex; gap:5px;"><input type="text" id="cfgT" placeholder="Nome do Técnico"><button onclick="salvarCfg('tecnicos','cfgT')" style="background:var(--ap); color:white; border:none; padding:10px; border-radius:5px;">ADD</button></div>
    
    <label style="margin-top:15px;">LOCAIS CADASTRADOS (Clique no X para excluir)</label>
    <div id="cfgListaLocais" style="display:flex; flex-wrap:wrap; gap:8px; margin-bottom:15px;"></div>
    <div style="display:flex; gap:5px;"><input type="text" id="cfgL" placeholder="Nome do Local"><button onclick="salvarCfg('locais','cfgL')" style="background:var(--ap); color:white; border:none; padding:10px; border-radius:5px;">ADD</button></div>

    <hr style="margin:20px 0;">
    <label>LIMPAR SESSÃO ATUAL</label>
    <button onclick="novoEnsaio()" style="background:var(--re); color:white; border:none; padding:12px; border-radius:8px; width:100%; font-weight:bold;">APAGAR MEDIÇÕES ATUAIS</button>
</div>

<button onclick="window.print()" id="btnPDFGlobal" style="display:none; width:100%; background:#000; color:#fff; border:none; padding:15px; font-weight:bold; margin-top:10px;" class="no-print">🖨️ GERAR RELATÓRIO PDF</button>

<script>
    let db = JSON.parse(localStorage.getItem('alpha_v30_db')) || { tecnicos: [], locais: [] };
    let session = JSON.parse(localStorage.getItem('alpha_v30_session')) || { tag: '', local: '', tecs: [], meg: [], ttr: [], mic: [] };

    function mudar(t) {
        document.getElementById('menuHome').classList.remove('ativa');
        document.querySelectorAll('.tela').forEach(x => x.classList.remove('ativa'));
        document.getElementById('sec'+t).classList.add('ativa');
        document.getElementById('blocoDados').classList.add('ativa');
        document.getElementById('btnVoltar').style.display = 'block';
        document.getElementById('btnPDFGlobal').style.display = 'block';
        render();
    }

    function voltar() { 
        document.querySelectorAll('.tela').forEach(x => x.classList.remove('ativa')); 
        document.getElementById('menuHome').classList.add('ativa'); 
        document.getElementById('btnVoltar').style.display = 'none';
        document.getElementById('btnPDFGlobal').style.display = 'none';
    }

    function novoEnsaio() { if(confirm("Deseja apagar as medições desta tela?")) { session = { tag: '', local: '', tecs: [], meg: [], ttr: [], mic: [] }; autoSave(); location.reload(); } }
    function setInf(id) { document.getElementById(id).value = '∞'; }

    function autoSave() {
        session.tag = document.getElementById('tag').value;
        session.local = document.getElementById('listaLocais').value;
        localStorage.setItem('alpha_v30_session', JSON.stringify(session));
    }

    function salvarCfg(tipo, id) {
        const v = document.getElementById(id).value;
        if(v) { 
            db[tipo].push(v); 
            localStorage.setItem('alpha_v30_db', JSON.stringify(db)); 
            document.getElementById(id).value=''; 
            render(); 
        }
    }

    function excluirCfg(tipo, index) {
        db[tipo].splice(index, 1);
        localStorage.setItem('alpha_v30_db', JSON.stringify(db));
        render();
    }

    function addTec(t) { 
        if(!session.tecs.includes(t)) {
            session.tecs.push(t); 
            autoSave(); 
            render(); 
        }
    }

    function removerTecSessao(index) {
        session.tecs.splice(index, 1);
        autoSave();
        render();
    }

    function render() {
        // Dropdown de Locais
        document.getElementById('listaLocais').innerHTML = '<option value="">Selecione...</option>' + db.locais.map(l => `<option ${session.local===l?'selected':''}>${l}</option>`).join('');
        
        // Chips de Técnicos Selecionados no Laudo
        document.getElementById('tecsSelecionados').innerHTML = session.tecs.map((t, i) => `
            <div class="item-chip">${t} <span class="del-chip" onclick="removerTecSessao(${i})">x</span></div>
        `).join('');

        // Listas na Configuração
        document.getElementById('cfgListaTecnicos').innerHTML = db.tecnicos.map((t, i) => `
            <div class="item-chip" onclick="addTec('${t}')" style="cursor:pointer;">+ ${t} <span class="del-chip" onclick="event.stopPropagation(); excluirCfg('tecnicos', ${i})">X</span></div>
        `).join('');

        document.getElementById('cfgListaLocais').innerHTML = db.locais.map((l, i) => `
            <div class="item-chip">${l} <span class="del-chip" onclick="excluirCfg('locais', ${i})">X</span></div>
        `).join('');

        document.getElementById('tag').value = session.tag;
        document.querySelector('#tabMeg tbody').innerHTML = session.meg.join('');
        document.querySelector('#tabTTR tbody').innerHTML = session.ttr.join('');
        document.querySelector('#tabMicro tbody').innerHTML = session.mic.join('');
        
        if(session.meg.length > 0) document.getElementById('secMEG').classList.add('tem-dados');
        if(session.ttr.length > 0) document.getElementById('secTTR').classList.add('tem-dados');
        if(session.mic.length > 0) document.getElementById('secMICRO').classList.add('tem-dados');
    }

    // LÓGICA MEGGER
    function convM(v, u) {
        if(v === '∞') return 999999999999;
        let n = parseFloat(v.toString().replace(',', '.'));
        if(isNaN(n)) return null; 
        return (u === 'GΩ') ? n * 1000 : (u === 'TΩ') ? n * 1000000 : n;
    }

    function addMegger() {
        const ref = convM(document.getElementById('mRef').value, document.getElementById('uRef').value);
        const v30 = convM(document.getElementById('r30').value, document.getElementById('u30').value);
        let repro = (v30 !== null && v30 < ref);
        const row = `<tr class="${repro ? 'status-repro' : 'status-aprov'}">
            <td>${document.getElementById('mPonto').value}</td><td>${document.getElementById('mTensao').value}</td>
            <td>${document.getElementById('r30').value}${document.getElementById('r30').value==='∞'?'':document.getElementById('u30').value}</td>
            <td>${document.getElementById('r60').value}${document.getElementById('r60').value==='∞'?'':document.getElementById('u60').value}</td>
            <td>${document.getElementById('r120').value}${document.getElementById('r120').value==='∞'?'':document.getElementById('u120').value}</td>
            <td>${repro ? 'REPROVADO' : 'APROVADO'}</td>
            <td class="no-print"><button onclick="remover(this,'meg')">❌</button></td></tr>`;
        session.meg.push(row); autoSave(); render();
    }

    // LÓGICA TTR
    function calcTTRTeorico() {
        const u1 = parseFloat(document.getElementById('u1').value) || 0;
        const u2 = parseFloat(document.getElementById('u2').value) || 0;
        const fas = document.getElementById('ttrFas').value;
        const n = document.getElementById('ttrNeutro').value;
        let r = 0;
        if(u1 && u2) {
            if(fas.includes("Ydn") || fas.includes("Dyn")) r = (n === "X0") ? (u1 * 1.73205 / u2) : (u1 / (1.73205 * u2));
            else if(fas.includes("Yd")) r = (0.866025 * u1) / u2;
            else if(fas.includes("Dy")) r = u1 / (0.866025 * u2);
            else r = u1 / u2;
        }
        document.getElementById('ttrTeoExib').innerText = r.toFixed(4);
    }

    function addTTR() {
        const teo = parseFloat(document.getElementById('ttrTeoExib').innerText);
        const a = parseFloat(document.getElementById('ttrA').value.replace(',','.'));
        const b = parseFloat(document.getElementById('ttrB').value.replace(',','.'));
        const c = parseFloat(document.getElementById('ttrC').value.replace(',','.'));
        const err = Math.max(Math.abs((a-teo)/teo), Math.abs((b-teo)/teo), Math.abs((c-teo)/teo)) * 100;
        let repro = err > 0.5;
        const row = `<tr class="${repro?'status-repro':'status-aprov'}"><td>${document.getElementById('ttrFas').options[document.getElementById('ttrFas').selectedIndex].text}</td><td>${teo.toFixed(4)}</td><td>${a}</td><td>${b}</td><td>${c}</td><td>${err.toFixed(3)}% ${repro?'<br>Desvio > 0.5%':''}</td><td class="no-print"><button onclick="remover(this,'ttr')">❌</button></td></tr>`;
        session.ttr.push(row); autoSave(); render();
    }

    // LÓGICA MICRO
    function addMicro() {
        const v = parseFloat(document.getElementById('micV').value.replace(',','.'));
        const t = parseFloat(document.getElementById('micTemp').value);
        const v20 = (v * (234.5 + 20)) / (234.5 + t);
        const row = `<tr class="status-aprov"><td>${document.getElementById('micP').value}</td><td>${v}</td><td>${v20.toFixed(4)}</td><td>OK</td><td class="no-print"><button onclick="remover(this,'mic')">❌</button></td></tr>`;
        session.mic.push(row); autoSave(); render();
    }

    function remover(btn, lista) { 
        const tr = btn.closest('tr'); 
        const index = Array.from(tr.parentNode.children).indexOf(tr);
        session[lista].splice(index, 1); 
        autoSave(); 
        render(); 
    }

    window.onload = render;
</script>
</body>
</html>
