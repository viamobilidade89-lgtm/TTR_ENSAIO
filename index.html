<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ENSAIOS ALPHA - GESTÃO DE ATIVOS</title>
    <style>
        :root { 
            --bg: #0b0f1a; --card: #161e2e; --primary: #38bdf8; --success: #10b981; 
            --error: #f43f5e; --text: #e2e8f0; --border: #2d3748; 
        }
        body { font-family: 'Segoe UI', Roboto, Helvetica, sans-serif; background: var(--bg); color: var(--text); margin: 0; line-height: 1.6; }
        .container { max-width: 1000px; margin: 0 auto; padding: 30px; }
        
        /* Cabeçalho Profissional */
        header { border-bottom: 4px solid var(--primary); padding-bottom: 20px; margin-bottom: 40px; display: flex; justify-content: space-between; align-items: flex-end; }
        .logo-area h1 { font-size: 2.5rem; font-weight: 900; margin: 0; color: var(--primary); letter-spacing: -1px; }
        .logo-area p { margin: 0; opacity: 0.7; font-size: 0.9rem; text-transform: uppercase; }

        .btn-tool { background: var(--border); border: none; color: white; padding: 10px 20px; border-radius: 6px; cursor: pointer; font-weight: bold; transition: 0.3s; }
        .btn-tool:hover { background: var(--primary); color: #000; }

        /* Dashboard e Seções */
        .dashboard { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 20px; margin-bottom: 40px; }
        .card-link { background: var(--card); padding: 30px; border-radius: 15px; border: 1px solid var(--border); text-align: center; cursor: pointer; transition: 0.3s; }
        .card-link:hover { transform: translateY(-5px); border-color: var(--primary); box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        .card-link i { font-size: 2.5rem; display: block; margin-bottom: 15px; }

        .glass-box { background: var(--card); border-radius: 12px; padding: 25px; border: 1px solid var(--border); margin-bottom: 30px; }
        .section { display: none; }
        .active { display: block; animation: fadeIn 0.4s ease; }

        /* Formulários e Inputs */
        .form-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(220px, 1fr)); gap: 20px; }
        .input-group { margin-bottom: 15px; }
        label { display: block; font-size: 0.75rem; font-weight: 700; color: var(--primary); text-transform: uppercase; margin-bottom: 8px; }
        input, select, textarea { width: 100%; padding: 12px; background: #05070a; border: 1px solid var(--border); color: white; border-radius: 8px; font-size: 0.95rem; box-sizing: border-box; }
        
        .multi-check { background: #05070a; border: 1px solid var(--border); border-radius: 8px; padding: 15px; max-height: 150px; overflow-y: auto; }
        .multi-check label { color: white; text-transform: none; display: flex; align-items: center; gap: 10px; font-weight: 400; cursor: pointer; }

        /* Tabelas de Ensaio */
        table { width: 100%; border-collapse: collapse; margin-top: 25px; background: rgba(0,0,0,0.3); }
        th, td { padding: 16px; border: 1px solid var(--border); text-align: center; }
        th { background: #0f172a; color: var(--primary); font-size: 0.8rem; }
        .val-inf { display: flex; gap: 8px; }

        .badge { padding: 4px 10px; border-radius: 4px; font-weight: 800; font-size: 0.7rem; }
        .badge-ok { background: rgba(16, 185, 129, 0.2); color: var(--success); border: 1px solid var(--success); }
        .badge-error { background: rgba(244, 63, 94, 0.2); color: var(--error); border: 1px solid var(--error); }

        /* Botões de Ação */
        .action-bar { margin-top: 40px; display: flex; gap: 15px; }
        .btn-main { flex: 1; padding: 20px; border-radius: 10px; border: none; font-weight: 900; cursor: pointer; text-transform: uppercase; font-size: 1rem; }
        .btn-save { background: var(--success); color: #000; }
        .btn-print { background: var(--primary); color: #000; }

        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

        @media print {
            .no-print { display: none !important; }
            .section { display: block !important; }
            body { background: white; color: black; }
            .glass-box { border: 1px solid #000; background: white; color: black; }
            th, td { border: 1px solid #000; color: black; }
            .badge { border: 1px solid #000; color: black; background: transparent; }
            header { border-bottom: 4px solid black; }
        }
    </style>
</head>
<body>

<div class="container">
    <header>
        <div class="logo-area">
            <h1>ENSAIOS ALPHA</h1>
            <p>Relatório Técnico de Comissionamento e Manutenção</p>
        </div>
        <button class="btn-tool no-print" onclick="abrirS('CONFIG')">⚙️ CONFIGURAÇÕES</button>
    </header>

    <div id="secHOME" class="dashboard no-print active">
        <div class="card-link" onclick="abrirS('MEG')"><i>💥</i><span>MEGGER<br>(ISOLAÇÃO)</span></div>
        <div class="card-link" onclick="abrirS('TTR')"><i>⚡</i><span>TTR<br>(RELAÇÃO)</span></div>
        <div class="card-link" onclick="abrirS('MICRO')"><i>📟</i><span>MICROOHMÍMETRO<br>(RESISTÊNCIA)</span></div>
        <div class="card-link" onclick="abrirS('HIST')"><i>📜</i><span>HISTÓRICO DE<br>ENSAIOS</span></div>
    </div>

    <div id="identAtivo" class="glass-box section">
        <label>🔍 Identificação do Equipamento</label>
        <div class="form-grid">
            <div class="input-group"><label>Tag / Patrimônio</label><input type="text" id="tagTrafo" placeholder="Ex: TR-02"></div>
            <div class="input-group"><label>Localidade</label><select id="selLocal"></select></div>
            <div class="input-group"><label>Data do Ensaio</label><input type="date" id="dataEnsaio"></div>
            <div class="input-group"><label>Temp. Ambiente (°C)</label><input type="number" id="tempAmb" value="25"></div>
        </div>
        <div class="input-group">
            <label>Equipe Técnica Responsável</label>
            <div id="checkEquipe" class="multi-check"></div>
        </div>
    </div>

    <div id="secMEG" class="section">
        <div class="glass-box">
            <label style="font-size: 1.1rem; color: var(--primary);">Ensaios de Resistência de Isolação</label>
            <div class="form-grid no-print" style="margin-top: 20px;">
                <div class="input-group">
                    <label>Ponto de Teste</label>
                    <select id="megPonto">
                        <option>AT + BT x TERRA</option><option>AT x BT + TERRA</option>
                        <option>BT x AT + TERRA</option><option>AT x BT</option>
                    </select>
                </div>
                <div class="input-group">
                    <label>Tensão (kV)</label>
                    <select id="megV">
                        <option>0.5 kV</option><option>1.0 kV</option><option>2.5 kV</option><option>5.0 kV</option><option>10 kV</option>
                    </select>
                </div>
                <div class="input-group">
                    <label>Escala</label>
                    <select id="megU"><option>GΩ</option><option>MΩ</option><option>TΩ</option></select>
                </div>
            </div>
            
            <div class="form-grid no-print">
                <div class="input-group"><label>Leitura 15s (IA)</label><input type="text" id="r15"></div>
                <div class="input-group"><label>Leitura 1min (IP)</label><input type="text" id="r60"></div>
                <div class="input-group"><label>Leitura 10min</label>
                    <div class="val-inf">
                        <input type="text" id="r10" placeholder="Valor">
                        <button class="btn-tool" onclick="document.getElementById('r10').value='∞'">∞</button>
                    </div>
                </div>
            </div>
            <button class="btn-main btn-print no-print" onclick="calcularMegger()">REGISTRAR E ANALISAR ISOLAÇÃO</button>

            <table>
                <thead>
                    <tr><th>Ponto</th><th>Tensão</th><th>R 60s</th><th>R 10min</th><th>IP</th><th>IA (DAR)</th><th>Status</th></tr>
                </thead>
                <tbody id="tabMegger"></tbody>
            </table>
        </div>
    </div>

    <div id="secCONFIG" class="section no-print">
        <div class="glass-box">
            <label>⚙️ Gerenciamento de Dados Locais</label>
            <div class="form-grid">
                <div class="input-group"><label>Nome do Técnico</label><input type="text" id="addT"><button class="btn-tool" onclick="addDB('tecnicos','addT')">Adicionar</button></div>
                <div class="input-group"><label>Nova Localidade</label><input type="text" id="addL"><button class="btn-tool" onclick="addDB('locais','addL')">Adicionar</button></div>
            </div>
        </div>
        <button class="btn-main btn-ghost" onclick="abrirS('secHOME')">Voltar ao Menu</button>
    </div>

    <div id="botoesFinais" class="action-bar section no-print">
        <button class="btn-main btn-save" onclick="salvarRelatorio()">💾 Salvar no Histórico</button>
        <button class="btn-main btn-print" onclick="window.print()">🖨️ Gerar PDF do Relatório</button>
    </div>
</div>

<script>
    // Banco de Dados Local (Simulado com localStorage)
    let alphaData = JSON.parse(localStorage.getItem('alpha_v15_db')) || { tecnicos: [], locais: [], historico: [] };

    function abrirS(id) {
        document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
        document.getElementById('secHOME').classList.remove('active');
        document.getElementById(id).classList.add('active');
        if(id !== 'CONFIG' && id !== 'HIST') {
            document.getElementById('identAtivo').classList.add('active');
            document.getElementById('botoesFinais').classList.add('active');
        }
        renderConfigs();
    }

    function addDB(tipo, inputId) {
        const val = document.getElementById(inputId).value;
        if(val) {
            alphaData[tipo].push(val);
            localStorage.setItem('alpha_v15_db', JSON.stringify(alphaData));
            document.getElementById(inputId).value = '';
            renderConfigs();
        }
    }

    function renderConfigs() {
        document.getElementById('selLocal').innerHTML = alphaData.locais.map(l => `<option>${l}</option>`).join('');
        document.getElementById('checkEquipe').innerHTML = alphaData.tecnicos.map(t => `<label><input type="checkbox" value="${t}"> ${t}</label>`).join('');
    }

    function calcularMegger() {
        const r15 = parseFloat(document.getElementById('r15').value);
        const r60 = parseFloat(document.getElementById('r60').value);
        const r10val = document.getElementById('r10').value;
        const esc = document.getElementById('megU').value;
        
        let ip = (r10val === '∞') ? 'IMENSURÁVEL' : (parseFloat(r10val) / r60).toFixed(2);
        let ia = (r60 / r15).toFixed(2);
        
        let status = (ip === 'IMENSURÁVEL' || ip > 2.0) ? 'badge-ok' : 'badge-error';
        let statusTxt = (status === 'badge-ok') ? 'APROVADO' : 'REVISAR';

        const tr = `<tr>
            <td>${document.getElementById('megPonto').value}</td>
            <td>${document.getElementById('megV').value}</td>
            <td>${r60} ${esc}</td>
            <td>${r10val} ${esc}</td>
            <td>${ip}</td>
            <td>${ia}</td>
            <td><span class="badge ${status}">${statusTxt}</span></td>
        </tr>`;
        document.getElementById('tabMegger').innerHTML += tr;
    }

    window.onload = () => {
        document.getElementById('dataEnsaio').valueAsDate = new Date();
        renderConfigs();
    };
</script>
</body>
</html>
