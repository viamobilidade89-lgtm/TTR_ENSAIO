<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ENSAIO PRO EVOLUTION v41.0</title>
    <style>
        :root { --p: #0ea5e9; --bg: #0f172a; --t: #f8fafc; --re: #ef4444; --ap: #22c55e; --s: #1e293b; }
        body { font-family: 'Segoe UI', sans-serif; background: #fff; color: #000; margin: 0; padding: 5px; }
        
        /* ANIMAÇÃO SPLASH REFINADA */
        #splash { position: fixed; top:0; left:0; width:100%; height:100%; background: var(--bg); display:flex; flex-direction:column; align-items:center; justify-content:center; z-index:9999; transition: opacity 1s ease; }
        .bolt { width: 60px; height: 60px; background: var(--p); clip-path: polygon(45% 0%, 100% 0%, 55% 45%, 100% 45%, 15% 100%, 45% 55%, 0% 55%); animation: neon 1.5s ease-in-out infinite alternate; }
        @keyframes neon { from { box-shadow: 0 0 10px var(--p); transform: scale(1); } to { box-shadow: 0 0 30px var(--p); transform: scale(1.1); } }
        .logo-txt { color: white; margin-top: 30px; font-weight: 900; letter-spacing: 4px; font-size: 20px; text-transform: uppercase; border-right: 3px solid var(--p); white-space: nowrap; overflow: hidden; animation: typing 2s steps(15), blink .5s step-end infinite alternate; width: 15ch; }
        @keyframes typing { from { width: 0 } }
        @keyframes blink { 50% { border-color: transparent } }

        .main-title { text-align: center; color: #0284c7; font-weight: 900; font-size: 20px; margin: 10px 0; text-transform: uppercase; }
        header { display: flex; justify-content: space-between; align-items: center; padding: 10px; background: #f1f5f9; border-radius: 10px; border: 1px solid #cbd5e1; margin-bottom: 8px; }
        .tela { display: none; padding: 12px; border: 1px solid #94a3b8; border-radius: 10px; margin-top: 5px; background: #fff; box-shadow: 0 4px 6px -1px rgb(0 0 0 / 0.1); }
        .ativa { display: block !important; }
        
        .grid-menu { display: grid; grid-template-columns: 1fr; gap: 15px; padding: 10px; }
        .btn-menu { background: #0284c7; color: white; border: none; padding: 30px; border-radius: 15px; font-size: 18px; font-weight: bold; cursor: pointer; transition: 0.3s; box-shadow: 0 10px 15px -3px rgba(2, 132, 199, 0.3); }
        .btn-menu:active { transform: translateY(4px); box-shadow: none; }
        
        label { display: block; font-size: 11px; font-weight: bold; color: #0284c7; margin: 10px 0 4px; text-transform: uppercase; }
        input, select { width: 100%; padding: 12px; border: 1px solid #64748b; border-radius: 8px; font-size: 15px; color: #1e293b; background: #fff; }
        
        /* AJUSTE DO SÍMBOLO OHM */
        .select-u { width: 75px !important; font-weight: bold; background: #f8fafc; }

        .chip-container { display: flex; flex-wrap: wrap; gap: 8px; margin-top: 8px; padding: 10px; background: #f8fafc; border-radius: 10px; border: 2px dashed #e2e8f0; }
        .chip { background: #fff; padding: 8px 16px; border-radius: 25px; font-size: 12px; font-weight: bold; cursor: pointer; border: 1px solid #cbd5e1; transition: 0.2s; }
        .chip.selected { background: #22c55e; color: white; border-color: #16a34a; box-shadow: 0 4px 10px rgba(34, 197, 94, 0.3); }

        .row-ensaio { display: grid; grid-template-columns: 1fr 75px 45px; gap: 8px; align-items: end; margin-bottom: 8px; }
        .btn-add { width: 100%; padding: 18px; background: #0284c7; color: white; border: none; border-radius: 10px; font-weight: bold; margin-top: 15px; font-size: 15px; text-transform: uppercase; letter-spacing: 1px; }
        
        table { width: 100%; border-collapse: collapse; margin-top: 15px; font-size: 11px; }
        th, td { border: 1px solid #334155; padding: 8px; text-align: center; }
        th { background: #f1f5f9; color: #0284c7; }
        .status-repro { background: #fee2e2 !important; color: #b91c1c !important; font-weight: bold; }
        .status-aprov { background: #dcfce7 !important; color: #15803d !important; font-weight: bold; }

        @media print {
            .no-print, #splash { display: none !important; }
            .tela { display: none; border: none !important; }
            .tem-dados { display: block !important; }
            #blocoDados { display: block !important; border-bottom: 2px solid #000; padding: 0; }
        }
    </style>
</head>
<body>

<div id="splash">
    <div class="bolt"></div>
    <div class="logo-txt">Equipe de Energia</div>
</div>

<div class="main-title">ENSAIO PRO EVOLUTION</div>

<header class="no-print">
    <button onclick="voltar()" id="btnVoltar" style="display:none; background:#475569; color:white; border:none; padding:10px 15px; border-radius:8px;">← MENU</button>
    <b style="color:#64748b">V 41.0</b>
    <button onclick="mudar('CONFIG')" style="background:#fff; border:1px solid #cbd5e1; padding:10px; border-radius:8px;">⚙️</button>
</header>

<div id="menuHome" class="grid-menu no-print ativa">
    <div class="btn-menu" onclick="mudar('MEG')">⚡ MEGGER</div>
    <div class="btn-menu" onclick="mudar('TTR')">📟 TTR</div>
    <div class="btn-menu" onclick="mudar('MICRO')">📏 MICRO</div>
    <button onclick="novoEnsaio()" style="margin-top:20px; padding:18px; background:#f59e0b; color:white; border:none; border-radius:12px; font-weight:bold;">+ NOVO ENSAIO (LIMPAR TUDO)</button>
</div>

<div id="blocoDados" class="tela">
    <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 10px;">
        <div><label>TAG DO EQUIPAMENTO</label><input type="text" id="tag" oninput="autoSave()"></div>
        <div><label>LOCAL / SE</label><select id="listaLocais" onchange="autoSave()"></select></div>
    </div>
    <label class="no-print">SELECIONE OS TÉCNICOS NA OBRA:</label>
    <div id="poolTecnicos" class="chip-container no-print"></div>
    <div class="tem-dados" style="margin-top:10px; border-top: 1px solid #e2e8f0; padding-top:10px;">
        <label>EQUIPE RESPONSÁVEL:</label>
        <div id="tecsNoLaudo" style="font-weight:bold; font-size:13px; color:#1e293b;"></div>
    </div>
</div>

<div id="secMEG" class="tela">
    <div class="no-print">
        <label>PONTO DE TESTE / TENSÃO</label>
        <div class="row-ensaio" style="grid-template-columns: 1fr 90px;">
            <select id="mPonto"><option>ENTRADA x SAÍDA</option><option>ENTRADA x CARCAÇA</option><option>SAÍDA x CARCAÇA</option><option>CAMIS</option></select>
            <select id="mTensao"><option>500V</option><option>1000V</option><option>2500V</option><option>5000V</option></select>
        </div>
        <label>LIMITE MÍNIMO (REF)</label>
        <div class="row-ensaio" style="grid-template-columns: 1fr 85px;"><input type="text" id="mRef" inputmode="decimal" placeholder="Ex: 2000"><select id="uRef" class="select-u"><option>MΩ</option><option>GΩ</option><option>TΩ</option></select></div>
        <label>LEITURAS DE ISOLAMENTO</label>
        <div class="row-ensaio"><input type="text" id="r30" inputmode="decimal" placeholder="30s"><select id="u30" class="select-u"><option>MΩ</option><option>GΩ</option><option>TΩ</option></select><button class="btn-menu" style="padding:0; height:45px;" onclick="setInf('r30','u30')">∞</button></div>
        <div class="row-ensaio"><input type="text" id="r60" inputmode="decimal" placeholder="60s"><select id="u60" class="select-u"><option>MΩ</option><option>GΩ</option><option>TΩ</option></select><button class="btn-menu" style="padding:0; height:45px;" onclick="setInf('r60','u60')">∞</button></div>
        <div class="row-ensaio"><input type="text" id="r120" inputmode="decimal" placeholder="120s"><select id="u120" class="select-u"><option>MΩ</option><option>GΩ</option><option>TΩ</option></select><button class="btn-menu" style="padding:0; height:45px;" onclick="setInf('r120','u120')">∞</button></div>
        <button class="btn-add" onclick="addMegger()">⚡ ADICIONAR AO LAUDO</button>
    </div>
    <h3 class="tem-dados">⚡ ENSAIO DE ISOLAMENTO (MEGGER)</h3>
    <table id="tabMeg"><thead><tr><th>Ponto</th><th>V</th><th>30s</th><th>60s</th><th>120s</th><th>Status</th><th class="no-print">X</th></tr></thead><tbody></tbody></table>
</div>

<div id="secTTR" class="tela">
    <div class="no-print">
        <div style="display:grid; grid-template-columns: 1fr 1fr; gap:10px;">
            <div><label>U1 (NOMINAL)</label><input type="number" id="u1" oninput="calcTTR()"></div>
            <div><label>U2 (NOMINAL)</label><input type="number" id="u2" oninput="calcTTR()"></div>
        </div>
        <label>GRUPO FASORIAL / NEUTRO</label>
        <div style="display:grid; grid-template-columns: 1fr 1fr; gap:5px;">
            <select id="ttrFas" onchange="calcTTR()">
                <option value="Ydn1">Ydn1</option><option value="Ydn11">Ydn11</option><option value="Yd1">Yd1</option><option value="Yd11">Yd11</option>
                <option value="Dyn1">Dyn1</option><option value="Dyn11">Dyn11</option><option value="Dy1">Dy1</option><option value="Dy11">Dy11</option>
                <option value="Yyn0">Yyn0</option><option value="Yy0">Yy0</option><option value="Dd0">Dd0</option><option value="Dz">Dz (Zig-Zag)</option>
            </select>
            <select id="ttrNeutro" onchange="calcTTR()"><option value="X0">C/ X0 Aparente</option><option value="H0">C/ H0 Aparente</option></select>
        </div>
        <label>CONEXÃO DE TESTE (PONTOS)</label>
        <input type="text" id="ttrPontos" placeholder="Ex: H1-H3 x X1-X0" style="margin-bottom:10px;">
        
        <div style="background:#f1f5f9; padding:15px; border-radius:10px; text-align:center; border: 1px solid #cbd5e1;">
            <span style="font-size:11px; color:#64748b; display:block;">RSR TEÓRICO</span>
            <span id="ttrTeo" style="font-size:22px; font-weight:900; color:#0284c7;">0.0000</span>
        </div>
        <div style="display:grid; grid-template-columns:1fr 1fr 1fr; gap:8px; margin-top:10px;"><input type="text" id="ttrA" placeholder="Fase A"><input type="text" id="ttrB" placeholder="Fase B"><input type="text" id="ttrC" placeholder="Fase C"></div>
        <button class="btn-add" onclick="addTTR()">📊 ADICIONAR AO LAUDO TTR</button>
    </div>
    <h3 class="tem-dados">📊 RELAÇÃO DE TRANSFORMAÇÃO (TTR)</h3>
    <table id="tabTTR"><thead><tr><th>Conexão</th><th>Grupo</th><th>Teórico</th><th>A</th><th>B</th><th>C</th><th>Erro%</th><th class="no-print">X</th></tr></thead><tbody></tbody></table>
</div>

<div id="secMICRO" class="tela">
    <div class="no-print">
        <label>PONTOS DE MEDIÇÃO E TEMP.</label>
        <div style="display:grid; grid-template-columns: 1fr 90px; gap:8px;"><input type="text" id="micP" placeholder="Ex: H1-H2"><input type="number" id="micTemp" value="25"></div>
        <label>RESISTÊNCIA LIDA (mΩ)</label><input type="text" id="micV" inputmode="decimal" placeholder="0.000">
        <button class="btn-add" onclick="addMicro()">📏 ADICIONAR AO LAUDO MICRO</button>
    </div>
    <h3 class="tem-dados">📏 RESISTÊNCIA ÔHMICA DE ENROLAMENTOS</h3>
    <table id="tabMicro"><thead><tr><th>Ponto</th><th>Lido</th><th>@20°C</th><th>Status</th><th class="no-print">X</th></tr></thead><tbody></tbody></table>
</div>

<div id="secCONFIG" class="tela no-print">
    <button onclick="voltar()" class="btn-add" style="background:#475569; margin-top:0;">← VOLTAR</button>
    <label>GERENCIAR TÉCNICOS</label>
    <div style="display:flex; gap:8px;"><input type="text" id="cfgT" placeholder="Nome completo"><button onclick="salvarCfg('tecnicos','cfgT')" style="background:#22c55e; color:white; border:none; padding:12px; border-radius:8px; width:60px;">+</button></div>
    <div id="cfgListaTecs" class="chip-container"></div>
    
    <label style="margin-top:20px;">GERENCIAR LOCAIS / SUBESTAÇÕES</label>
    <div style="display:flex; gap:8px;"><input type="text" id="cfgL" placeholder="Ex: SE-01-NORTE"><button onclick="salvarCfg('locais','cfgL')" style="background:#22c55e; color:white; border:none; padding:12px; border-radius:8px; width:60px;">+</button></div>
    <div id="cfgListaLocais" class="chip-container"></div>
</div>

<button onclick="window.print()" id="btnPDF" style="display:none; width:100%; background:#000; color:#fff; border:none; padding:20px; font-weight:bold; margin-top:15px; border-radius:12px;" class="no-print">🖨️ GERAR LAUDO TÉCNICO PDF</button>

<script>
    let db = JSON.parse(localStorage.getItem('alpha_v41_db')) || { tecnicos: [], locais: [] };
    let session = JSON.parse(localStorage.getItem('alpha_v41_session')) || { tag: '', local: '', tecs: [], meg: [], ttr: [], mic: [] };

    window.onload = () => {
        setTimeout(() => { document.getElementById('splash').style.opacity = '0'; 
        setTimeout(() => document.getElementById('splash').style.display = 'none', 1000); }, 3000);
        render();
    };

    function setInf(inpId, selId) {
        document.getElementById(inpId).value = '∞';
        document.getElementById(selId).style.visibility = 'hidden'; // Esconde unidade se for infinito
    }

    function mudar(t) {
        document.getElementById('menuHome').classList.remove('ativa');
        document.querySelectorAll('.tela').forEach(x => x.classList.remove('ativa'));
        document.getElementById('sec'+t).classList.add('ativa');
        document.getElementById('blocoDados').classList.add('ativa');
        document.getElementById('btnVoltar').style.display = 'block';
        document.getElementById('btnPDF').style.display = 'block';
        render();
    }

    function voltar() {
        document.querySelectorAll('.tela').forEach(x => x.classList.remove('ativa'));
        document.getElementById('menuHome').classList.add('ativa');
        document.getElementById('btnVoltar').style.display = 'none';
        document.getElementById('btnPDF').style.display = 'none';
    }

    function autoSave() {
        session.tag = document.getElementById('tag').value;
        session.local = document.getElementById('listaLocais').value;
        localStorage.setItem('alpha_v41_session', JSON.stringify(session));
    }

    function render() {
        document.getElementById('listaLocais').innerHTML = '<option value="">Selecione Local...</option>' + db.locais.map(l => `<option value="${l}" ${session.local===l?'selected':''}>${l}</option>`).join('');
        document.getElementById('tag').value = session.tag || '';
        document.getElementById('poolTecnicos').innerHTML = db.tecnicos.map(t => `<div class="chip ${session.tecs.includes(t)?'selected':''}" onclick="toggleTec('${t}')">${t}</div>`).join('') || '<small>Cadastre na engrenagem</small>';
        document.getElementById('tecsNoLaudo').innerText = session.tecs.join(' / ') || 'Nenhum técnico selecionado';
        document.querySelector('#tabMeg tbody').innerHTML = session.meg.join('');
        document.querySelector('#tabTTR tbody').innerHTML = session.ttr.join('');
        document.querySelector('#tabMicro tbody').innerHTML = session.mic.join('');
        document.getElementById('cfgListaTecs').innerHTML = db.tecnicos.map((t,i) => `<div class="chip">${t} <span onclick="db.tecnicos.splice(${i},1); saveDb(); render();" style="color:red;margin-left:5px">×</span></div>`).join('');
        document.getElementById('cfgListaLocais').innerHTML = db.locais.map((l,i) => `<div class="chip">${l} <span onclick="db.locais.splice(${i},1); saveDb(); render();" style="color:red;margin-left:5px">×</span></div>`).join('');
        
        document.getElementById('secMEG').classList.toggle('tem-dados', session.meg.length > 0);
        document.getElementById('secTTR').classList.toggle('tem-dados', session.ttr.length > 0);
        document.getElementById('secMICRO').classList.toggle('tem-dados', session.mic.length > 0);
    }

    function toggleTec(t) {
        if(session.tecs.includes(t)) session.tecs = session.tecs.filter(x => x !== t);
        else session.tecs.push(t);
        autoSave(); render();
    }

    function salvarCfg(tipo, id) {
        const val = document.getElementById(id).value;
        if(val) { db[tipo].push(val); saveDb(); document.getElementById(id).value=''; render(); }
    }

    function saveDb() { localStorage.setItem('alpha_v41_db', JSON.stringify(db)); }
    function novoEnsaio() { if(confirm("Limpar tudo?")) { session = { tag:'', local:'', tecs:[], meg:[], ttr:[], mic:[] }; autoSave(); location.reload(); } }

    function addMegger() {
        function getV(id, uId) { 
            let v = document.getElementById(id).value; 
            if(v==='∞') return 999999999;
            let n = parseFloat(v.replace(',','.'));
            let u = document.getElementById(uId).value;
            return (u==='GΩ')?n*1000:(u==='TΩ')?n*1000000:n;
        }
        const ref = getV('mRef', 'uRef');
        const v30 = getV('r30', 'u30');
        let repro = (v30 < ref);
        const row = `<tr class="${repro?'status-repro':'status-aprov'}">
            <td>${document.getElementById('mPonto').value}</td><td>${document.getElementById('mTensao').value}</td>
            <td>${document.getElementById('r30').value}${document.getElementById('r30').value==='∞'?'':document.getElementById('u30').value}</td>
            <td>${document.getElementById('r60').value}${document.getElementById('r60').value==='∞'?'':document.getElementById('u60').value}</td>
            <td>${document.getElementById('r120').value}${document.getElementById('r120').value==='∞'?'':document.getElementById('u120').value}</td>
            <td>${repro?'REPRO':'OK'}</td>
            <td class="no-print"><button onclick="session.meg.splice(Array.from(this.closest('tbody').children).indexOf(this.closest('tr')),1); autoSave(); render();">❌</button></td></tr>`;
        session.meg.push(row);
        document.getElementById('r30').value=''; document.getElementById('r60').value=''; document.getElementById('r120').value='';
        document.getElementById('u30').style.visibility = 'visible'; document.getElementById('u60').style.visibility = 'visible'; document.getElementById('u120').style.visibility = 'visible';
        autoSave(); render();
    }

    function calcTTR() {
        const u1 = parseFloat(document.getElementById('u1').value)||0, u2 = parseFloat(document.getElementById('u2').value)||0, f = document.getElementById('ttrFas').value, n = document.getElementById('ttrNeutro').value;
        let r = 0; if(u1 && u2) { 
            if(f.includes("Ydn")||f.includes("Dyn")) r = (n==="X0")?(u1*1.73205/u2):(u1/(1.73205*u2)); 
            else if(f.includes("Yd")) r = (0.866025*u1)/u2;
            else if(f.includes("Dy")) r = u1/(0.866025*u2);
            else if(f==="Dz") r = (u1 * 0.866) / u2;
            else r = u1/u2; 
        }
        document.getElementById('ttrTeo').innerText = r.toFixed(4);
    }

    function addTTR() {
        const t = parseFloat(document.getElementById('ttrTeo').innerText), a = parseFloat(document.getElementById('ttrA').value.replace(',','.')), b = parseFloat(document.getElementById('ttrB').value.replace(',','.')), c = parseFloat(document.getElementById('ttrC').value.replace(',','.'));
        const err = Math.max(Math.abs((a-t)/t), Math.abs((b-t)/t), Math.abs((c-t)/t))*100;
        const row = `<tr class="${err>0.5?'status-repro':'status-aprov'}"><td>${document.getElementById('ttrPontos').value}</td><td>${document.getElementById('ttrFas').value}</td><td>${t.toFixed(4)}</td><td>${a}</td><td>${b}</td><td>${c}</td><td>${err.toFixed(3)}%</td><td class="no-print"><button onclick="session.ttr.splice(Array.from(this.closest('tbody').children).indexOf(this.closest('tr')),1); autoSave(); render();">❌</button></td></tr>`;
        session.ttr.push(row); document.getElementById('ttrA').value=''; document.getElementById('ttrB').value=''; document.getElementById('ttrC').value='';
        autoSave(); render();
    }

    function addMicro() {
        const v = parseFloat(document.getElementById('micV').value.replace(',','.')), t = parseFloat(document.getElementById('micTemp').value);
