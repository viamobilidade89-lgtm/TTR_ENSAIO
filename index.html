<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ENSAIO PRO EVOLUTION</title>
    <style>
        :root { --p: #facc15; --bg: #ffffff; --dark: #0f172a; --accent: #0284c7; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); margin: 0; padding: 0; color: var(--dark); overflow-x: hidden; display: flex; flex-direction: column; min-height: 100vh; }
        
        /* Splash Animation Ampliada */
        #splash { position: fixed; top:0; left:0; width:100%; height:100%; background: var(--dark); display:flex; flex-direction:column; align-items:center; justify-content:center; z-index:9999; transition: opacity 0.8s ease; }
        .bolt { width: 100px; height: 100px; background: var(--p); clip-path: polygon(45% 0%, 100% 0%, 55% 45%, 100% 45%, 15% 100%, 45% 55%, 0% 55%); animation: surge 1s infinite alternate; }
        .loader { width: 40px; height: 40px; border: 4px solid #334155; border-top: 4px solid var(--p); border-radius: 50%; animation: spin 1s linear infinite; margin-top: 30px; }
        @keyframes surge { from { filter: drop-shadow(0 0 10px var(--p)); transform: scale(1); } to { filter: drop-shadow(0 0 30px var(--p)); transform: scale(1.15); } }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

        /* Header Ajustado */
        header { display: flex; justify-content: space-between; align-items: center; padding: 25px 20px; background: white; border-bottom: 1px solid #f1f5f9; }
        .main-title { font-size: 22px; font-weight: 900; color: var(--accent); letter-spacing: 0.5px; margin: 0; flex-grow: 1; text-align: center; }
        .config-btn { font-size: 24px; cursor: pointer; background: none; border: none; padding: 5px; }

        /* Menu Centralizado (Bloco Único) */
        #main-wrapper { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 20px 0; }
        .menu-grid { display: flex; flex-direction: column; width: 85%; max-width: 350px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); border-radius: 20px; overflow: hidden; }
        .btn-menu { 
            background: var(--accent); color: white; border: none; border-bottom: 1px solid #0369a1;
            padding: 45px 20px; font-size: 22px; font-weight: bold; cursor: pointer;
            width: 100%; transition: 0.2s; box-sizing: border-box;
        }
        .btn-menu:last-child { border-bottom: none; }
        .btn-menu:active { background: #0369a1; }

        /* Telas */
        .tela { display: none; padding: 20px; animation: fadeIn 0.3s forwards; flex: 1; }
        .ativa { display: block !important; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

        /* Cards e Inputs */
        .card { background: #f8fafc; padding: 20px; border-radius: 15px; border: 1px solid #e2e8f0; max-width: 500px; margin: auto; }
        label { display: block; font-size: 11px; font-weight: 800; color: var(--accent); margin: 15px 0 5px; text-transform: uppercase; }
        input, select { width: 100%; padding: 12px; border: 2px solid #cbd5e1; border-radius: 10px; font-size: 16px; margin-bottom: 5px; }
        
        /* Tabela Megger */
        .table-wrapper { overflow-x: auto; margin-top: 20px; background: white; border-radius: 10px; }
        table { width: 100%; border-collapse: collapse; font-size: 14px; }
        th, td { border: 1px solid #e2e8f0; padding: 12px; text-align: center; }
        th { background: #f1f5f9; color: var(--accent); }

        /* Botões de Ação */
        .btn-acao { background: var(--accent); color: white; border: none; padding: 15px; border-radius: 10px; font-weight: bold; width: 100%; margin-top: 10px; cursor: pointer; }
        .btn-voltar { background: #64748b; margin-top: 10px; }
        .btn-save-hist { background: #16a34a; margin-top: 20px; }

        /* Footer Fixo */
        footer { text-align: center; padding: 15px; font-size: 13px; color: #94a3b8; width: 100%; background: white; }

        /* Lista Histórico */
        .hist-item { background: white; border: 1px solid #cbd5e1; padding: 15px; border-radius: 10px; margin-bottom: 10px; }
        .btn-share-small { background: #16a34a; color: white; border: none; padding: 8px 12px; border-radius: 6px; font-size: 12px; font-weight: bold; margin-top: 8px; cursor: pointer; }
    </style>
</head>
<body>

<div id="splash">
    <div class="bolt"></div>
    <div class="loader"></div>
    <h2 style="color:white; margin-top:20px; font-weight:900; letter-spacing:4px; font-size: 22px;">PRO EVOLUTION</h2>
</div>

<header class="no-print">
    <h1 class="main-title">ENSAIO PRO EVOLUTION</h1>
    <button class="config-btn" onclick="mudar('CONFIG')">⚙️</button>
</header>

<div id="main-wrapper" class="no-print">
    <div id="menuHome" class="menu-grid">
        <button class="btn-menu" onclick="mudar('MEG')">⚡ MEGGER</button>
        <button class="btn-menu" onclick="mudar('TTR')">📟 TTR</button>
        <button class="btn-menu" onclick="mudar('MICRO')">📏 MICRO</button>
    </div>
</div>

<div id="secMEG" class="tela">
    <div class="card no-print">
        <h2 style="color:var(--accent); margin-top:0; text-align: center;">⚡ MEGGER</h2>
        <label>PONTO DE TESTE</label>
        <select id="mPonto"><option>PRI x SEC</option><option>PRI x CARC</option><option>SEC x CARC</option></select>
        
        <label>LEITURA 60s</label>
        <div style="display: flex; gap: 5px;">
            <input type="number" id="mVal" placeholder="Valor">
            <select id="mUnit" style="width: 100px;"><option>GΩ</option><option>MΩ</option></select>
        </div>

        <button class="btn-acao" onclick="adicionarLinhaMegger()">ADICIONAR AO LAUDO</button>
    </div>

    <div class="table-wrapper">
        <table id="tabMeg">
            <thead><tr><th>Ponto</th><th>Leitura</th><th>Status</th></tr></thead>
            <tbody></tbody>
        </table>
    </div>
    
    <button id="btnArquivar" class="btn-acao btn-save-hist no-print" onclick="arquivarNoHistorico()" style="display:none;">💾 ARQUIVAR NO HISTÓRICO</button>
    <button class="btn-acao btn-voltar no-print" onclick="voltar()">VOLTAR AO MENU</button>
</div>

<div id="secCONFIG" class="tela">
    <div class="card">
        <h3 style="color:var(--accent); margin-top:0; border-bottom: 2px solid #e2e8f0; padding-bottom: 10px;">📁 HISTÓRICO DE ENSAIOS</h3>
        <div id="listaHistorico" style="margin-top: 15px; max-height: 300px; overflow-y: auto;"></div>

        <h3 style="color:var(--accent); margin-top:30px;">👥 CADASTRAR TÉCNICOS</h3>
        <div style="display:flex; gap:5px;">
            <input type="text" id="cfgT" placeholder="Nome"><button onclick="salvarCfg('tecnicos','cfgT')" style="background:var(--accent); border:none; color:white; width:50px; border-radius:10px;">+</button>
        </div>
        <div id="cfgListaTecs" style="margin-top:10px"></div>

        <button class="btn-acao btn-voltar" onclick="voltar()">FECHAR E VOLTAR</button>
    </div>
</div>

<footer class="no-print">Produced by unknown</footer>

<script>
    // Memória do Aplicativo
    let db = JSON.parse(localStorage.getItem('pro_evo_v4_db')) || { tecnicos: [], locais: [], historico: [] };
    let laudoProvisorio = [];

    window.onload = () => { 
        setTimeout(() => { document.getElementById('splash').style.opacity = '0'; 
        setTimeout(() => document.getElementById('splash').style.display = 'none', 800); }, 2500); 
        render(); 
    };

    function mudar(t) {
        document.getElementById('main-wrapper').style.display = 'none';
        document.querySelectorAll('.tela').forEach(x => x.classList.remove('ativa'));
        if(t === 'HOME') {
            document.getElementById('main-wrapper').style.display = 'flex';
        } else {
            document.getElementById('sec'+t).classList.add('ativa');
        }
    }

    function voltar() { mudar('HOME'); }

    // Lógica do Megger
    function adicionarLinhaMegger() {
        const ponto = document.getElementById('mPonto').value;
        const valor = document.getElementById('mVal').value;
        const unit = document.getElementById('mUnit').value;

        if(!valor) return alert("Insira o valor da leitura!");

        const dado = { ponto, leitura: valor + unit, status: "OK" };
        laudoProvisorio.push(dado);

        const row = `<tr><td>${dado.ponto}</td><td>${dado.leitura}</td><td style="color:#16a34a; font-weight:bold;">${dado.status}</td></tr>`;
        document.querySelector('#tabMeg tbody').innerHTML += row;
        
        document.getElementById('btnArquivar').style.display = 'block';
        document.getElementById('mVal').value = '';
    }

    // Lógica do Histórico
    function arquivarNoHistorico() {
        if(laudoProvisorio.length === 0) return;

        const novoRegistro = {
            id: Date.now(),
            data: new Date().toLocaleString('pt-BR'),
            tipo: "MEGGER",
            dados: [...laudoProvisorio]
        };

        db.historico.unshift(novoRegistro);
        localStorage.setItem('pro_evo_v4_db', JSON.stringify(db));
        
        // Limpar tela atual
        laudoProvisorio = [];
        document.querySelector('#tabMeg tbody').innerHTML = '';
        document.getElementById('btnArquivar').style.display = 'none';
        
        alert("Ensaio arquivado com sucesso!");
        render();
    }

    async function compartilharEnsaio(id) {
        const item = db.historico.find(h => h.id === id);
        if(!item) return;

        let resumo = `📊 ENSAIO PRO EVOLUTION\n📅 Data: ${item.data}\n🔧 Tipo: ${item.tipo}\n\n`;
        item.dados.forEach(d => {
            resumo += `📍 Ponto: ${d.ponto}\n⚡ Leitura: ${d.leitura}\n✅ Status: ${d.status}\n------------------\n`;
        });

        if (navigator.share) {
            try {
                await navigator.share({ title: 'Relatório Pro Evolution', text: resumo });
            } catch (err) { console.log("Erro ao compartilhar"); }
        } else {
            alert("Compartilhamento não suportado. Copie o histórico manualmente.");
        }
    }

    // Configurações
    function salvarCfg(tipo, id) {
        const val = document.getElementById(id).value;
        if(val) { 
            db[tipo].push(val); 
            localStorage.setItem('pro_evo_v4_db', JSON.stringify(db)); 
            render(); 
            document.getElementById(id).value=''; 
        }
    }

    function render() {
        // Renderizar Técnicos
        document.getElementById('cfgListaTecs').innerHTML = db.tecnicos.map((t,i) => `
            <div style="display:inline-block; background:#e2e8f0; padding:5px 12px; border-radius:20px; margin:3px; font-size:13px; font-weight:600;">
                ${t} <span onclick="removerTec(${i})" style="color:red; margin-left:8px; cursor:pointer;">×</span>
            </div>`).join('');

        // Renderizar Histórico
        document.getElementById('listaHistorico').innerHTML = db.historico.map((h) => `
            <div class="hist-item">
                <div style="font-size: 14px; font-weight: bold; color: #1e293b;">${h.data} - ${h.tipo}</div>
                <div style="font-size: 12px; color: #64748b;">${h.dados.length} pontos registrados.</div>
                <button class="btn-share-small" onclick="compartilharEnsaio(${h.id})">COMPARTILHAR PDF / TXT</button>
            </div>`).join('') || "<p style='text-align:center; color:#94a3b8;'>Nenhum histórico disponível.</p>";
    }

    function removerTec(i) {
        db.tecnicos.splice(i, 1);
        localStorage.setItem('pro_evo_v4_db', JSON.stringify(db));
        render();
    }
</script>
</body>
</html>
