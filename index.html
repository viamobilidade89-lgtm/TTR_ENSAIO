<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ENSAIO PRO EVOLUTION</title>
    <style>
        :root { --p: #0ea5e9; --bg: #ffffff; --dark: #0f172a; --accent: #0284c7; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); margin: 0; padding: 0; color: var(--dark); display: flex; flex-direction: column; min-height: 100vh; }
        
        /* Splash Animation */
        #splash { position: fixed; top:0; left:0; width:100%; height:100%; background: var(--dark); display:flex; flex-direction:column; align-items:center; justify-content:center; z-index:9999; transition: opacity 0.8s ease; }
        .bolt { width: 60px; height: 60px; background: var(--p); clip-path: polygon(45% 0%, 100% 0%, 55% 45%, 100% 45%, 15% 100%, 45% 55%, 0% 55%); animation: surge 1s infinite alternate; }
        @keyframes surge { from { filter: drop-shadow(0 0 5px var(--p)); transform: scale(1); } to { filter: drop-shadow(0 0 20px var(--p)); transform: scale(1.1); } }

        /* Header */
        header { position: relative; text-align: center; padding: 25px 10px; background: white; }
        .main-title { font-size: 20px; font-weight: 900; color: var(--accent); letter-spacing: 1px; margin: 0; }
        .config-btn { position: absolute; right: 20px; top: 20px; font-size: 26px; cursor: pointer; background: none; border: none; }

        /* Menu de Ensaios (Estilo Anterior) */
        .menu-grid { display: flex; flex-direction: column; width: 100%; max-width: 400px; margin: 20px auto; gap: 0; padding: 10px; }
        .btn-menu { 
            background: var(--accent); color: white; border: 1px solid #0369a1; 
            padding: 35px; font-size: 20px; font-weight: bold; cursor: pointer;
            display: flex; align-items: center; justify-content: center; gap: 15px;
            transition: 0.2s;
        }
        .btn-menu:first-child { border-radius: 15px 15px 0 0; }
        .btn-menu:last-child { border-radius: 0 0 15px 15px; }
        .btn-menu:active { background: #0369a1; }

        /* Telas */
        .tela { display: none; padding: 15px; flex: 1; animation: fadeIn 0.3s; }
        .ativa { display: block !important; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

        /* Interface Megger */
        .card { background: #f8fafc; padding: 15px; border-radius: 12px; border: 1px solid #e2e8f0; }
        label { display: block; font-size: 11px; font-weight: 800; color: var(--accent); margin: 10px 0 5px; }
        input, select { width: 100%; padding: 12px; border: 2px solid #cbd5e1; border-radius: 8px; font-size: 16px; box-sizing: border-box; }
        .row-ensaio { display: grid; grid-template-columns: 1fr 85px 45px; gap: 8px; margin-bottom: 8px; }
        .btn-inf { background: #475569; color: white; border: none; border-radius: 8px; font-weight: bold; cursor: pointer; }
        .btn-add { background: var(--accent); color: white; border: none; width: 100%; padding: 20px; border-radius: 12px; font-weight: bold; margin-top: 15px; }

        /* Tabela */
        .table-wrapper { overflow-x: auto; margin-top: 15px; }
        table { width: 100%; border-collapse: collapse; font-size: 12px; background: white; }
        th, td { border: 1px solid #cbd5e1; padding: 10px; text-align: center; }
        th { background: #f1f5f9; color: var(--accent); }

        /* Histórico e Config */
        .hist-item { background: white; border: 1px solid #cbd5e1; padding: 10px; border-radius: 8px; margin-bottom: 8px; display: flex; justify-content: space-between; align-items: center; }
        .btn-share { background: #16a34a; color: white; border: none; padding: 8px; border-radius: 5px; cursor: pointer; }

        /* Footer */
        footer { text-align: center; padding: 20px; font-size: 12px; color: #94a3b8; margin-top: auto; }

        @media print { .no-print { display: none !important; } }
    </style>
</head>
<body>

<div id="splash">
    <div class="bolt"></div>
    <h2 style="color:white; margin-top:20px; font-weight:200; letter-spacing:4px;">PRO EVOLUTION</h2>
</div>

<header class="no-print">
    <h1 class="main-title">ENSAIO PRO EVOLUTION</h1>
    <button class="config-btn" onclick="mudar('CONFIG')">⚙️</button>
</header>

<div id="menuHome" class="menu-grid no-print ativa">
    <button class="btn-menu" onclick="mudar('MEG')">⚡ MEGGER</button>
    <button class="btn-menu" onclick="mudar('TTR')">📟 TTR</button>
    <button class="btn-menu" onclick="mudar('MICRO')">📏 MICRO</button>
</div>

<div id="secMEG" class="tela">
    <div class="card no-print">
        <label>PONTO E TENSÃO</label>
        <div style="display:grid; grid-template-columns: 1fr 1fr; gap:5px;">
            <select id="mPonto"><option>PRI x SEC</option><option>PRI x CARC</option></select>
            <select id="mTensao"><option>500V</option><option>1000V</option><option>2500V</option><option>5000V</option></select>
        </div>
        <label>REFERÊNCIA (GΩ)</label>
        <input type="number" id="mRef" value="500">
        
        <label>LEITURAS</label>
        <div class="row-ensaio"><input type="text" id="r30" placeholder="30s"><select id="u30"><option>GΩ</option><option>MΩ</option></select><button class="btn-inf" onclick="setInf('r30')">∞</button></div>
        <div class="row-ensaio"><input type="text" id="r60" placeholder="60s"><select id="u60"><option>GΩ</option><option>MΩ</option></select><button class="btn-inf" onclick="setInf('r60')">∞</button></div>
        
        <button class="btn-add" onclick="addMegger()">SALVAR NO LAUDO ATUAL</button>
    </div>

    <div class="table-wrapper">
        <table id="tabMeg">
            <thead><tr><th>Ponto</th><th>60s</th><th>Status</th></tr></thead>
            <tbody></tbody>
        </table>
    </div>
    
    <button class="btn-add no-print" style="background:#16a34a" onclick="arquivarEnsaio()">💾 ARQUIVAR NO HISTÓRICO</button>
    <button class="btn-add no-print" style="background:#64748b" onclick="voltar()">VOLTAR AO MENU</button>
</div>

<div id="secCONFIG" class="tela no-print">
    <div class="card">
        <h3 style="color:var(--accent); margin-top:0;">📁 HISTÓRICO PARA COMPARTILHAR</h3>
        <div id="listaHistorico"></div>

        <h3 style="color:var(--accent)">👥 TÉCNICOS</h3>
        <div style="display:flex; gap:5px; margin-bottom:10px;">
            <input type="text" id="cfgT"><button onclick="salvarCfg('tecnicos','cfgT')" style="background:var(--accent); border:none; color:white; padding:10px; border-radius:5px;">+</button>
        </div>
        <div id="cfgListaTecs"></div>

        <button class="btn-add" style="background:#64748b" onclick="voltar()">FINALIZAR E SAIR</button>
    </div>
</div>

<footer>Produced by unknown</footer>

<script>
    let db = JSON.parse(localStorage.getItem('pro_evo_db_v2')) || { tecnicos: [], historico: [] };
    let laudoAtual = [];

    window.onload = () => { setTimeout(() => { document.getElementById('splash').style.display = 'none'; }, 2000); render(); };

    function mudar(t) {
        // Esconde menu de ensaios sempre que sair da Home
        document.getElementById('menuHome').classList.remove('ativa');
        document.querySelectorAll('.tela').forEach(x => x.classList.remove('ativa'));
        
        if(t === 'HOME') document.getElementById('menuHome').classList.add('ativa');
        else document.getElementById('sec'+t).classList.add('ativa');
    }

    function voltar() { mudar('HOME'); }
    function setInf(id) { document.getElementById(id).value = '∞'; }

    function addMegger() {
        const p = document.getElementById('mPonto').value;
        const v60 = document.getElementById('r60').value;
        const u60 = document.getElementById('u60').value;
        const row = `<tr><td>${p}</td><td>${v60}${u60}</td><td style="color:green">OK</td></tr>`;
        document.querySelector('#tabMeg tbody').innerHTML += row;
        laudoAtual.push({p, v60, u60});
    }

    function arquivarEnsaio() {
        if(laudoAtual.length === 0) return alert("Nada para salvar!");
        const data = new Date().toLocaleString();
        db.historico.unshift({ data, dados: laudoAtual });
        localStorage.setItem('pro_evo_db_v2', JSON.stringify(db));
        laudoAtual = [];
        document.querySelector('#tabMeg tbody').innerHTML = "";
        alert("Ensaio arquivado! Acesse a engrenagem para compartilhar.");
        render();
    }

    function compartilhar(index) {
        const ensaio = db.historico[index];
        const texto = `Ensaio Pro Evolution\nData: ${ensaio.data}\nResumo: ${ensaio.dados.length} pontos medidos.`;
        if (navigator.share) {
            navigator.share({ title: 'Relatório', text: texto });
        } else { alert("Função compartilhar não suportada neste navegador."); }
    }

    function salvarCfg(tipo, id) {
        const val = document.getElementById(id).value;
        if(val) { db[tipo].push(val); localStorage.setItem('pro_evo_db_v2', JSON.stringify(db)); render(); document.getElementById(id).value=''; }
    }

    function render() {
        document.getElementById('cfgListaTecs').innerHTML = db.tecnicos.map((t,i) => `
            <div style="display:inline-block; background:#e2e8f0; padding:5px 10px; border-radius:15px; margin:2px;">
                ${t} <b onclick="db.tecnicos.splice(${i},1); localStorage.setItem('pro_evo_db_v2', JSON.stringify(db)); render();" style="color:red;cursor:pointer">×</b>
            </div>`).join('');
        
        document.getElementById('listaHistorico').innerHTML = db.historico.map((h, i) => `
            <div class="hist-item">
                <span>${h.data}</span>
                <button class="btn-share" onclick="compartilhar(${i})">Compartilhar PDF</button>
            </div>`).join('') || "Nenhum ensaio salvo.";
    }
</script>
</body>
</html>
