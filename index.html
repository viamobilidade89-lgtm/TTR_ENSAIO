<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ENSAIO PRO EVOLUTION v40.0</title>
    <style>
        :root { --p: #0284c7; --bg: #ffffff; --t: #000; --re: #dc2626; --ap: #16a34a; --s: #f1f5f9; }
        body { font-family: sans-serif; background: var(--bg); color: var(--t); margin: 0; padding: 5px; overflow-x: hidden; }
        
        /* ANIMAÇÃO DE ENTRADA */
        #splash { position: fixed; top:0; left:0; width:100%; height:100%; background:#0f172a; display:flex; flex-direction:column; align-items:center; justify-content:center; z-index:9999; transition: opacity 0.8s ease; }
        .logo-anim { width: 80px; height: 80px; border: 5px solid var(--p); border-top-color: transparent; border-radius: 50%; animation: spin 1s linear infinite; }
        @keyframes spin { to { transform: rotate(360deg); } }
        .logo-txt { color: white; margin-top: 20px; font-weight: 900; letter-spacing: 2px; animation: pulse 1.5s infinite; }
        @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.5; } }

        .main-title { text-align: center; color: var(--p); font-weight: 900; font-size: 18px; margin: 10px 0; text-transform: uppercase; }
        header { display: flex; justify-content: space-between; align-items: center; padding: 8px 12px; background: var(--s); border-radius: 8px; border: 1px solid #cbd5e1; margin-bottom: 5px; }
        .tela { display: none; padding: 10px; border: 1px solid #94a3b8; border-radius: 8px; margin-top: 5px; background: #fff; }
        .ativa { display: block !important; }
        
        .grid-menu { display: grid; grid-template-columns: 1fr; gap: 12px; padding: 10px; }
        .btn-menu { background: var(--p); color: white; border: none; padding: 25px; border-radius: 12px; font-size: 16px; font-weight: bold; display: flex; flex-direction: column; align-items: center; gap: 10px; cursor: pointer; transition: 0.2s; }
        .btn-menu:active { transform: scale(0.95); background: #0369a1; }
        
        label { display: block; font-size: 10px; font-weight: bold; color: var(--p); margin: 8px 0 2px; text-transform: uppercase; }
        input, select { width: 100%; padding: 10px; border: 1px solid #64748b; border-radius: 6px; font-size: 14px; box-sizing: border-box; }
        
        .chip-container { display: flex; flex-wrap: wrap; gap: 5px; margin-top: 5px; padding: 5px; background: #f8fafc; border-radius: 6px; border: 1px dashed #cbd5e1; }
        .chip { background: #e2e8f0; padding: 6px 12px; border-radius: 20px; font-size: 11px; font-weight: bold; cursor: pointer; display: flex; align-items: center; gap: 5px; border: 1px solid #94a3b8; }
        .chip.selected { background: var(--ap); color: white; border-color: #15803d; }
        .chip-del { color: var(--re); margin-left: 5px; font-size: 14px; }

        .row-ensaio { display: grid; grid-template-columns: 1fr 60px 40px; gap: 5px; align-items: end; margin-bottom: 5px; }
        .btn-add { width: 100%; padding: 15px; background: var(--p); color: white; border: none; border-radius: 8px; font-weight: bold; margin-top: 10px; font-size: 14px; }
        
        table { width: 100%; border-collapse: collapse; margin-top: 10px; font-size: 10px; }
        th, td { border: 1px solid #000; padding: 6px; text-align: center; }
        th { background: var(--s); }
        .status-repro { background: var(--re) !important; color: white !important; }
        .status-aprov { background: var(--ap) !important; color: white !important; }

        @media print {
            .no-print, #splash { display: none !important; }
            .tela { display: none; border: none !important; }
            .tem-dados { display: block !important; }
            #blocoDados { display: block !important; border-bottom: 2px solid #000; }
        }
    </style>
</head>
<body>

<div id="splash">
    <div class="logo-anim"></div>
    <div class="logo-txt">EQUIPE DE ENERGIA</div>
</div>

<div class="main-title">ENSAIO PRO EVOLUTION</div>

<header class="no-print">
    <button onclick="voltar()" id="btnVoltar" style="display:none; background:#64748b; color:white; border:none; padding:8px 12px; border-radius:5px;">← MENU</button>
    <b>v40.0 FINAL</b>
    <button onclick="mudar('CONFIG')" style="background:#fff; border:1px solid #94a3b8; padding:8px; border-radius:6px;">⚙️</button>
</header>

<div id="menuHome" class="grid-menu no-print ativa">
    <div class="btn-menu" onclick="mudar('MEG')"><span>⚡</span> MEGGER</div>
    <div class="btn-menu" onclick="mudar('TTR')"><span>📟</span> TTR</div>
    <div class="btn-menu" onclick="mudar('MICRO')"><span>📏</span> MICRO</div>
    <button onclick="novoEnsaio()" style="margin-top:20px; padding:15px; background:#f59e0b; color:white; border:none; border-radius:8px; font-weight:bold;">+ LIMPAR TUDO</button>
</div>

<div id="blocoDados" class="tela">
    <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 10px;">
        <div><label>TAG EQUIPAMENTO</label><input type="text" id="tag" oninput="autoSave()"></div>
        <div><label>LOCAL / SE</label><select id="listaLocais" onchange="autoSave()"></select></div>
    </div>
    
    <label>SELECIONE A EQUIPE TÉCNICA:</label>
    <div id="poolTecnicos" class="chip-container no-print"></div>
    
    <div class="tem-dados" style="margin-top:5px;">
        <label>EQUIPE NO LAUDO:</label>
        <div id="tecsNoLaudo" style="font-weight:bold; font-size:12px;"></div>
    </div>
</div>

<div id="secMEG" class="tela">
    <div class="no-print">
        <label>CONEXÃO / TENSÃO</label>
        <div class="row-ensaio" style="grid-template-columns: 1fr 80px;">
            <select id="mPonto"><option>ENTRADA x SAÍDA</option><option>ENTRADA x CARCAÇA</option><option>SAÍDA x CARCAÇA</option><option>CAMIS</option></select>
            <select id="mTensao"><option>500V</option><option>1kV</option><option>2.5kV</option><option>5kV</option></select>
        </div>
        <label>REF. MÍNIMA</label>
        <div class="row-ensaio" style="grid-template-columns: 1fr 80px;"><input type="text" id="mRef" inputmode="decimal" placeholder="Ex: 500"><select id="uRef"><option>MΩ</option><option>GΩ</option><option>TΩ</option></select></div>
        <label>LEITURAS</label>
        <div class="row-ensaio"><input type="text" id="r30" inputmode="decimal" placeholder="30s"><select id="u30"><option>MΩ</option><option>GΩ</option><option>TΩ</option></select><button class="btn-menu" style="padding:5px; height:35px;" onclick="document.getElementById('r30').value='∞'">∞</button></div>
        <div class="row-ensaio"><input type="text" id="r60" inputmode="decimal" placeholder="60s"><select id="u60"><option>MΩ</option><option>GΩ</option><option>TΩ</option></select><button class="btn-menu" style="padding:5px; height:35px;" onclick="document.getElementById('r60').value='∞'">∞</button></div>
        <div class="row-ensaio"><input type="text" id="r120" inputmode="decimal" placeholder="120s"><select id="u120"><option>MΩ</option><option>GΩ</option><option>TΩ</option></select><button class="btn-menu" style="padding:5px; height:35px;" onclick="document.getElementById('r120').value='∞'">∞</button></div>
        <button class="btn-add" onclick="addMegger()">⚡ ADICIONAR AO LAUDO MEGGER</button>
    </div>
    <h3 class="tem-dados">⚡ ENSAIO DE ISOLAMENTO (MEGGER)</h3>
    <table id="tabMeg"><thead><tr><th>Ponto</th><th>V</th><th>30s</th><th>60s</th><th>120s</th><th>Status</th><th class="no-print">X</th></tr></thead><tbody></tbody></table>
</div>

<div id="secTTR" class="tela">
    <div class="no-print">
        <div style="display:grid; grid-template-columns: 1fr 1fr; gap:10px;">
            <div><label>U1 (ENTRADA)</label><input type="number" id="u1" oninput="calcTTR()"></div>
            <div><label>U2 (SAÍDA)</label><input type="number" id="u2" oninput="calcTTR()"></div>
        </div>
        <div style="display:grid; grid-template-columns: 1fr 1fr; gap:5px; margin-top:10px;">
            <select id="ttrFas" onchange="calcTTR()"><option value="Ydn1_11">Ydn1 / Ydn11</option><option value="Yd1">Yd1</option><option value="Dyn1_11">Dyn1/11</option><option value="Yy0">Yy0/Dd0</option></select>
            <select id="ttrNeutro" onchange="calcTTR()"><option value="X0">C/ X0 Aparente</option><option value="H0">C/ H0 Aparente</option></select>
        </div>
        <div style="background:var(--s); padding:10px; border-radius:8px; margin-top:10px; text-align:center;">TEÓRICO: <span id="ttrTeo" style="font-size:18px; font-weight:900; color:var(--p);">0.0000</span></div>
        <div style="display:grid; grid-template-columns:1fr 1fr 1fr; gap:5px; margin-top:10px;"><input type="text" id="ttrA" placeholder="Fase A"><input type="text" id="ttrB" placeholder="Fase B"><input type="text" id="ttrC" placeholder="Fase C"></div>
        <button class="btn-add" onclick="addTTR()">📊 ADICIONAR AO LAUDO TTR</button>
    </div>
    <h3 class="tem-dados">📊 RELAÇÃO DE TRANSFORMAÇÃO (TTR)</h3>
    <table id="tabTTR"><thead><tr><th>Grupo</th><th>Teórico</th><th>A</th><th>B</th><th>C</th><th>Desvio%</th><th class="no-print">X</th></tr></thead><tbody></tbody></table>
</div>

<div id="secMICRO" class="tela">
    <div class="no-print">
        <label>PONTO E TEMP (°C)</label>
        <div style="display:grid; grid-template-columns: 1fr 80px; gap:5px;"><input type="text" id="micP" placeholder="Ex: H1-H2"><input type="number" id="micTemp" value="25"></div>
        <label>VALOR LIDO (mΩ)</label><input type="text" id="micV" inputmode="decimal">
        <button class="btn-add" onclick="addMicro()">📏 ADICIONAR AO LAUDO MICRO</button>
    </div>
    <h3 class="tem-dados">📏 RESISTÊNCIA ÔHMICA (MICRO)</h3>
    <table id="tabMicro"><thead><tr><th>Ponto</th><th>Lido</th><th>@20°C</th><th>Status</th><th class="no-print">X</th></tr></thead><tbody></tbody></table>
</div>

<div id="secCONFIG" class="tela config-area">
    <button onclick="voltar()" class="btn-add" style="background:#475569;">← VOLTAR</button>
    <label>CADASTRAR TÉCNICOS</label>
    <div style="display:flex; gap:5px;"><input type="text" id="cfgT"><button onclick="salvarCfg('tecnicos','cfgT')" style="background:var(--ap); color:white; border:none; padding:10px; border-radius:6px;">+</button></div>
    <div id="cfgListaTecs" class="chip-container" style="margin-top:10px;"></div>
    
    <label style="margin-top:20px;">CADASTRAR LOCAIS</label>
    <div style="display:flex; gap:5px;"><input type="text" id="cfgL"><button onclick="salvarCfg('locais','cfgL')" style="background:var(--ap); color:white; border:none; padding:10px; border-radius:6px;">+</button></div>
    <div id="cfgListaLocais" class="chip-container" style="margin-top:10px;"></div>
</div>

<button onclick="window.print()" id="btnPDF" style="display:none; width:100%; background:#000; color:#fff; border:none; padding:18px; font-weight:bold; margin-top:10px;" class="no-print">🖨️ GERAR RELATÓRIO PDF</button>

<script>
    // Inicialização do Banco de Dados
    let db = JSON.parse(localStorage.getItem('alpha_v40_db')) || { tecnicos: [], locais: [] };
    let session = JSON.parse(localStorage.getItem('alpha_v40_session')) || { tag: '', local: '', tecs: [], meg: [], ttr: [], mic: [] };

    // Efeito Splash
    window.onload = () => {
        setTimeout(() => { document.getElementById('splash').style.opacity = '0'; 
        setTimeout(() => document.getElementById('splash').style.display = 'none', 800); }, 2000);
        render();
    };

    function mudar(t) {
        document.getElementById('menuHome').classList.remove('ativa');
        document.querySelectorAll('.tela').forEach(x => x.classList.remove('ativa'));
        document.getElementById('sec'+t).classList.add('ativa');
        document.getElementById('blocoDados').classList.add('ativa');
        document.getElementById('btnVoltar').style.display = 'block';
        document.getElementById('btnPDF').style.display = 'block';
        render();
    }

    function voltar() {
        document.querySelectorAll('.tela').forEach(x => x.classList.remove('ativa'));
        document.getElementById('menuHome').classList.add('ativa');
        document.getElementById('btnVoltar').style.display = 'none';
        document.getElementById('btnPDF').style.display = 'none';
    }

    function autoSave() {
        session.tag = document.getElementById('tag').value;
        session.local = document.getElementById('listaLocais').value;
        localStorage.setItem('alpha_v40_session', JSON.stringify(session));
    }

    function render() {
        // Dropdown de Locais
        document.getElementById('listaLocais').innerHTML = '<option value="">Selecione Local...</option>' + db.locais.map(l => `<option value="${l}" ${session.local===l?'selected':''}>${l}</option>`).join('');
        document.getElementById('tag').value = session.tag || '';

        // Pool de Técnicos para Seleção Rápida
        document.getElementById('poolTecnicos').innerHTML = db.tecnicos.map(t => `
            <div class="chip ${session.tecs.includes(t)?'selected':''}" onclick="toggleTec('${t}')">${t}</div>
        `).join('') || '<small>Cadastre técnicos na engrenagem ⚙️</small>';

        // Exibição no Laudo
        document.getElementById('tecsNoLaudo').innerText = session.tecs.join(' / ') || 'Nenhum técnico selecionado';

        // Tabelas
        document.querySelector('#tabMeg tbody').innerHTML = session.meg.join('');
        document.querySelector('#tabTTR tbody').innerHTML = session.ttr.join('');
        document.querySelector('#tabMicro tbody').innerHTML = session.mic.join('');

        // Listas de Configuração (com delete)
        document.getElementById('cfgListaTecs').innerHTML = db.tecnicos.map((t,i) => `<div class="chip">${t} <span class="chip-del" onclick="db.tecnicos.splice(${i},1); saveDb(); render();">×</span></div>`).join('');
        document.getElementById('cfgListaLocais').innerHTML = db.locais.map((l,i) => `<div class="chip">${l} <span class="chip-del" onclick="db.locais.splice(${i},1); saveDb(); render();">×</span></div>`).join('');

        // Controle de Títulos no PDF
        document.getElementById('secMEG').classList.toggle('tem-dados', session.meg.length > 0);
        document.getElementById('secTTR').classList.toggle('tem-dados', session.ttr.length > 0);
        document.getElementById('secMICRO').classList.toggle('tem-dados', session.mic.length > 0);
    }

    function toggleTec(t) {
        if(session.tecs.includes(t)) session.tecs = session.tecs.filter(x => x !== t);
        else session.tecs.push(t);
        autoSave(); render();
    }

    function salvarCfg(tipo, id) {
        const val = document.getElementById(id).value;
        if(val) { db[tipo].push(val); saveDb(); document.getElementById(id).value=''; render(); }
    }

    function saveDb() { localStorage.setItem('alpha_v40_db', JSON.stringify(db)); }
    function novoEnsaio() { if(confirm("Apagar todos os dados atuais?")) { session = { tag:'', local:'', tecs:[], meg:[], ttr:[], mic:[] }; autoSave(); location.reload(); } }

    // LÓGICA MEGGER
    function addMegger() {
        function getV(id, uId) { 
            let v = document.getElementById(id).value; 
            if(v==='∞') return 999999999;
            let n = parseFloat(v.replace(',','.'));
            let u = document.getElementById(uId).value;
            return (u==='GΩ')?n*1000:(u==='TΩ')?n*1000000:n;
        }
        const ref = getV('mRef', 'uRef');
        const v30 = getV('r30', 'u30');
        let repro = (v30 < ref);
        const row = `<tr class="${repro?'status-repro':'status-aprov'}">
            <td>${document.getElementById('mPonto').value}</td><td>${document.getElementById('mTensao').value}</td>
            <td>${document.getElementById('r30').value}${document.getElementById('u30').value}</td>
            <td>${document.getElementById('r60').value}${document.getElementById('u60').value}</td>
            <td>${document.getElementById('r120').value}${document.getElementById('u120').value}</td>
            <td>${repro?'REPRO':'OK'}</td>
            <td class="no-print"><button onclick="session.meg.splice(Array.from(this.closest('tbody').children).indexOf(this.closest('tr')),1); autoSave(); render();">❌</button></td>
        </tr>`;
        session.meg.push(row);
        document.getElementById('r30').value=''; document.getElementById('r60').value=''; document.getElementById('r120').value='';
        autoSave(); render();
    }

    // LÓGICA TTR
    function calcTTR() {
        const u1 = parseFloat(document.getElementById('u1').value)||0, u2 = parseFloat(document.getElementById('u2').value)||0, f = document.getElementById('ttrFas').value, n = document.getElementById('ttrNeutro').value;
        let r = 0; if(u1 && u2) { if(f.includes("Ydn")||f.includes("Dyn")) r = (n==="X0")?(u1*1.73205/u2):(u1/(1.73205*u2)); else if(f.includes("Yd")) r = (0.866*u1)/u2; else r = u1/u2; }
        document.getElementById('ttrTeo').innerText = r.toFixed(4);
    }
    function addTTR() {
        const t = parseFloat(document.getElementById('ttrTeo').innerText), a = parseFloat(document.getElementById('ttrA').value.replace(',','.')), b = parseFloat(document.getElementById('ttrB').value.replace(',','.')), c = parseFloat(document.getElementById('ttrC').value.replace(',','.'));
        const err = Math.max(Math.abs((a-t)/t), Math.abs((b-t)/t), Math.abs((c-t)/t))*100;
        const row = `<tr class="${err>0.5?'status-repro':'status-aprov'}"><td>${document.getElementById('ttrFas').value}</td><td>${t.toFixed(4)}</td><td>${a}</td><td>${b}</td><td>${c}</td><td>${err.toFixed(3)}%</td><td class="no-print"><button onclick="session.ttr.splice(Array.from(this.closest('tbody').children).indexOf(this.closest('tr')),1); autoSave(); render();">❌</button></td></tr>`;
        session.ttr.push(row); document.getElementById('ttrA').value=''; document.getElementById('ttrB').value=''; document.getElementById('ttrC').value='';
        autoSave(); render();
    }

    // LÓGICA MICRO
    function addMicro() {
        const v = parseFloat(document.getElementById('micV').value.replace(',','.')), t = parseFloat(document.getElementById('micTemp').value);
        const v20 = (v * (234.5 + 20)) / (234.5 + t);
        const row = `<tr class="status-aprov"><td>${document.getElementById('micP').value}</td><td>${v}</td><td>${v20.toFixed(4)}</td><td>OK</td><td class="no-print"><button onclick="session.mic.splice(Array.from(this.closest('tbody').children).indexOf(this.closest('tr')),1); autoSave(); render();">❌</button></td></tr>`;
        session.mic.push(row); document.getElementById('micV').value='';
        autoSave(); render();
    }
</script>
</body>
</html>
